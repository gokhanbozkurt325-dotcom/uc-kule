// ── Grup Aşı Modal ──
function GroupVaccineModal({ group, goats, onSave, onClose, currentUser }) {
  const groupGoats = goats.filter(g=>group.memberIds.includes(g.id)&&!g.archived);
  const [vaccineType, setVaccineType] = useState("");
  const [date, setDate] = useState(todayISO());
  const [batchNo, setBatchNo] = useState("");
  const [notes, setNotes] = useState("");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  const save = async () => {
    if (!vaccineType){setErr("Aşı türü seçiniz");return;}
    setSaving(true);
    const report = {
      id:"vr"+Date.now(),
      group_id: group.id,
      group_name: group.name,
      breed: group.breed,
      vaccine_type: vaccineType,
      date, batch_no: batchNo||null,
      goat_ids: groupGoats.map(g=>g.id).join(","),
      goat_names: groupGoats.length>0 ? groupGoats.map(g=>g.name).join(", ") : "—",
      goat_count: groupGoats.length,
      created_by: currentUser,
      notes: notes||null,
      record_type: "uygulama",
    };
    const {error} = await sb.from("vaccine_reports").insert(report);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave({...report, goatCount:report.goat_count, createdBy:report.created_by, batchNo:report.batch_no, vaccineType:report.vaccine_type, groupName:report.group_name, groupId:report.group_id});
  };

  return <ModalWrap title={`💉 ${group.name} — Aşı Uygula`} onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <div style={{background:"#E8F5E9",borderRadius:10,padding:10,marginBottom:4}}>
      <div style={{fontSize:12,fontWeight:700,color:"#10B981",marginBottom:2}}>👥 {group.name}</div>
      {group.description&&<div style={{fontSize:11,color:"#9CA3AF"}}>{group.description}</div>}
      {groupGoats.length>0&&<div style={{fontSize:11,color:"#6B7280",marginTop:2}}>{groupGoats.length} hayvan: {groupGoats.map(g=>g.name).join(", ")}</div>}
    </div>
    <FL>Aşı Türü *</FL>
    <select value={vaccineType} onChange={e=>setVaccineType(e.target.value)} style={S.select}>
      <option value="">— Seçin —</option>
      {VACCINE_TYPES_EXT.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
    </select>
    <FL>Tarih *</FL>
    <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={S.input}/>
    <FL>Parti / Seri No</FL>
    <VoiceInput value={batchNo} onChange={setBatchNo} placeholder="örn. VAK-2026-A1"/>
    <FL>Notlar</FL>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical",lineHeight:1.6}}/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>
        {saving?"Kaydediliyor...":"💉 Uygula"}
      </button>
    </div>
  </ModalWrap>;
}

// ── Gruba Hayvan Ekle Modal ──
function AddMembersModal({ group, breed, goats, onSave, onClose }) {
  const breedGoats = goats.filter(g=>g.breed===breed.id&&!g.archived);
  const [selected, setSelected] = useState(new Set(group.memberIds||[]));
  const [saving, setSaving] = useState(false);

  const toggle = id => setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});

  const save = async () => {
    setSaving(true);
    // Mevcut üyeleri sil, yeniden ekle
    await sb.from("vaccine_group_members").delete().eq("group_id", group.id);
    if(selected.size>0){
      const members=[...selected].map(goatId=>({id:"gm"+Date.now()+Math.random().toString(36).slice(2),group_id:group.id,goat_id:goatId}));
      await sb.from("vaccine_group_members").insert(members);
    }
    onSave({...group, memberIds:[...selected]});
    setSaving(false);
  };

  return <ModalWrap title={`👥 ${group.name} — Hayvanlar`} onClose={onClose}>
    <div style={{fontSize:12,color:"#9CA3AF",marginBottom:8}}>{selected.size} hayvan seçili</div>
    {breedGoats.length===0 && <div style={{fontSize:12,color:"#6B7280",textAlign:"center",padding:12}}>Bu ırkta henüz hayvan yok</div>}
    {breedGoats.map(g=>{
      const sel=selected.has(g.id);
      return <div key={g.id} onClick={()=>toggle(g.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,background:sel?breed.bg:"#F9F9F6",border:`1.5px solid ${sel?breed.color+"44":"#E5E7EB"}`,cursor:"pointer",marginBottom:4}}>
        <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sel?breed.color:"#6B7280"}`,background:sel?breed.color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {sel&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
        </div>
        <span style={{fontSize:13,fontWeight:sel?700:400,color:sel?breed.color:"#374151"}}>{g.name}</span>
        <span style={{fontSize:10,color:"#9CA3AF",marginLeft:"auto"}}>{g.earTag} · {g.category==="anac"?"Anaç":"Oğlak"}</span>
      </div>;
    })}
    <div style={{display:"flex",gap:8,marginTop:8}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
    </div>
  </ModalWrap>;
}
function CreateGroupModal({ breed, goats, onSave, onClose, currentUser }) {
  const breedGoats = goats.filter(g=>g.breed===breed.id&&!g.archived);
  const [name, setName] = useState("");
  const [desc, setDesc] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  const toggle = id => setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});

  const save = async () => {
    if(!name.trim()){setErr("Grup adı giriniz");return;}
    setSaving(true);
    const groupId = "grp"+Date.now();
    const group = {id:groupId, breed:breed.id, name:name.trim(), description:desc||null, created_by:currentUser};
    const {error} = await sb.from("vaccine_groups").insert(group);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    if(selected.size>0){
      const members = [...selected].map(goatId=>({id:"gm"+Date.now()+Math.random().toString(36).slice(2), group_id:groupId, goat_id:goatId}));
      await sb.from("vaccine_group_members").insert(members);
    }
    onSave({...group, memberIds:[...selected]});
    setSaving(false);
  };

  const anacList = breedGoats.filter(g=>g.category==="anac");
  const oglakList = breedGoats.filter(g=>g.category==="oglak");

  const GoatRow = ({g}) => {
    const sel=selected.has(g.id);
    return <div onClick={()=>toggle(g.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,background:sel?breed.bg:"#F9F9F6",border:`1.5px solid ${sel?breed.color+"44":"#E5E7EB"}`,cursor:"pointer",marginBottom:4}}>
      <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sel?breed.color:"#6B7280"}`,background:sel?breed.color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {sel&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
      </div>
      <span style={{fontSize:13,fontWeight:sel?700:400,color:sel?breed.color:"#374151"}}>{g.name}</span>
      <span style={{fontSize:10,color:"#9CA3AF",marginLeft:"auto"}}>{g.earTag} · {g.category==="anac"?"Anaç":"Oğlak"}</span>
    </div>;
  };

  return <ModalWrap title={`➕ ${breed.emoji} ${breed.name} — Yeni Grup`} onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <FL>Grup Adı *</FL>
    <VoiceInput value={name} onChange={setName} placeholder="örn. Saanen Oğlakları"/>
    <FL>Açıklama</FL>
    <VoiceInput value={desc} onChange={setDesc} placeholder="İsteğe bağlı..."/>
    <FL>Hayvan Seç (opsiyonel — sonradan da eklenebilir)</FL>
    <div style={{fontSize:11,color:"#9CA3AF",marginBottom:8}}>{selected.size} hayvan seçildi</div>
    {breedGoats.length===0 && <div style={{fontSize:12,color:"#6B7280",textAlign:"center",padding:8,background:"#F5F5F5",borderRadius:8}}>Bu ırkta henüz hayvan yok</div>}
    {anacList.length>0&&<>
      <div style={{fontSize:11,fontWeight:700,color:"#10B981",marginBottom:4,marginTop:4}}>🐐 Anaçlar</div>
      {anacList.map(g=><GoatRow key={g.id} g={g}/>)}
    </>}
    {oglakList.length>0&&<>
      <div style={{fontSize:11,fontWeight:700,color:"#E8975A",marginBottom:4,marginTop:8}}>🍼 Oğlaklar</div>
      {oglakList.map(g=><GoatRow key={g.id} g={g}/>)}
    </>}
    <div style={{display:"flex",gap:8,marginTop:8}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"✅ Grup Oluştur"}</button>
    </div>
  </ModalWrap>;
}

// ── Irk Aşı Sekmesi (Grup Sistemi) ──
function BreedVaccineTab({breed, goats, vaccineGroups, vaccineReports, onGroupCreated, onGroupUpdated, onGroupDeleted, onVaccineApplied, currentUser}){
  const [showCreateGroup, setShowCreateGroup] = useState(false);
  const [activeGroupVaccine, setActiveGroupVaccine] = useState(null);
  const [editMembersGroup, setEditMembersGroup] = useState(null);
  const [confirmDeleteGroup, setConfirmDeleteGroup] = useState(null);
  const [viewTab, setViewTab] = useState("gruplar");
  const isVet = currentUser==="Danışman"||currentUser==="İşletme Sahibi";

  const breedGroups = vaccineGroups.filter(g=>g.breed===breed.id);
  const breedReports = [...vaccineReports].filter(r=>r.breed===breed.id).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const activeGroup = activeGroupVaccine ? breedGroups.find(g=>g.id===activeGroupVaccine) : null;
  const editGroup = editMembersGroup ? breedGroups.find(g=>g.id===editMembersGroup) : null;

  const deleteGroup = async (groupId) => {
    await sb.from("vaccine_group_members").delete().eq("group_id", groupId);
    await sb.from("vaccine_groups").delete().eq("id", groupId);
    onGroupDeleted(groupId);
    setConfirmDeleteGroup(null);
  };

  return (
    <div>
      {confirmDeleteGroup && (
        <div onClick={()=>setConfirmDeleteGroup(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.55)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#FFFFFF",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderRadius:22,padding:22,width:"100%",maxWidth:320,border:"1px solid rgba(212,175,55,.15)"}}>
            <div style={{fontWeight:800,fontSize:16,color:"#1A1A2E",marginBottom:8}}>🗑 Grubu Sil</div>
            <div style={{fontSize:13,color:"#6B7280",marginBottom:16}}>
              <b>{breedGroups.find(g=>g.id===confirmDeleteGroup)?.name}</b> grubu kalıcı silinecek. Emin misiniz?
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirmDeleteGroup(null)} style={{...S.btnOutline,flex:1,padding:10}}>İptal</button>
              <button onClick={()=>deleteGroup(confirmDeleteGroup)} style={{...S.btnPrimary,flex:1,padding:10,background:"#C0392B",border:"none"}}>Evet, Sil</button>
            </div>
          </div>
        </div>
      )}
      {showCreateGroup && <CreateGroupModal breed={breed} goats={goats} currentUser={currentUser}
        onSave={g=>{onGroupCreated(g);setShowCreateGroup(false);}}
        onClose={()=>setShowCreateGroup(false)}/>}
      {activeGroup && <GroupVaccineModal group={activeGroup} goats={goats} currentUser={currentUser}
        onSave={r=>{onVaccineApplied(r);setActiveGroupVaccine(null);}}
        onClose={()=>setActiveGroupVaccine(null)}/>}
      {editGroup && <AddMembersModal group={editGroup} breed={breed} goats={goats}
        onSave={updatedGroup=>{onGroupUpdated(updatedGroup);setEditMembersGroup(null);}}
        onClose={()=>setEditMembersGroup(null)}/>}

      <button onClick={()=>setShowCreateGroup(true)} style={{...S.btnOutline,width:"100%",marginBottom:10,fontSize:13}}>➕ Yeni Grup Oluştur</button>

      <div style={{display:"flex",background:"#FFFFFF",borderRadius:10,marginBottom:10,border:"1px solid rgba(212,175,55,.12)",overflow:"hidden"}}>
        <button onClick={()=>setViewTab("gruplar")} style={{...S.tabBtn,background:viewTab==="gruplar"?breed.color:"transparent",color:viewTab==="gruplar"?"#fff":"#8c8c7e",fontSize:12}}>👥 Gruplar</button>
        <button onClick={()=>setViewTab("gecmis")} style={{...S.tabBtn,background:viewTab==="gecmis"?breed.color:"transparent",color:viewTab==="gecmis"?"#fff":"#8c8c7e",fontSize:12}}>📋 Aşı Geçmişi</button>
      </div>

      {viewTab==="gruplar" && (
        <div>
          {breedGroups.length===0 && <Empty text="Henüz grup oluşturulmadı. ➕ butonuna basın."/>}
          {breedGroups.map(group=>{
            const memberGoats = goats.filter(g=>group.memberIds.includes(g.id)&&!g.archived);
            const lastVaccine = breedReports.filter(r=>r.groupId===group.id)[0];
            return (
              <div key={group.id} style={{...S.card,padding:12,marginBottom:8,border:`1.5px solid ${breed.color}33`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:14,color:breed.color}}>{group.name}</div>
                    {group.description&&<div style={{fontSize:11,color:"#9CA3AF"}}>{group.description}</div>}
                    <div style={{fontSize:11,color:"#6B7280",marginTop:2}}>👥 {memberGoats.length} hayvan {memberGoats.length>0?`· ${memberGoats.map(g=>g.name).join(", ")}`:""}  </div>
                  </div>
                  {isVet && (
                    <button onClick={()=>setConfirmDeleteGroup(group.id)}
                      style={{...S.btnSm,background:"rgba(239,68,68,.1)",color:"#EF4444",fontSize:11,padding:"4px 8px",flexShrink:0}}>🗑</button>
                  )}
                </div>
                {lastVaccine && (
                  <div style={{fontSize:11,color:"var(--primary,#8B5CF6)",background:"#E8F5E9",padding:"4px 8px",borderRadius:6,marginBottom:8}}>
                    Son aşı: {VACCINE_TYPES_EXT.find(v=>v.id===lastVaccine.vaccineType)?.name} · {fmt(lastVaccine.date)}
                  </div>
                )}
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>setEditMembersGroup(group.id)} style={{...S.btnOutline,width:"100%",fontSize:12,padding:"8px 0"}}>
                    👥 Hayvanlar ({memberGoats.length})
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {viewTab==="gecmis" && (
        <div>
          {breedReports.length===0 && <Empty text="Henüz aşı kaydı yok"/>}
          {breedReports.map(r=>{
            const vt = VACCINE_TYPES_EXT.find(v=>v.id===r.vaccineType);
            return (
              <div key={r.id} style={{...S.card,padding:10,marginBottom:5,border:`1.5px solid ${vt?.color||"#E5E7EB"}22`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:vt?.color||"#333"}}>💉 {vt?.name}</div>
                    <div style={{fontSize:11,color:"#6B7280",marginTop:1}}>👥 {r.groupName} · {r.goatCount} hayvan</div>
                    <div style={{fontSize:11,color:"#9CA3AF"}}>📅 {fmt(r.date)}{r.batchNo?` · Parti: ${r.batchNo}`:""}</div>
                    <div style={{fontSize:10,color:"#6B7280",marginTop:1}}>{r.goatNames}</div>
                  </div>
                  <div style={{fontSize:10,color:"#6B7280",textAlign:"right"}}>{r.createdBy}</div>
                </div>
                {r.notes&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:4}}>📝 {r.notes}</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Aşı Takvim Kaydı Ekle Modal ──
function VaccineScheduleModal({ breed, vaccineGroups, onSave, onClose, currentUser, editData }) {
  const breedGroups = vaccineGroups.filter(g=>g.breed===breed.id);
  const [groupId, setGroupId] = useState(editData?.groupId||"");
  const [vaccineType, setVaccineType] = useState(editData?.vaccineType||"");
  const [date, setDate] = useState(editData?.date||"");
  const [batchNo, setBatchNo] = useState(editData?.batchNo||"");
  const [notes, setNotes] = useState(editData?.notes||"");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  const save = async () => {
    if(!groupId){setErr("Grup seçiniz");return;}
    if(!vaccineType){setErr("Aşı türü seçiniz");return;}
    if(!date){setErr("Tarih giriniz");return;}
    setSaving(true);
    const group = breedGroups.find(g=>g.id===groupId);
    if(editData){
      // Güncelleme
      await sb.from("vaccine_reports").update({group_id:groupId,group_name:group?.name||"",vaccine_type:vaccineType,date,batch_no:batchNo||null,notes:notes||null}).eq("id",editData.id);
      onSave({...editData,groupId,groupName:group?.name||"",vaccineType,date,batchNo,notes});
      return;
    }
    const report = {
      id:"vr"+Date.now(),
      group_id: groupId,
      group_name: group?.name||"",
      breed: breed.id,
      vaccine_type: vaccineType,
      date, batch_no: batchNo||null,
      goat_ids:"", goat_names:"", goat_count:0,
      created_by: currentUser,
      notes: notes||null,
      record_type: "takvim",
    };
    const {error} = await sb.from("vaccine_reports").insert(report);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave({...report, groupId:report.group_id, groupName:report.group_name, vaccineType:report.vaccine_type, batchNo:report.batch_no||"", goatCount:0, createdBy:report.created_by, notes:report.notes||""});
  };

  return (
    <div className="anim-fade" style={{background:"#FFFFFF",minHeight:"100vh",padding:"0 0 20px"}}>
      <div style={{background:"#4A7C3F",padding:"12px 14px 10px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:200}}>
        <button onClick={onClose} style={{...S.ghost,color:"#fff",fontSize:22,padding:"0 6px 0 0"}}>‹</button>
        <div style={{color:"#fff",fontWeight:800,fontSize:15}}>{editData?"✏️ Aşı Düzenle":breed.emoji+" "+breed.name+" — Takvime Ekle"}</div>
      </div>
      <div style={{padding:"16px 14px",display:"flex",flexDirection:"column",gap:10}}>
        {err&&<ErrBox msg={err}/>}
        {breedGroups.length===0 && (
          <div style={{background:"rgba(var(--primary-rgb),.08)",border:"1px solid #F0D49A",borderRadius:10,padding:12,fontSize:13,color:"#E8975A"}}>
            ⚠️ Bu ırk için henüz grup yok. Önce Sürü → {breed.name} → 💉 Aşı sekmesinden grup oluşturun.
          </div>
        )}
        <FL>Grup *</FL>
        <select value={groupId} onChange={e=>setGroupId(e.target.value)} style={S.select}>
          <option value="">— Grup seçin —</option>
          {breedGroups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
        </select>
        <FL>Aşı Türü *</FL>
        <select value={vaccineType} onChange={e=>setVaccineType(e.target.value)} style={S.select}>
          <option value="">— Seçin —</option>
          {VACCINE_TYPES_EXT.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
        </select>
        <FL>Tarih * (ileri tarih girilebilir)</FL>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={S.input}/>
        <FL>Parti / Seri No</FL>
        <input value={batchNo} onChange={e=>setBatchNo(e.target.value)} style={S.input} placeholder="örn. VAK-2026-A1"/>
        <FL>Notlar</FL>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3} style={{...S.input,resize:"vertical",lineHeight:1.6}}/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:13}}>İptal</button>
          <button onClick={save} disabled={saving||breedGroups.length===0} style={{...S.btnPrimary,flex:2,padding:13,opacity:(saving||breedGroups.length===0)?.5:1}}>
            {saving?"Kaydediliyor...":"💾 Takvime Ekle"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Global Aşı Sayfası ──
function GlobalVaccinePage({vaccineGroups, vaccineReports, onScheduleAdded, onScheduleDeleted, onVaccineApplied, currentUser}){
  const [selBreed, setSelBreed] = useState(null);
  const [showSchedule, setShowSchedule] = useState(null);
  const [editSchedule, setEditSchedule] = useState(null);
  const [localReports, setLocalReports] = useState(vaccineReports);
  const [applyingId, setApplyingId] = useState(null);
  const isVet = currentUser==="Danışman"||currentUser==="İşletme Sahibi";

  useEffect(()=>setLocalReports(vaccineReports),[vaccineReports]);

  const today = todayISO();

  const deleteReport = async (id) => {
    const {error} = await sb.from("vaccine_reports").delete().eq("id",id);
    if(!error){
      setLocalReports(p=>p.filter(x=>x.id!==id));
      if(onScheduleDeleted) onScheduleDeleted(id);
    }
  };

  const markApplied = async (r) => {
    setApplyingId(r.id);
    const now = new Date().toISOString();
    const appliedDate = now.split("T")[0];

    // Yeni uygulama kaydı oluştur (rapor için)
    const newReport = {
      id: "vr"+Date.now(),
      group_id: r.groupId,
      group_name: r.groupName,
      breed: r.breed,
      vaccine_type: r.vaccineType,
      date: appliedDate,
      batch_no: r.batchNo||null,
      goat_ids: r.goatIds||"",
      goat_names: r.goatNames||"",
      goat_count: r.goatCount||0,
      created_by: r.createdBy,
      notes: r.notes||null,
      record_type: "uygulama",
      status: "uygulandı",
      applied_by: currentUser,
      applied_at: now,
    };

    // 1. Yeni uygulama kaydını Supabase'e ekle
    await sb.from("vaccine_reports").insert(newReport);

    // 2. Eski takvim kaydını Supabase'den sil
    await sb.from("vaccine_reports").delete().eq("id", r.id);

    // 3. State güncelle — takvim kaydını kaldır, yeni raporu ekle
    const newReportObj = {
      ...newReport,
      groupId: newReport.group_id,
      groupName: newReport.group_name,
      vaccineType: newReport.vaccine_type,
      batchNo: newReport.batch_no||"",
      goatCount: newReport.goat_count,
      createdBy: newReport.created_by,
      recordType: "uygulama",
      appliedBy: currentUser,
      appliedAt: now,
    };

    setLocalReports(p=>[newReportObj, ...p.filter(x=>x.id!==r.id)]);
    if(onScheduleDeleted) onScheduleDeleted(r.id);
    if(onVaccineApplied) onVaccineApplied(newReportObj);
    setApplyingId(null);
  };

  if(selBreed) {
    const breed = BREEDS.find(b=>b.id===selBreed);
    const breedReports = [...localReports]
      .filter(r=>r.breed===selBreed && (r.recordType==="takvim" || r.recordType===undefined || r.recordType===""))
      .sort((a,b)=>new Date(a.date)-new Date(b.date));
    const upcoming = breedReports.filter(r=>r.date>=today);
    const past = breedReports.filter(r=>r.date<today).sort((a,b)=>new Date(b.date)-new Date(a.date));

    return (
      <div className="anim-slide">
        {showSchedule && <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:500,background:"#FFFFFF"}}>
          <VaccineScheduleModal breed={breed} vaccineGroups={vaccineGroups}
            onSave={r=>{onScheduleAdded(r);setLocalReports(p=>[r,...p]);setShowSchedule(false);}}
            onClose={()=>setShowSchedule(false)} currentUser={currentUser}/>
        </div>}
        {editSchedule && <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:500,background:"#FFFFFF"}}>
          <VaccineScheduleModal breed={breed} vaccineGroups={vaccineGroups} editData={editSchedule}
            onSave={r=>{setLocalReports(p=>p.map(x=>x.id===editSchedule.id?r:x));setEditSchedule(null);}}
            onClose={()=>setEditSchedule(null)} currentUser={currentUser}/>
        </div>}

        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <button onClick={()=>setSelBreed(null)} style={{...S.ghost,fontSize:22,color:"#6B7280",padding:0}}>‹</button>
          <div style={{fontSize:20}}>{breed.emoji}</div>
          <h2 style={{...S.title,margin:0}}>{breed.name} — Aşı Takvimi</h2>
        </div>

        <button onClick={()=>setShowSchedule(true)} style={{...S.btnPrimary,width:"100%",marginBottom:12,fontSize:13}}>
          + Takvime Aşı Ekle
        </button>

        <div style={{fontWeight:700,fontSize:13,color:"#0EA5E9",marginBottom:8}}>📅 Yaklaşan / Planlanan</div>
        {upcoming.length===0 && <div style={{...S.card,padding:10,marginBottom:8,textAlign:"center",color:"#6B7280",fontSize:12}}>Planlanan aşı yok</div>}
        {upcoming.map(r=>{
          const vt=VACCINE_TYPES_EXT.find(v=>v.id===r.vaccineType);
          const d=daysUntil(r.date);
          const isUrgent=d<=3;
          const isApplied=r.status==="uygulandı";
          return (
            <div key={r.id} style={{...S.card,padding:10,marginBottom:5,border:`1.5px solid ${isApplied?"#A8D5A2":isUrgent?"#F5C0BA":"#D4E8FF"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:vt?.color||"#333"}}>💉 {vt?.name}</div>
                  <div style={{fontSize:11,color:"#6B7280"}}>👥 {r.groupName}</div>
                  <div style={{fontSize:11,color:"#9CA3AF"}}>📅 {fmt(r.date)}{r.batchNo?` · Parti: ${r.batchNo}`:""}</div>
                  {isApplied && <div style={{fontSize:10,color:"#10B981",fontWeight:700,marginTop:2}}>✅ Uygulandı · {r.appliedBy} · {fmtDT(r.appliedAt)}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                  {!isApplied && <div style={{textAlign:"right"}}>
                    <div style={{fontSize:18,fontWeight:900,color:isUrgent?"#BE3B31":"#2873A8"}}>{d}</div>
                    <div style={{fontSize:9,color:isUrgent?"#BE3B31":"#2873A8",fontWeight:700}}>gün kaldı</div>
                  </div>}
                  {isApplied && <PillTag bg="#E3F0DC" color="#3D5A25" text="✅ Uygulandı"/>}
                  {!isApplied && <button onClick={()=>markApplied(r)} disabled={applyingId===r.id}
                    style={{...S.btnPrimary,fontSize:11,padding:"5px 10px",opacity:applyingId===r.id?.6:1}}>
                    {applyingId===r.id?"...":"✅ Uygulandı"}
                  </button>}
                  {!isApplied && <button onClick={()=>setEditSchedule(r)} style={{...S.btnSm,background:"rgba(40,115,168,.15)",color:"#0EA5E9",fontSize:10,padding:"3px 8px"}}>✏️ Düzenle</button>}
                  {isVet && <button onClick={()=>deleteReport(r.id)} style={{...S.btnSm,background:"rgba(239,68,68,.1)",color:"#EF4444",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
                </div>
              </div>
              {r.notes&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:4}}>📝 {r.notes}</div>}
            </div>
          );
        })}

        {past.length>0&&<>
          <div style={{fontWeight:700,fontSize:13,color:"#9CA3AF",marginBottom:8,marginTop:12}}>📋 Geçmiş</div>
          {past.map(r=>{
            const vt=VACCINE_TYPES_EXT.find(v=>v.id===r.vaccineType);
            const isApplied=r.status==="uygulandı";
            return (
              <div key={r.id} style={{...S.card,padding:10,marginBottom:5,opacity:.85}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:vt?.color||"#333"}}>💉 {vt?.name}</div>
                    <div style={{fontSize:11,color:"#6B7280"}}>👥 {r.groupName}</div>
                    <div style={{fontSize:11,color:"#9CA3AF"}}>📅 {fmt(r.date)} · {r.createdBy}</div>
                    {isApplied && <div style={{fontSize:10,color:"#10B981",fontWeight:700}}>✅ Uygulandı · {r.appliedBy}</div>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    {!isApplied && <button onClick={()=>markApplied(r)} disabled={applyingId===r.id}
                      style={{...S.btnOutline,fontSize:11,padding:"5px 10px",opacity:applyingId===r.id?.6:1}}>
                      {applyingId===r.id?"...":"✅ Uygulandı"}
                    </button>}
                    {!isApplied && <button onClick={()=>setEditSchedule(r)} style={{...S.btnSm,background:"rgba(40,115,168,.15)",color:"#0EA5E9",fontSize:10,padding:"3px 8px"}}>✏️ Düzenle</button>}
                    {isVet && <button onClick={()=>deleteReport(r.id)} style={{...S.btnSm,background:"rgba(239,68,68,.1)",color:"#EF4444",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
                  </div>
                </div>
              </div>
            );
          })}
        </>}
      </div>
    );
  }

  // Ana sayfa — 3 ırk kartı
  return (
    <div className="anim-fade">
      <h2 style={{...S.title,marginBottom:12}}>💉 Aşı Takvimi</h2>
      {BREEDS.map((b,i)=>{
        const breedReports=localReports.filter(r=>r.breed===b.id&&(r.recordType==="takvim"||!r.recordType));
        const upcoming=breedReports.filter(r=>r.date>=today&&r.status!=="uygulandı");
        const urgent=upcoming.filter(r=>daysUntil(r.date)<=3);
        return (
          <div key={b.id} onClick={()=>setSelBreed(b.id)} className="anim-fade"
            style={{borderRadius:20,marginBottom:10,cursor:"pointer",overflow:"hidden",background:`linear-gradient(135deg,${b.color}15 0%,#FFFFFF 100%)`,border:`1px solid ${b.color}28`,boxShadow:"0 6px 24px rgba(0,0,0,.3)",backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)",animationDelay:`${i*.07}s`}}>
            <div style={{display:"flex",alignItems:"center"}}>
              <div style={{width:68,background:`${b.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,alignSelf:"stretch",borderRight:`1px solid ${b.color}20`}}>{b.emoji}</div>
              <div style={{flex:1,padding:"14px 16px"}}>
                <div style={{fontWeight:700,fontSize:17,color:"#1A1A2E",marginBottom:4,letterSpacing:"-.2px"}}>{b.name}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <PillTag bg="rgba(14,165,233,.1)" color="#0EA5E9" text={`📅 ${upcoming.length} planlı`}/>
                  {urgent.length>0&&<PillTag bg="#FFF0EE" color="#BE3B31" text={`⚠️ ${urgent.length} acil`}/>}
                </div>
              </div>
              <div style={{padding:"0 14px",color:"#6B7280",fontSize:22}}>›</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Keçi Detay ──
function GoatDetail({goat,goats,healthRecs,vaccines,logs,treatmentDays,onAddHealth,onUpdateHealth,onFinalizeHealth,onLogsUpdate,onTreatmentDayUpdate,detailTab,setDetailTab,currentUser}){
  const b=BREEDS.find(x=>x.id===goat.breed);
  const [selRecord,setSelRecord]=useState(null);
  const activeRecs=healthRecs.filter(h=>h.goatId===goat.id&&!h.closed);
  const selRecordObj=selRecord?healthRecs.find(h=>h.id===selRecord):null;

  return (
    <div className="anim-slide">
      {selRecordObj && (
        <HealthDetailModal
          record={selRecordObj} goat={goat} logs={logs} treatmentDays={treatmentDays} currentUser={currentUser}
          onUpdate={updated=>{onUpdateHealth(updated);setSelRecord(null);}}
          onFinalize={(id,report)=>{onFinalizeHealth(id,report);setSelRecord(null);}}
          onLogsUpdate={onLogsUpdate}
          onTreatmentDayUpdate={onTreatmentDayUpdate}
          onClose={()=>setSelRecord(null)}
        />
      )}
      <div style={{...S.card,textAlign:"center",padding:18,marginBottom:8,background:b?.bgCard,border:`1.5px solid ${b?.color}20`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:4}}>
          <PillTag bg={b?.bg} color={b?.color} text={`${b?.emoji} ${b?.name}`}/>
          <PillTag bg={goat.category==="anac"?"#E3F0DC":"#FFF4E6"} color={goat.category==="anac"?"#3D5A25":"#8B5A1B"} text={goat.category==="anac"?"Anaç":"Oğlak"}/>
          {goat.archived && <PillTag bg="#FFF0EE" color="#BE3B31" text="ARŞİVLENDİ"/>}
        </div>
        <div style={{fontSize:40,margin:"4px 0"}}>{goat.category==="anac"?"🐐":"🍼"}</div>
        <h2 style={{margin:"2px 0",fontSize:22,fontWeight:900,color:"#1A1A2E"}}>{goat.name}</h2>
        <div style={{fontSize:12,color:"#9CA3AF"}}>🏷 {goat.earTag} · {goat.gender==="dişi"?"♀ Dişi":"♂ Erkek"} · {getAge(goat.birthDate)}</div>
      </div>
      <div style={{display:"flex",background:"#FFFFFF",borderRadius:10,marginBottom:8,border:"1px solid rgba(212,175,55,.12)",overflow:"hidden"}}>
        {[["info","Bilgiler"],["health","Sağlık"],["vaccines","Aşılar"]].map(([k,l])=>(
          <button key={k} onClick={()=>setDetailTab(k)} style={{...S.tabBtn,background:detailTab===k?"#4A7C3F":"transparent",color:detailTab===k?"#fff":"#8c8c7e",fontSize:12}}>{l}</button>
        ))}
      </div>
      {detailTab==="info" && (
        <div style={S.card}>
          {[["Irk",b?.name],["Kategori",goat.category==="anac"?"Anaç":"Oğlak"],["Doğum",fmt(goat.birthDate)],["Yaş",getAge(goat.birthDate)],["Ağırlık",goat.weight?`${goat.weight} kg`:"—"],["Renk",goat.color||"—"],["Üreme",goat.reproductionStatus||"—"],["Oğlak Sayısı",goat.kidCount||"—"]].map(([l,v],i,arr)=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<arr.length-1?"1px solid #F2F0EA":"none"}}>
              <span style={{fontSize:13,color:"#9CA3AF",fontWeight:500}}>{l}</span>
              <span style={{fontSize:13,color:"#1A1A2E",textAlign:"right",maxWidth:"55%"}}>{v||"—"}</span>
            </div>
          ))}
          {goat.archived && <div style={{marginTop:8,padding:"8px 10px",background:"rgba(239,68,68,.1)",borderRadius:8,fontSize:12,color:"#EF4444"}}><b>Arşiv Nedeni:</b> {goat.archiveReason}</div>}
          {goat.notes && <div style={{marginTop:4,padding:"8px 10px",background:"#F5F5F5",borderRadius:8,fontSize:12,color:"#6B7280"}}><b>Not:</b> {goat.notes}</div>}
        </div>
      )}
      {detailTab==="health" && (
        <div>
          {!goat.archived && <button onClick={onAddHealth} style={{...S.btnPrimary,width:"100%",marginBottom:8,fontSize:13}}>+ Sağlık Kaydı Ekle</button>}
          {activeRecs.length===0 && <Empty text="Aktif sağlık kaydı yok"/>}
          {activeRecs.sort((a,c)=>new Date(c.date)-new Date(a.date)).map(h=>(
            <div key={h.id} onClick={()=>setSelRecord(h.id)} style={{...S.card,padding:12,marginBottom:5,cursor:"pointer",border:"1.5px solid #E8E5DC"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:"#1A1A2E"}}>{h.condition}</div>
                  <div style={{fontSize:11,color:"#9CA3AF"}}>📅 {fmt(h.date)} · {h.createdByName}</div>
                </div>
                <StatusBadge status={h.status}/>
              </div>
              {h.treatment&&<div style={{fontSize:12,marginTop:5,color:"#1F2937"}}>💊 {h.treatment}</div>}
              {/* Geçmiş logları */}
              {logs.filter(l=>l.healthRecordId===h.id).length>0 && (
                <div style={{marginTop:8,borderTop:"1px solid #F0F0F0",paddingTop:6}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#9CA3AF",marginBottom:4}}>📋 İŞLEM GEÇMİŞİ</div>
                  {logs.filter(l=>l.healthRecordId===h.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map((l,i)=>(
                    <div key={l.id} style={{display:"flex",gap:6,padding:"4px 0",borderBottom:i<logs.filter(x=>x.healthRecordId===h.id).length-1?"1px dashed #F2F0EA":"none"}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:l.action==="sonlandırma"?"#FFF0EE":l.action==="açılış"?"#E3F0DC":"#EEF6FC",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0}}>
                        {l.action==="sonlandırma"?"✅":l.action==="açılış"?"🆕":"✏️"}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#1F2937"}}>{l.userName}</div>
                        <div style={{fontSize:10,color:"#6B7280"}}>{l.actionDetail}</div>
                        <div style={{fontSize:9,color:"#6B7280"}}>{fmtDT(l.createdAt)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              <div style={{fontSize:10,color:"var(--primary,#8B5CF6)",marginTop:6,fontWeight:500,letterSpacing:".3px"}}>👆 Düzenle / Sonlandır</div>
            </div>
          ))}
        </div>
      )}
      {detailTab==="vaccines" && (
        <div>
          {vaccines.filter(v=>v.goatId===goat.id).length===0 && <Empty text="Aşı kaydı yok"/>}
          {vaccines.filter(v=>v.goatId===goat.id).sort((a,c)=>new Date(c.date)-new Date(a.date)).map((v,i,arr)=>{
            const vd=VACCINE_DEFS.find(x=>x.id===v.vaccineType);
            const nd=new Date(v.date);nd.setDate(nd.getDate()+(vd?.intervalDays||180));
            const nextStr=nd.toISOString().split("T")[0];const d=daysUntil(nextStr);
            return (
              <div key={v.id} style={{...S.card,padding:12,marginBottom:5,border:`1.5px solid ${vd?.color||"#E5E7EB"}22`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:vd?.color||"#333"}}>💉 {vd?.name}</div>
                    <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>📅 {fmt(v.date)}{v.batchNo?` · Parti: ${v.batchNo}`:""}</div>
                    <div style={{fontSize:11,color:"#9CA3AF",marginTop:1}}>👤 {v.createdByName}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:11,fontWeight:700,color:d<=15?"#BE3B31":d<=30?"#D4850A":"#4A7C3F"}}>
                      {d>=0?`${d} gün`:"Geçti"}
                    </div>
                    <div style={{fontSize:9,color:"#6B7280"}}>sonraki</div>
                  </div>
                </div>
                <div style={{fontSize:11,marginTop:6,color:d<=15?"#BE3B31":d<=30?"#D4850A":"#4A7C3F",fontWeight:600,background:d<=15?"#FFF0EE":d<=30?"#FFF8EC":"#F5FAF0",padding:"4px 8px",borderRadius:6}}>
                  ⏭ Sonraki: {fmt(nextStr)}{d<=30&&d>=0?` — ${d} gün kaldı!`:""}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ════════════ MAIN APP ════════════
function App(){
  const [page,setPage]=useState("home");
  const [selBreed,setSelBreed]=useState(null);
  const [breedTab,setBreedTab]=useState("surü");
  const [catTab,setCatTab]=useState("anac");
  const [selGoat,setSelGoat]=useState(null);
  const [detailTab,setDetailTab]=useState("info");
  const [showLogin,setShowLogin]=useState(true);
  const [currentUser,setCurrentUser]=useState("");
  const [loading,setLoading]=useState(true);
  const [guestAccess,setGuestAccess]=useState({isOpen:false,expiresAt:null});

  const [goats,setGoats]=useState([]);
  const [healthRecs,setHealthRecs]=useState([]);
  const [vaccines,setVaccines]=useState([]);
  const [reports,setReports]=useState([]);
  const [logs,setLogs]=useState([]);
  const [vaccineGroups,setVaccineGroups]=useState([]);
  const [vaccineReports,setVaccineReports]=useState([]);
  const [treatmentDaysData,setTreatmentDaysData]=useState([]);
  const [births,setBirths]=useState([]);
  const [deaths,setDeaths]=useState([]);
  const [groupTreatments,setGroupTreatments]=useState([]);
  const [activityLogs,setActivityLogs]=useState([]);

  const [hModal,setHModal]=useState(null);
  const [vModal,setVModal]=useState(null);
  const [addGoatModal,setAddGoatModal]=useState(null);
  const [bulkAddModal,setBulkAddModal]=useState(null);
  const [archiveConfirm,setArchiveConfirm]=useState(null);
  const [selHealthRec,setSelHealthRec]=useState(null);

  useEffect(()=>{
    if(showLogin) return;
    const load=async()=>{
      setLoading(true);
      const [gRes,hRes,vRes,rRes,lRes,vgRes,vgmRes,vrRes,tdRes,bRes,dRes,gtRes]=await Promise.all([
        sb.from("goats").select("*"),
        sb.from("health_records").select("*").eq("closed",false),
        sb.from("vaccines").select("*"),
        sb.from("reports").select("*"),
        sb.from("health_logs").select("*"),
        sb.from("vaccine_groups").select("*"),
        sb.from("vaccine_group_members").select("*"),
        sb.from("vaccine_reports").select("*"),
        sb.from("treatment_days").select("*"),
        sb.from("births").select("*"),
        sb.from("deaths").select("*"),
        sb.from("group_treatments").select("*"),
      ]);
      const groupMembers = (vgmRes.data||[]);
      const groups = (vgRes.data||[]).map(gr=>({
        ...gr,
        memberIds: groupMembers.filter(m=>m.group_id===gr.id).map(m=>m.goat_id)
      }));
      const vReports = (vrRes.data||[]).map(r=>({
        id:r.id, groupId:r.group_id, groupName:r.group_name, breed:r.breed,
        vaccineType:r.vaccine_type, date:r.date, batchNo:r.batch_no||"",
        goatIds:r.goat_ids||"", goatNames:r.goat_names||"", goatCount:r.goat_count||0,
        createdBy:r.created_by||"", notes:r.notes||"", recordType:r.record_type||"uygulama",
        status:r.status||"bekliyor", appliedBy:r.applied_by||"", appliedAt:r.applied_at||""
      }));
      setGoats((gRes.data||[]).map(toGoat));
      setHealthRecs((hRes.data||[]).map(toHealth));
      setVaccines((vRes.data||[]).map(toVaccine));
      setReports((rRes.data||[]).map(toReport));
      setLogs((lRes.data||[]).map(toLog));
      setVaccineGroups(groups);
      setVaccineReports(vReports);
      setTreatmentDaysData((tdRes.data||[]).map(r=>({
        id:r.id, healthRecordId:r.health_record_id, goatId:r.goat_id,
        dayNumber:r.day_number, plannedDate:r.planned_date,
        done: r.done === true, doneBy:r.done_by||"", doneAt:r.done_at||""
      })));
      setBirths((bRes.data||[]).map(r=>({
        id:r.id, breed:r.breed, motherEarTag:r.mother_ear_tag,
        birthType:r.birth_type, birthDate:r.birth_date,
        kidCount:r.kid_count||0, kids:r.kids||[],
        notes:r.notes||"", createdBy:r.created_by||"",
        createdAt:r.created_at
      })));
      setDeaths((dRes.data||[]).map(r=>({
        id:r.id, breed:r.breed, category:r.category||"anac", earTag:r.ear_tag,
        deathDate:r.death_date, deathTime:r.death_time||"",
        cause:r.cause||"", notes:r.notes||"",
        createdBy:r.created_by||"", createdAt:r.created_at
      })));
      setGroupTreatments((gtRes.data||[]).map(r=>({
        id:r.id, breed:r.breed, category:r.category||"anac", groupName:r.group_name,
        condition:r.condition, treatment:r.treatment||"",
        treatmentDays:r.treatment_days||0, startDate:r.start_date||"",
        status:r.status||"tedavi_altında",
        notes:r.notes||"", createdBy:r.created_by||"", createdAt:r.created_at
      })));
      // Activity logs yükle
      const {data:alData} = await sb.from("activity_logs").select("*").order("created_at",{ascending:false}).limit(7);
      setActivityLogs(alData||[]);
      setLoading(false);
    };
    load();
  },[showLogin]);

  // Activity log kaydet (max 7 tutar)
  const addActivity = async (actionType, description, detail, breed) => {
    const rec = {
      id: "al"+Date.now()+Math.random().toString(36).slice(2),
      action_type: actionType,
      description,
      detail: detail||null,
      user_name: currentUser,
      breed: breed||null,
      created_at: new Date().toISOString()
    };
    await sb.from("activity_logs").insert(rec);
    setActivityLogs(prev => {
      const updated = [rec, ...prev].slice(0, 7);
      return updated;
    });
    // 7'den fazlaysa eskiyi sil
    const {data:all} = await sb.from("activity_logs").select("id").order("created_at",{ascending:false});
    if(all && all.length > 7){
      const toDelete = all.slice(7).map(r=>r.id);
      await sb.from("activity_logs").delete().in("id", toDelete);
    }
  };

  const upcomingAll=useMemo(()=>{
    const list=[];
    goats.filter(g=>!g.archived).forEach(g=>{
      VACCINE_DEFS.forEach(vd=>{
        const next=nextVaccineDate(g.id,vd.id,vaccines);
        if(next){const d=daysUntil(next);if(d<=30&&d>=0)list.push({goat:g,vd,days:d,next});}
      });
    });
    return list.sort((a,b)=>a.days-b.days);
  },[goats,vaccines]);

  const breedStats=useMemo(()=>{
    const r={};
    BREEDS.forEach(b=>{
      const all=goats.filter(g=>g.breed===b.id&&!g.archived);
      r[b.id]={total:all.length,anac:all.filter(g=>g.category==="anac").length,oglak:all.filter(g=>g.category==="oglak").length,sick:healthRecs.filter(h=>h.breed===b.id&&h.status==="tedavi_altında").length};
    });
    return r;
  },[goats,healthRecs]);

  const navigate=p=>{setPage(p);setSelBreed(null);setSelGoat(null);setBreedTab("surü");setCatTab("anac");setDetailTab("info");};
  const goBack=()=>{
    if(selGoat){setSelGoat(null);setDetailTab("info");}
    else if(selBreed){setSelBreed(null);}
    else if(page!=="home"){navigate("home");}
  };
  const showBackBtn = page!=="home" || selBreed || selGoat;
  const saveHealth=rec=>{
    setHealthRecs(p=>[rec,...p]);
    if(rec.treatmentDays && rec.treatmentDays.length>0){
      setTreatmentDaysData(p=>[...rec.treatmentDays,...p]);
    }
    setHModal(null);
    addActivity("saglik_eklendi","Sağlık kaydı eklendi",`${rec.goatEarTag} · ${rec.condition}`,rec.breed);
  };
  const saveVaccines=recs=>{
    setVaccines(p=>[...recs,...p]);
    setVModal(null);
    if(recs.length>0) addActivity("asi_uygulandı","Aşı uygulandı",`${recs.length} hayvan · ${recs[0].vaccineType||""}`,recs[0]?.breed);
  };
  const saveGoat=g=>{
    setGoats(p=>[...p,g]);
    setAddGoatModal(null);
    addActivity("hayvan_eklendi","Yeni hayvan eklendi",`${g.earTag} · ${g.category==="anac"?"Anaç":"Oğlak"}`,g.breed);
  };
  const saveBulkGoats=gs=>{
    setGoats(p=>[...p,...gs]);
    setBulkAddModal(null);
    if(gs.length>0) addActivity("toplu_hayvan","Toplu hayvan eklendi",`${gs.length} hayvan · ${gs[0].category==="anac"?"Anaç":"Oğlak"}`,gs[0]?.breed);
  };
  const updateHealth=updated=>{
    setHealthRecs(p=>p.map(h=>h.id===updated.id?updated:h));
  };
  const addLogToState=newLog=>{setLogs(p=>[newLog,...p]);};

  const finalizeHealth=async(id,report)=>{
    setHealthRecs(p=>p.filter(h=>h.id!==id));
    setReports(p=>[report,...p]);
    addActivity("saglik_sonlandi","Sağlık kaydı sonlandırıldı",`${report.goatEarTag} · ${report.closeReason}`,report.breed);
    if(report.closeReason==="Hayvan Öldü"){
      await sb.from("goats").update({archived:true,archive_reason:"Hayvan öldü — "+report.dateClosed}).eq("id",report.goatId);
      setGoats(p=>p.map(g=>g.id===report.goatId?{...g,archived:true,archiveReason:"Hayvan öldü — "+report.dateClosed}:g));
    }
  };

  const deleteReport=id=>{setReports(p=>p.filter(r=>r.id!==id));};
  const saveVaccineGroup=g=>{setVaccineGroups(p=>[...p,g]);};
  const updateVaccineGroup=g=>{setVaccineGroups(p=>p.map(x=>x.id===g.id?g:x));};
  const deleteVaccineGroup=id=>{setVaccineGroups(p=>p.filter(x=>x.id!==id));};
  const saveVaccineReport=r=>{
    setVaccineReports(p=>[r,...p]);
    addActivity("asi_takvim","Aşı takvime eklendi",`${r.groupName} · ${r.vaccineType||""}`,r.breed);
  };

  const archiveGoat=async(goatId, reason)=>{
    const g=goats.find(x=>x.id===goatId);
    const archiveReason=reason||"Manuel arşivleme — "+todayISO();
    await sb.from("goats").update({archived:true,archive_reason:archiveReason}).eq("id",goatId);
    setGoats(p=>p.map(x=>x.id===goatId?{...x,archived:true,archiveReason}:x));
    setArchiveConfirm(null);
    addActivity("arsivlendi","Hayvan arşivlendi",`${g?.earTag||""} · ${g?.name||""}`,g?.breed);
  };

  // Swipe ile geri
  useEffect(()=>{
    let startX=0;
    const onStart = e=>{ startX=e.touches[0].clientX; };
    const onEnd = e=>{
      const dx = e.changedTouches[0].clientX - startX;
      if(dx>80 && startX<60) goBack();
    };
    document.addEventListener("touchstart",onStart,{passive:true});
    document.addEventListener("touchend",onEnd,{passive:true});
    return ()=>{
      document.removeEventListener("touchstart",onStart);
      document.removeEventListener("touchend",onEnd);
    };
  },[page,selBreed,selGoat]);
  const showBack = showBackBtn;
  const breed=selBreed?BREEDS.find(b=>b.id===selBreed):null;
  const goat=selGoat?goats.find(g=>g.id===selGoat):null;
  // Misafir girişi açma - UTC zaman kullan
  const openGuestAccess = async () => {
    const {error} = await sb.from("guest_access").update({
      is_open: true,
      opened_by: currentUser,
      opened_at: new Date().toISOString(),
      expires_at: null
    }).eq("id","singleton");
    if(!error) setGuestAccess({isOpen:true, expiresAt:null});
  };

  const closeGuestAccess = async () => {
    await sb.from("guest_access").update({is_open:false, expires_at:null}).eq("id","singleton");
    setGuestAccess({isOpen:false, expiresAt:null});
  };

  const isGuest = currentUser==="Misafir";
  const [soundPref, setSoundPref] = useState(null);
  const [showSoundPrompt, setShowSoundPrompt] = useState(false);
  const [theme, setTheme] = useState(DEFAULT_THEME);
  const [showThemePrompt, setShowThemePrompt] = useState(false);

  // Ses çal
  const playWelcome = (userName, recs) => {
    try {
      const audio = new Audio("https://gokhanbozkurt325-dotcom.github.io/uc-kule/welcome.mp4");
      audio.volume = 1;
      audio.play().catch(()=>{
        // iOS'ta otomatik çalma engellenirse kullanıcı etkileşimi bekle
        const unlock = () => {
          audio.play().catch(()=>{});
          document.removeEventListener("touchstart", unlock);
          document.removeEventListener("click", unlock);
        };
        document.addEventListener("touchstart", unlock, {once:true});
        document.addEventListener("click", unlock, {once:true});
      });
    } catch(e) {}
  };

  // Giriş sonrası ses tercihi kontrol
  const handleLoginSuccess = async (userName) => {
    setCurrentUser(userName);
    setShowLogin(false);
    try {
      const {data} = await sb.from("user_preferences").select("*").eq("user_name", userName).single();
      // Tema yükle
      if(data && data.theme_id) {
        const t = COLOR_THEMES.find(x=>x.id===data.theme_id);
        setTheme(t||DEFAULT_THEME);
      }
      // Ses
      if(data && data.sound_enabled === true) {
        setTimeout(()=>playWelcome(userName, healthRecs), 800);
      } else if(data && data.sound_enabled === false) {
        // kapalı
      } else {
        // İlk giriş — önce tema seç, sonra ses sor
        setTimeout(()=>setShowThemePrompt(true), 500);
      }
    } catch(e) {
      setTimeout(()=>setShowThemePrompt(true), 500);
    }
  };

  const saveSoundPref = async (enabled) => {
    const userName = currentUser;
    setSoundPref(enabled);
    setShowSoundPrompt(false);
    try {
      await sb.from("user_preferences").upsert({id:"sp_"+userName.replace(/\s/g,"_"), user_name:userName, sound_enabled:enabled, theme_id:theme.id});
    } catch(e){}
    if(enabled) setTimeout(()=>playWelcome(userName, healthRecs), 300);
  };

  const saveTheme = async (t, showSoundNext) => {
    setTheme(t);
    setShowThemePrompt(false);
    try {
      await sb.from("user_preferences").upsert({id:"sp_"+currentUser.replace(/\s/g,"_"), user_name:currentUser, theme_id:t.id});
    } catch(e){}
    if(showSoundNext) setTimeout(()=>setShowSoundPrompt(true), 300);
  };

  useEffect(()=>{
    if(showLogin||!currentUser) return;
    const loadPrefs = async()=>{
      try {
        const {data} = await sb.from("user_preferences").select("*").eq("user_name",currentUser).single();
        if(data) {
          setSoundPref(data.sound_enabled);
          if(data.theme_id){ const t=COLOR_THEMES.find(x=>x.id===data.theme_id); setTheme(t||DEFAULT_THEME); }
        }
      } catch(e){}
    };
    loadPrefs();
  },[currentUser,showLogin]);
  // Misafir giriş kontrolü - sadece açık/kapalı
  useEffect(()=>{
    if(!isGuest) return;
    const check = async()=>{
      const {data} = await sb.from("guest_access").select("*").eq("id","singleton").single();
      if(!data || !data.is_open){
        setShowLogin(true);
        setCurrentUser("");
      }
    };
    check();
  },[isGuest]);

  // Tema değişince body arka planını güncelle
  useEffect(()=>{
    const body = document.body;
    body.style.backgroundColor = theme.bg || "#F5F0FF";
    body.style.color = theme.textColor || "#1A1A2E";
    if(theme.photo){
      body.style.backgroundImage = "url("+theme.photo+")";
      body.style.backgroundSize = "cover";
      body.style.backgroundPosition = "center top";
      body.style.backgroundRepeat = "no-repeat";
      body.style.backgroundAttachment = "scroll";
      body.style.WebkitBackgroundSize = "cover";
    } else {
      body.style.backgroundImage = "none";
    }
  },[theme]);

  const activeGoats=goats.filter(g=>!g.archived);

  const [announcements, setAnnouncements] = useState([]);
  const [showAcil, setShowAcil] = useState(false);
  const [selUser, setSelUser] = useState(null);
  const [selPerson, setSelPerson] = useState(null); // kişi seçimi (vardiya üyesi veya Vet/Şef)
  const [pinInput, setPinInput] = useState("");
  const [pinConfirm, setPinConfirm] = useState("");
  const [pinStep, setPinStep] = useState("enter"); // "enter" | "create" | "confirm"
  const [pinError, setPinError] = useState("");
  const [userPins, setUserPins] = useState({}); // {personName: hashedPin}

  useEffect(()=>{
    const loadAnn = async()=>{
      const {data} = await sb.from("announcements").select("*").order("created_at",{ascending:false}).limit(20);
      setAnnouncements(data||[]);
    };
    const loadGuest = async()=>{
      const {data} = await sb.from("guest_access").select("*").eq("id","singleton").single();
      if(data) setGuestAccess({isOpen:data.is_open, expiresAt:data.expires_at});
    };
    const loadPins = async()=>{
      const {data} = await sb.from("user_pins").select("*");
      if(data){
        const map={};
        data.forEach(r=>map[r.user_name]=r.pin_hash);
        setUserPins(map);
      }
    };
    loadAnn();
    loadGuest();
    loadPins();
  },[]);

  const handlePinSubmit = ()=>{};

  // PIN klavyesi ile giriş işlemi
  const handlePinKey = async (k) => {
    if(k==="⌫"){ setPinInput(p=>p.slice(0,-1)); setPinError(""); return; }
    if(k==="") return;
    const next = pinInput+k;
    setPinInput(next);
    if(next.length!==4) return;

    const person = selPerson;

    // Supabase'den güncel PIN'i kontrol et (cache sorunu için)
    let currentPin = userPins[person];
    if(!currentPin){
      const {data} = await sb.from("user_pins").select("pin_hash").eq("user_name",person).single();
      if(data?.pin_hash){
        currentPin = data.pin_hash;
        setUserPins(p=>({...p,[person]:data.pin_hash}));
        setPinStep("enter");
      }
    }

    if(pinStep==="enter"){
      if(currentPin===next){
        setPinInput("");
        handleLoginSuccess(person);
        setPinError("");
      } else {
        setPinError("Hatalı PIN! Tekrar deneyin.");
        setPinInput("");
      }
    } else if(pinStep==="create"){
      // Önce Supabase'de gerçekten PIN yoksa oluştur
      const {data:existing} = await sb.from("user_pins").select("pin_hash").eq("user_name",person).single();
      if(existing?.pin_hash){
        // PIN zaten var — direkt giriş moduna geç
        setUserPins(p=>({...p,[person]:existing.pin_hash}));
        setPinStep("enter");
        setPinInput("");
        setPinError("PIN zaten oluşturulmuş. Lütfen PIN'inizi girin.");
        return;
      }
      setPinConfirm(next);
      setPinInput("");
      setPinStep("confirm");
      setPinError("");
    } else if(pinStep==="confirm"){
      if(pinConfirm===next){
        await sb.from("user_pins").upsert({
          id:"pin_"+person.replace(/\s/g,"_").replace(/\./g,"").replace(/ğ/g,"g").replace(/ü/g,"u").replace(/ş/g,"s").replace(/ı/g,"i").replace(/ö/g,"o").replace(/ç/g,"c"),
          user_name:person,
          pin_hash:next
        });
        setUserPins(p=>({...p,[person]:next}));
        setPinInput("");
        setPinStep("enter");
        setPinError("");
        handleLoginSuccess(person);
      } else {
        setPinError("PIN'ler eşleşmedi! Tekrar deneyin.");
        setPinInput("");
        setPinStep("create");
        setPinConfirm("");
      }
    }
  };

  if(showLogin) return (
    <div style={{...S.loginWrap, background:theme.bg||"#F5F0FF", position:"relative"}}>
      <style>{"select option{background:#fff;color:#1A1A2E;}button:active{opacity:.8;transform:scale(.97);}input:focus,select:focus,textarea:focus{border-color:"+theme.primary+"!important;box-shadow:0 0 0 3px rgba("+( theme.primaryRgb||"139,92,246")+",.12)!important;outline:none!important;}"}</style>
      {/* Fotoğraf üstü karartma overlay */}
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:(theme&&theme.overlay)||"rgba(0,0,0,.4)",zIndex:0,pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:420,padding:"0 16px",paddingBottom:20,position:"relative",zIndex:1}}>

        {/* Başlık */}

          </div>
          <h1 style={{color:"#1A1A2E",fontSize:17,fontWeight:800,margin:"12px 0 4px",lineHeight:1.4,letterSpacing:"-.3px",textAlign:"center"}}>
            BURDUR AÇIK CEZAEVİ<br/>
            <span style={{color:theme.primary}}>TARIM VE HAYVANCILIK</span>
          </h1>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:6}}>
            <span style={{background:"rgba(var(--primary-rgb),.12)",color:theme.primary,fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:20}}>🤖 Yapay Zeka</span>
          </div>
        </div>

        {/* Duyurular */}
        <div style={{background:"#FFFFFF",borderRadius:18,padding:14,marginBottom:16,backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",border:"1px solid rgba(212,175,55,.15)"}}>
          <div style={{color:theme.primary,fontWeight:700,fontSize:13,marginBottom:10,letterSpacing:".5px"}}>📢 DUYURULAR</div>
          <div style={{maxHeight:140,overflowY:"auto"}}>
            {announcements.length===0 && <div style={{color:"#9CA3AF",fontSize:12,textAlign:"center",padding:"10px 0"}}>Henüz duyuru yok</div>}
            {announcements.map(a=>(
              <div key={a.id} style={{background:"rgba(0,0,0,.06)",borderRadius:10,padding:"8px 12px",marginBottom:6,border:"1px solid rgba(212,175,55,.1)"}}>
                <div style={{color:"#374151",fontSize:13,fontWeight:500,marginBottom:2}}>{a.message}</div>
                <div style={{color:"var(--primary,#8B5CF6)",fontSize:10}}>{a.user_name} · {fmtDT(a.created_at)}</div>
              </div>
            ))}
          </div>
          <div style={{color:"#6B7280",fontSize:10,textAlign:"center",marginTop:6}}>Duyuru eklemek için giriş yapın</div>
        </div>

        {/* Giriş kutusu */}
        <div style={{background:"#FFFFFF",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderRadius:24,padding:22,boxShadow:"0 24px 80px rgba(0,0,0,.8)",border:"1px solid rgba(212,175,55,.18)"}}>

          {/* Adım 1: Grup seç */}
          {!selUser && !selPerson && (
            <>
              <h2 style={{margin:"0 0 14px",fontSize:15,fontWeight:700,color:"#374151",letterSpacing:"1px",textTransform:"uppercase"}}>Giriş Yapın</h2>
              {DEMO_USERS.filter(u=>u.id!=="u7").map(u=>(
                <button key={u.id} onClick={()=>{setSelUser(u.id);setPinInput("");setPinError("");setPinStep("enter");setSelPerson(null);}}
                  style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderRadius:14,border:"1px solid rgba(212,175,55,.15)",background:"#F9F9F9",cursor:"pointer",width:"100%",marginBottom:8,textAlign:"left",transition:"all .2s"}}>
                  <span style={{fontSize:18}}>{u.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14,color:"#111827"}}>{u.name}</div>
                    {u.members.length>0 && <div style={{fontSize:10,color:"#9CA3AF"}}>{u.members.join(" · ")}</div>}
                  </div>
                  <span style={{color:"var(--primary,#8B5CF6)",fontSize:18}}>›</span>
                </button>
              ))}
              {/* Misafir */}
              <button onClick={async()=>{
                if(!guestAccess.isOpen) return;
                const {data} = await sb.from("guest_access").select("*").eq("id","singleton").single();
                if(!data||!data.is_open){setPinError("Misafir girişi kapalı.");return;}
                setCurrentUser("Misafir");setShowLogin(false);
              }} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,border:`1px solid ${guestAccess.isOpen?"#4A7C3F":"#E0DDD4"}`,background:guestAccess.isOpen?theme.bg:"#F9F9F6",cursor:guestAccess.isOpen?"pointer":"not-allowed",width:"100%",marginBottom:6,textAlign:"left",opacity:guestAccess.isOpen?1:.6}}>
                <span style={{fontSize:18}}>👁</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:guestAccess.isOpen?theme.primary:"#9CA3AF"}}>Misafir</div>
                  <div style={{fontSize:10,color:guestAccess.isOpen?theme.primary:"#aaa"}}>{guestAccess.isOpen?"✅ Açık — Giriş yapabilirsiniz":"🔒 Kapalı — Danışman veya İşletme Sahibi açabilir"}</div>
                </div>
                {guestAccess.isOpen&&<span style={{color:theme.primary,fontSize:16}}>›</span>}
              </button>
              {pinError&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(190,59,49,.3)",borderRadius:10,padding:"8px 12px",fontSize:12,color:"#EF4444",fontWeight:600,marginTop:6}}>{pinError}</div>}
            </>
          )}

          {/* Adım 2: Kişi seç (vardiya üyesi veya Vet/Şef direkt) */}
          {selUser && !selPerson && (()=>{
            const user = DEMO_USERS.find(u=>u.id===selUser);
            if(!user) return null;
            // Vet ve Şef için direkt PIN ekranına git
            if(user.members.length===0){
              setSelPerson(user.name);
              setPinStep(userPins[user.name]?"enter":"create");
              return null;
            }
            return (
              <>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                  <button onClick={()=>{setSelUser(null);setPinError("");}} style={{...S.ghost,fontSize:22,color:"var(--primary,#8B5CF6)",padding:0}}>‹</button>
                  <div style={{fontWeight:700,fontSize:15,color:"#111827"}}>{user.emoji} {user.name}</div>
                </div>
                <div style={{fontSize:12,color:"#9CA3AF",marginBottom:10,fontWeight:500,letterSpacing:".5px",textTransform:"uppercase"}}>Adınızı seçin</div>
                {user.members.map(m=>(
                  <button key={m} onClick={()=>{setSelPerson(m);setPinInput("");setPinError("");setPinStep(userPins[m]?"enter":"create");}}
                    style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderRadius:14,border:"1px solid rgba(212,175,55,.15)",background:"#F9F9F9",cursor:"pointer",width:"100%",marginBottom:8,textAlign:"left",transition:"all .2s"}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:"rgba(74,124,63,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#10B981"}}>{m[0]}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:14,color:"#111827"}}>{m}</div>
                      <div style={{fontSize:10,color:userPins[m]?"#10B981":theme.primary}}>{userPins[m]?"🔐 PIN oluşturulmuş":"⚠️ Henüz PIN oluşturulmamış"}</div>
                    </div>
                    <span style={{color:"var(--primary,#8B5CF6)",fontSize:18}}>›</span>
                  </button>
                ))}
              </>
            );
          })()}

          {/* Adım 3: PIN gir veya oluştur */}
          {selPerson && (
            <>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                <button onClick={()=>{
                  const u=DEMO_USERS.find(x=>x.id===selUser);
                  if(u&&u.members.length===0){setSelUser(null);setSelPerson(null);}
                  else{setSelPerson(null);}
                  setPinInput("");setPinError("");setPinStep("enter");
                }} style={{...S.ghost,fontSize:22,color:"var(--primary,#8B5CF6)",padding:0}}>‹</button>
                <div>
                  <div style={{fontWeight:700,fontSize:15,color:"#1A1A2E"}}>{selPerson}</div>
                  <div style={{fontSize:11,color:"#9CA3AF"}}>
                    {pinStep==="enter"?"PIN kodunuzu girin":pinStep==="create"?"Yeni PIN oluşturun (4 hane)":"PIN'i tekrar girin"}
                  </div>
                </div>
              </div>

              {pinStep==="create"&&(
                <div style={{background:"rgba(var(--primary-rgb),.08)",border:"1px solid rgba(212,175,55,.2)",borderRadius:10,padding:"8px 12px",fontSize:12,color:theme.primary,marginBottom:10}}>
                  ⚠️ İlk girişiniz! Kendinize 4 haneli bir PIN oluşturun.
                </div>
              )}
              {pinStep==="confirm"&&(
                <div style={{background:"#D1FAE5",border:"1px solid #A7F3D0",borderRadius:10,padding:"8px 12px",fontSize:12,color:"#065F46",marginBottom:10}}>
                  ✅ PIN'i onaylamak için tekrar girin.
                </div>
              )}

              <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:12}}>
                {[0,1,2,3].map(i=>(
                  <div key={i} style={{width:44,height:52,borderRadius:10,border:`2px solid ${pinInput.length>i?theme.primary:"rgba(var(--primary-rgb),.12)"}`,background:pinInput.length>i?"rgba(var(--primary-rgb),.12)":"rgba(0,0,0,.02)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:theme.primary}}>
                    {pinInput.length>i?"●":""}
                  </div>
                ))}
              </div>
              {pinError&&<div style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(190,59,49,.3)",borderRadius:10,padding:"8px 12px",fontSize:12,color:"#EF4444",fontWeight:600,marginBottom:10,textAlign:"center"}}>{pinError}</div>}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>(
                  <button key={i} onClick={()=>handlePinKey(String(k==="⌫"?"⌫":k===""?"":k))}
                    style={{padding:"14px 0",borderRadius:12,border:"1px solid rgba(212,175,55,.12)",background:k===""?"transparent":"#F5F5F5",fontSize:k==="⌫"?18:20,fontWeight:600,color:"#374151",cursor:k===""?"default":"pointer",boxShadow:k===""?"none":"0 1px 4px rgba(0,0,0,.06)",transition:"all .15s"}}>
                    {k}
                  </button>
                ))}
              </div>
            </>
          )}

        </div>
      </div>
    </div>
  );

  if(loading) return <Loading/>;

  return (
    <div style={{...S.app,"--primary":theme.primary,"--primary-rgb":theme.primaryRgb||"139,92,246",background:theme.bg||"#F5F0FF",color:theme.textColor||"#1A1A2E"}}>
      <AcilModal show={showAcil} onClose={function(){setShowAcil(false);}}/>
      {/* Fotoğraf üstü hafif overlay — içerik okunabilsin */}
      {theme.photo&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:theme.overlay||"rgba(0,0,0,.5)",zIndex:0,pointerEvents:"none"}}/>}
      <style>{":root{--primary:"+theme.primary+";--primary-rgb:"+(theme.primaryRgb||"139,92,246")+";}body{background-color:"+(theme.bg||"#F5F0FF")+";color:"+(theme.textColor||"#1A1A2E")+";"+( theme.photo?"background-image:url("+theme.photo+");background-size:cover;background-position:center top;background-repeat:no-repeat;":"")+"}"}</style>
      {hModal&&!isGuest&&<HealthModal goats={goats} breedFilter={hModal.breedId||null} preGoatId={hModal.goatId||""} onSave={saveHealth} onClose={()=>setHModal(null)} currentUser={currentUser}/>}
      {vModal&&!isGuest&&<VaccineModal breed={BREEDS.find(b=>b.id===vModal)} goats={goats} onSave={saveVaccines} onClose={()=>setVModal(null)} currentUser={currentUser}/>}
      {addGoatModal&&!isGuest&&<AddGoatModal breed={BREEDS.find(b=>b.id===(addGoatModal.breedId||addGoatModal))} defaultCategory={addGoatModal.defaultCategory||"anac"} onSave={saveGoat} onClose={()=>setAddGoatModal(null)} currentUser={currentUser}/>}
      {bulkAddModal&&!isGuest&&<BulkAddGoatModal breed={BREEDS.find(b=>b.id===bulkAddModal.breedId)} defaultCategory={bulkAddModal.defaultCategory||"anac"} onSave={saveBulkGoats} onClose={()=>setBulkAddModal(null)} currentUser={currentUser}/>}
      {selHealthRec&&<HealthDetailModal
        record={selHealthRec}
        goat={goats.find(g=>g.id===selHealthRec.goatId)||null}
        logs={logs} treatmentDays={treatmentDaysData} currentUser={currentUser}
        onUpdate={updated=>{updateHealth(updated);setSelHealthRec(null);}}
        onFinalize={(id,report)=>{finalizeHealth(id,report);setSelHealthRec(null);}}
        onLogsUpdate={addLogToState}
        onTreatmentDayUpdate={day=>setTreatmentDaysData(p=>p.map(d=>d.id===day.id?day:d))}
        onClose={()=>setSelHealthRec(null)}
      />}

      {/* Tema seçim sorusu — ilk giriş */}
      {showThemePrompt && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.75)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
          <div style={{background:"#FFFFFF",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderRadius:24,padding:22,width:"100%",maxWidth:360,textAlign:"center",border:"1px solid rgba(212,175,55,.2)",boxShadow:"0 24px 80px rgba(0,0,0,.7)"}}>
            <div style={{fontSize:36,marginBottom:8}}>🎨</div>
            <div style={{fontWeight:700,fontSize:17,color:"#111827",marginBottom:4}}>Tema Seçin</div>
            <div style={{fontSize:12,color:"#9CA3AF",marginBottom:16}}>Seçtiğiniz tema size özel kaydedilir</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:16,maxHeight:340,overflowY:"auto"}}>
              {COLOR_THEMES.map(t=>(
                <button key={t.id} onClick={()=>saveTheme(t,true)}
                  style={{borderRadius:12,border:`2.5px solid ${theme.id===t.id?t.primary:"rgba(0,0,0,.04)"}`,padding:0,cursor:"pointer",overflow:"hidden",boxShadow:theme.id===t.id?`0 0 0 3px ${t.primary}44`:"none"}}>
                  {t.photo ? (
                    <div style={{height:70,backgroundImage:"url("+t.photo+")",backgroundSize:"cover",backgroundPosition:"center",position:"relative"}}>
                      <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:t.overlay||"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <span style={{fontSize:28}}>{t.emoji}</span>
                      </div>
                    </div>
                  ) : (
                    <div style={{height:70,background:t.header||t.primary||"#8B5CF6"||t.primary||"#8B5CF6",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:28}}>{t.emoji}</span>
                    </div>
                  )}
                  <div style={{padding:"6px 4px",background:theme.id===t.id?"rgba(var(--primary-rgb),.12)":"#FFFFFF",textAlign:"center"}}>
                    <div style={{fontSize:10,fontWeight:700,color:theme.id===t.id?theme.primary:t.primary}}>{t.name}</div>
                  </div>
                </button>
              ))}
            </div>
            <button onClick={()=>saveTheme(DEFAULT_THEME,true)} style={{fontSize:12,color:"var(--primary,#8B5CF6)",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Varsayılanı kullan</button>
          </div>
        </div>
      )}

      {/* Ses tercihi sorusu */}
      {showSoundPrompt && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.6)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#FFFFFF",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderRadius:24,padding:28,width:"100%",maxWidth:320,textAlign:"center",border:"1px solid rgba(212,175,55,.2)",boxShadow:"0 24px 80px rgba(0,0,0,.7)"}}>
            <div style={{fontSize:40,marginBottom:12}}>🔊</div>
            <div style={{fontWeight:700,fontSize:17,color:"#111827",marginBottom:8}}>Sesli Karşılama</div>
            <div style={{fontSize:13,color:"#6B7280",marginBottom:20,lineHeight:1.6}}>
              Her girişinizde sizi sesli karşılayalım mı?
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>saveSoundPref(false)} style={{...S.btnOutline,flex:1,padding:12,fontSize:13,borderColor:theme.primary,color:theme.primary}}>
                Hayır
              </button>
              <button onClick={()=>saveSoundPref(true)} style={{...S.btnPrimary,flex:1,padding:12,fontSize:13,background:theme.primary}}>
                Evet!
              </button>
            </div>
          </div>
        </div>
      )}

      {archiveConfirm && (
        <div onClick={()=>setArchiveConfirm(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.55)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#FFFFFF",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderRadius:22,padding:22,width:"100%",maxWidth:320,border:"1px solid rgba(212,175,55,.15)"}}>
            <div style={{fontSize:32,textAlign:"center",marginBottom:8}}>🗑</div>
            <div style={{fontWeight:700,fontSize:16,color:"#1A1A2E",marginBottom:6,textAlign:"center"}}>Hayvanı Arşivle</div>
            <div style={{fontSize:13,color:"#4B5563",marginBottom:4,textAlign:"center"}}>
              <b>{goats.find(g=>g.id===archiveConfirm)?.name}</b> listeden kaldırılacak.
            </div>
            <div style={{fontSize:12,color:"#9CA3AF",marginBottom:16,textAlign:"center"}}>Rapor bölümünde izleri kalır, geri alınamaz.</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setArchiveConfirm(null)} style={{...S.btnOutline,flex:1,padding:11}}>İptal</button>
              <button onClick={()=>archiveGoat(archiveConfirm)} style={{...S.btnPrimary,flex:1,padding:11,background:"#C0392B",border:"none"}}>Arşivle</button>
            </div>
          </div>
        </div>
      )}

      <div style={{...S.header,background:theme.headerBg||"rgba(255,255,255,.88)",position:"relative",zIndex:10}}>
        {page==="home"
          ? <span style={{fontSize:20}}>🐐</span>
          : <button onClick={goBack} style={{...S.ghost,color:"rgba(212,175,55,.7)",fontSize:26,padding:"0 8px 0 0",lineHeight:1,fontWeight:300}}>‹</button>
        }
        <div style={{flex:1}}>
          <div style={{color:"#111827",fontWeight:700,fontSize:15,letterSpacing:"-.2px"}}>{selGoat&&goat?goat.name:selBreed&&breed?breed.name:page==="home"?"Hayvancılık":page==="health"?"Sağlık Kayıtları":page==="vaccines"?"Aşı Takvimi":page==="births"?"Doğum Kayıtları":page==="deaths"?"Ölüm Kayıtları":page==="group_tx"?"Toplu Tedavi":page==="reports"?"Raporlar":page==="profile"?"Profil":"Hayvancılık"}</div>
          <div style={{color:"var(--primary,#8B5CF6)",fontSize:9,letterSpacing:".3px"}}>
            {isGuest?"👁 Misafir · Sadece Görüntüleme":"☁️ "+currentUser+" · "+activeGoats.length+" keçi"}
          </div>
        </div>
        {isGuest
          ? <div style={{background:"rgba(255,165,0,.25)",borderRadius:8,padding:"3px 8px",fontSize:10,color:"#FFD700",fontWeight:700}}>MISAFIR</div>
          : <button onClick={()=>{setPage("profile");setSelBreed(null);setSelGoat(null);}} style={{...S.ghost,padding:0}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>👤</div>
            </button>
        }
      </div>

      <div style={{padding:"10px 14px "+(page==="home"?"20px":"84px"),position:"relative",zIndex:1}} data-content>

        {/* HOME */}
        {page==="home" && (
          <div className="anim-fade">
            {/* Duyurular */}
            <AnnouncementBox
              announcements={announcements}
              setAnnouncements={setAnnouncements}
              currentUser={currentUser}
              vaccineReports={vaccineReports}
            />

            {/* Hava Durumu */}
            <WeatherWidget/>

            {/* Son İşlemler */}
            <RecentActivities
              activities={activityLogs}
              onDelete={async(id)=>{
                await sb.from("activity_logs").delete().eq("id",id);
                setActivityLogs(p=>p.filter(a=>a.id!==id));
              }}
              currentUser={currentUser}
            />

            {/* Hero Banner */}
            <div style={{
              background:"linear-gradient(135deg,rgba(212,175,55,.1) 0%,#FFFFFF 100%)",
              borderRadius:22,padding:"18px 16px",marginBottom:12,
              border:"1px solid rgba(212,175,55,.18)",

            }}>

                <Stat v={breedStats[breed.id].oglak} l="Oğlak" bg="rgba(184,96,42,.15)" c="#E8975A"/>

                </div>}
                {goats.filter(g=>g.breed===breed.id&&g.category===catTab&&!g.archived).map((g,i)=>(

                    <div onClick={()=>{setSelGoat(g.id);setDetailTab("info");}} style={{width:40,height:40,borderRadius:"50%",background:breed.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,cursor:"pointer"}}>
