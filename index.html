function WeatherWidget() {
  const [weather, setWeather] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(()=>{
    fetch("https://api.open-meteo.com/v1/forecast?latitude=37.7167&longitude=30.2833&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,apparent_temperature&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Europe%2FIstanbul&forecast_days=4")
      .then(r=>r.json())
      .then(data=>{
        const cur=data.current;
        const daily=data.daily;
        const ic=(code)=>code===0?"☀️":code<=2?"🌤️":code<=3?"☁️":code<=48?"🌫️":code<=67?"🌧️":code<=77?"❄️":code<=82?"🌦️":"⛈️";
        const dc=(code)=>code===0?"Açık":code<=2?"Az bulutlu":code<=3?"Bulutlu":code<=48?"Sisli":code<=67?"Yağmurlu":code<=77?"Karlı":code<=82?"Sağanak":"Fırtınalı";
        const days=["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"];
        setWeather({
          temp:Math.round(cur.temperature_2m),
          feels:Math.round(cur.apparent_temperature),
          humidity:cur.relative_humidity_2m,
          wind:Math.round(cur.wind_speed_10m),
          icon:ic(cur.weather_code),
          desc:dc(cur.weather_code),
          forecast:daily.time.slice(1,4).map((date,i)=>({
            day:days[new Date(date).getDay()],
            max:Math.round(daily.temperature_2m_max[i+1]),
            min:Math.round(daily.temperature_2m_min[i+1]),
            icon:ic(daily.weather_code[i+1])
          }))
        });
        setLoading(false);
      })
      .catch(()=>setLoading(false));
  },[]);

  if(!weather) return null;
  return (
    <div style={{background:"linear-gradient(135deg,#EEF2FF,#FFFFFF)",borderRadius:18,padding:16,marginBottom:12,border:"1px solid rgba(99,102,241,.12)",boxShadow:"0 2px 12px rgba(0,0,0,.05)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:38,lineHeight:1}}>{weather.icon}</div>
          <div>
            <div style={{fontSize:10,color:"#9CA3AF",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px"}}>📍 Burdur</div>
            <div style={{fontSize:26,fontWeight:800,color:"#111827",lineHeight:1}}>{weather.temp}°<span style={{fontSize:13,color:"#6B7280"}}>C</span></div>
            <div style={{fontSize:11,color:"#6B7280"}}>{weather.desc}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:"#9CA3AF"}}>Hissedilen</div>
          <div style={{fontSize:15,fontWeight:700,color:"#374151"}}>{weather.feels}°C</div>
          <div style={{fontSize:11,color:"#9CA3AF",marginTop:3}}>💧{weather.humidity}% · 💨{weather.wind}km/s</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,borderTop:"1px solid rgba(0,0,0,.06)",paddingTop:8}}>
        {weather.forecast.map(function(f,i){return (
          <div key={i} style={{flex:1,textAlign:"center",background:"rgba(99,102,241,.06)",borderRadius:10,padding:"6px 4px"}}>
            <div style={{fontSize:10,color:"#9CA3AF",fontWeight:600}}>{f.day}</div>
            <div style={{fontSize:16,margin:"3px 0"}}>{f.icon}</div>
            <div style={{fontSize:11,fontWeight:700,color:"#374151"}}>{f.max}°</div>
            <div style={{fontSize:10,color:"#9CA3AF"}}>{f.min}°</div>
          </div>
        );})}
      </div>
    </div>
  );
}

  const [selGoatType, setSelGoatType] = React.useState(0);

  /* ── LocalStorage bölüm kaydı ── */
  React.useEffect(function(){
    try {
      var saved = localStorage.getItem("goat_sling_level");
      if(saved) setSavedLevel(parseInt(saved)||0);
    } catch(e){}
  },[]);

  var saveProgress = function(lvl) {
    try { localStorage.setItem("goat_sling_level", String(lvl)); } catch(e){}
    setSavedLevel(lvl);
  };

  /* ── Fizik Başlat ── */
  var initLevel = function(lvlIdx) {
    var lvl = LEVELS[lvlIdx];
    var goatQueue = lvl.goats.slice();
    var gt = GOAT_TYPES[goatQueue[0]||0];
    st.current = {
      goat: {x:SLING_X, y:SLING_Y, r:gt.radius, vx:0, vy:0, active:false, launched:false, bounce:0},
      goatQueue: goatQueue,
      goatQueueIdx: 0,
      gt: gt,
      targets: lvl.targets.map(function(t,i){return Object.assign({},t,{id:i,w:34,h:34,curHp:t.hp});}),
      blocks: (lvl.blocks||[]).map(function(b){return Object.assign({},b,{alive:true});}),
      particles: [],
      score: 0,
      dragging: false,
      dragPos: null,
      launched: false,
      done: false,
      fail: false,
      ground: H - 55,
    };
    setUi({score:0, goatsLeft:goatQueue.length, levelDone:false, levelFail:false, goatIdx:0});
  };

  var nextGoat = function(s) {
    s.goatQueueIdx++;
    if(s.goatQueueIdx >= s.goatQueue.length) {
      s.fail = true; return;
    }
    var gt = GOAT_TYPES[s.goatQueue[s.goatQueueIdx]||0];
    s.gt = gt;
    s.goat = {x:SLING_X, y:SLING_Y, r:gt.radius, vx:0, vy:0, active:false, launched:false, bounce:0};
    s.launched = false; s.dragging = false; s.dragPos = null;
  };

  /* ── Canvas Loop ── */
  var loop = function() {
    var canvas = canvasRef.current;
    if(!canvas) return;
    var ctx = canvas.getContext("2d");
    var s = st.current;
    if(!s) { animRef.current = requestAnimationFrame(loop); return; }

    /* Fizik */
    if(s.launched && !s.done && !s.fail) {
      var g = s.goat;
      g.x += g.vx; g.y += g.vy; g.vy += GRAVITY; g.vx *= 0.995;

      /* Zemin */
      if(g.y + g.r > s.ground) {
        g.y = s.ground - g.r; g.vy *= -0.35; g.vx *= 0.6; g.bounce++;
        if(g.bounce > 2 || Math.abs(g.vy)<0.8) { nextGoat(s); }
      }
      /* Ekran dışı */
      if(g.x > W+60 || g.x < -60) { nextGoat(s); }

      /* Hedef çarpışma */
      s.targets.forEach(function(t){
        if(t.curHp<=0) return;
        if(g.x+g.r>t.x && g.x-g.r<t.x+t.w && g.y+g.r>t.y && g.y-g.r<t.y+t.h){
          t.curHp -= s.gt.mass;
          var pts = Math.ceil(50 * s.gt.mass);
          s.score += pts;
          if(t.curHp<=0){
            s.score += 100;
            for(var i=0;i<10;i++){
              var a=Math.random()*Math.PI*2;
              s.particles.push({x:t.x+t.w/2,y:t.y+t.h/2,vx:Math.cos(a)*4,vy:Math.sin(a)*4-2,life:1,r:6,c:"#FFD700"});
            }
          }
          g.vx *= (0.5/s.gt.mass); g.vy *= (0.5/s.gt.mass);
          setUi(function(u){return Object.assign({},u,{score:s.score});});
        }
      });

      /* Blok çarpışma */
      s.blocks.forEach(function(b){
        if(!b.alive) return;
        if(g.x+g.r>b.x && g.x-g.r<b.x+b.w && g.y+g.r>b.y && g.y-g.r<b.y+b.h){
          g.vx *= (0.4/s.gt.mass); g.vy *= (0.4/s.gt.mass);
        }
      });

      /* Partiküller */
      s.particles = s.particles.filter(function(p){return p.life>0;});
      s.particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.035;});

      /* Kazandı mı? */
      var allDead = s.targets.every(function(t){return t.curHp<=0;});
      if(allDead && !s.done){ s.done=true; setUi(function(u){return Object.assign({},u,{levelDone:true,score:s.score});}); }
      if(s.fail && !s.done){ setUi(function(u){return Object.assign({},u,{levelFail:true});}); }
    }

    /* Çiz */
    // Gökyüzü
    var grd = ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,"#87CEEB"); grd.addColorStop(1,"#C8E6C9");
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
    // Bulutlar
    ctx.fillStyle="rgba(255,255,255,.75)";
    [[55,55,38],[160,38,26],[290,65,32]].forEach(function(b){
      ctx.beginPath();ctx.arc(b[0],b[1],b[2],0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(b[0]+25,b[1]+6,b[2]-10,0,Math.PI*2);ctx.fill();
    });
    // Arka plan - çiftlik
    ctx.fillStyle="#2D5A1B"; ctx.fillRect(0,H-55,W,55);
    ctx.fillStyle="#3D7A2B"; ctx.fillRect(0,H-57,W,4);
    // Cezaevi çitleri arka planda
    ctx.strokeStyle="rgba(100,60,20,.3)"; ctx.lineWidth=2;
    for(var fx=160;fx<W;fx+=18){
      ctx.beginPath();ctx.moveTo(fx,H-55);ctx.lineTo(fx,H-75);ctx.stroke();
    }
    ctx.beginPath();ctx.moveTo(160,H-68);ctx.lineTo(W,H-68);ctx.stroke();

    // Sapan
    ctx.strokeStyle="#6B3A1F"; ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(SLING_X-14,SLING_Y+12);ctx.lineTo(SLING_X-14,SLING_Y-44);ctx.stroke();
    ctx.beginPath();ctx.moveTo(SLING_X+14,SLING_Y+12);ctx.lineTo(SLING_X+14,SLING_Y-44);ctx.stroke();
    // Sapan lastiği
    var gx=s.goat.x, gy=s.goat.y;
    ctx.strokeStyle="#C0824A"; ctx.lineWidth=3;
    if(!s.launched){
      ctx.beginPath();ctx.moveTo(SLING_X-14,SLING_Y-44);ctx.lineTo(gx,gy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(SLING_X+14,SLING_Y-44);ctx.lineTo(gx,gy);ctx.stroke();
    }

    // Bloklar
    s.blocks.forEach(function(b){
      if(!b.alive) return;
      ctx.font=b.h+"px serif";
      ctx.fillText(b.emoji,b.x,b.y+b.h-4);
    });

    // Hedefler
    s.targets.forEach(function(t){
      if(t.curHp<=0) return;
      ctx.font=t.h+"px serif";
      ctx.fillText(t.emoji,t.x,t.y+t.h-2);
      // HP bar
      if(t.hp>1){
        ctx.fillStyle="rgba(0,0,0,.3)";ctx.fillRect(t.x,t.y-8,t.w,5);
        ctx.fillStyle="#EF4444";ctx.fillRect(t.x,t.y-8,t.w*(t.curHp/t.hp),5);
      }
    });

    // Partiküller
    s.particles.forEach(function(p){
      ctx.globalAlpha=p.life; ctx.fillStyle=p.c;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    }); ctx.globalAlpha=1;

    // Yön çizgisi
    if(s.dragging && !s.launched){
      var dx=SLING_X-gx, dy=SLING_Y-gy;
      var pvx=dx*0.3*s.gt.speed, pvy=dy*0.3*s.gt.speed;
      ctx.strokeStyle="rgba(255,220,0,.55)"; ctx.lineWidth=2; ctx.setLineDash([5,5]);
      ctx.beginPath(); ctx.moveTo(gx,gy);
      var tx=gx,ty=gy,tvx=pvx,tvy=pvy;
      for(var i=0;i<25;i++){tx+=tvx;ty+=tvy;tvy+=GRAVITY;ctx.lineTo(tx,ty);if(ty>s.ground)break;}
      ctx.stroke(); ctx.setLineDash([]);
    }

    // Keçi
    if(!s.fail || s.goat.bounce<3){
      ctx.font=(s.goat.r*2.4)+"px serif";
      ctx.fillText(s.gt.emoji, gx-s.goat.r, gy+s.goat.r*0.8);
    }

    // Skor
    ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fillRect(4,4,110,28); ctx.fillStyle="#fff";
    ctx.font="bold 13px Poppins,sans-serif";
    ctx.fillText("🏆 "+s.score, 10, 22);

    // Kalan keçi
    var rem = s.goatQueue.length - s.goatQueueIdx;
    ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fillRect(W-80,4,76,28); ctx.fillStyle="#fff";
    ctx.font="13px serif";
    var goatIcons="";
    for(var gi=0;gi<Math.min(rem,5);gi++) goatIcons+=GOAT_TYPES[s.goatQueue[s.goatQueueIdx+gi]||0].emoji;
    ctx.fillText(goatIcons, W-76, 22);

    animRef.current = requestAnimationFrame(loop);
  };

  /* ── Touch/Mouse ── */
  var getPos = function(e){
    var canvas=canvasRef.current; var rect=canvas.getBoundingClientRect();
    var sx=W/rect.width, sy=H/rect.height;
    var cx=e.touches?e.touches[0].clientX:e.clientX;
    var cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:(cx-rect.left)*sx, y:(cy-rect.top)*sy};
  };
  var onDown=function(e){
    e.preventDefault(); var s=st.current; if(!s||s.launched||s.done||s.fail) return;
    var p=getPos(e); var dx=p.x-s.goat.x,dy=p.y-s.goat.y;
    if(Math.sqrt(dx*dx+dy*dy)<50){s.dragging=true;}
  };
  var onMove=function(e){
    e.preventDefault(); var s=st.current; if(!s||!s.dragging) return;
    var p=getPos(e); var MAX=72;
    var dx=p.x-SLING_X,dy=p.y-SLING_Y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>MAX){dx=dx/dist*MAX;dy=dy/dist*MAX;}
    s.goat.x=SLING_X+dx; s.goat.y=SLING_Y+dy;
  };
  var onUp=function(e){
    e.preventDefault(); var s=st.current; if(!s||!s.dragging) return;
    s.dragging=false;
    var dx=SLING_X-s.goat.x,dy=SLING_Y-s.goat.y;
    var spd=0.3*s.gt.speed;
    s.goat.vx=dx*spd; s.goat.vy=dy*spd;
    s.launched=true;
  };

  /* ── Ekran Geçişleri ── */
  var startLevel = function(idx){
    setCurLevel(idx); initLevel(idx); setScreen("game");
    cancelAnimationFrame(animRef.current);
    animRef.current = requestAnimationFrame(loop);
  };
  var onLevelDone = function(){
    var next = curLevel+1;
    if(next > savedLevel) saveProgress(next);
    if(next >= LEVELS.length){ setScreen("gameover"); return; }
    startLevel(next);
  };
  var onRetry = function(){ startLevel(curLevel); };

  React.useEffect(function(){
    return function(){cancelAnimationFrame(animRef.current);};
  },[]);

  /* ── Bölüm Seçimi Ekranı ── */
  if(screen==="levelsel") return (
    <div className="anim-fade">
      <h2 style={{margin:"0 0 4px",fontSize:17,fontWeight:800,color:"#111827"}}>🐐 Keçi Fırlatma</h2>
      <div style={{fontSize:11,color:"#9CA3AF",marginBottom:14}}>Bölüm seç · {savedLevel+1}/{LEVELS.length} açık</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:16}}>
        {LEVELS.map(function(lv,i){
          var unlocked = i<=savedLevel;
          return (
            <button key={i} onClick={function(){if(unlocked) startLevel(i);}}
              style={{aspectRatio:"1",borderRadius:12,border:"none",
                background:i<savedLevel?"#D1FAE5":i===savedLevel?"linear-gradient(135deg,#8B5CF6,#7C3AED)":"#F3F4F6",
                color:i<=savedLevel?"#111":"#D1D5DB",fontWeight:800,fontSize:15,cursor:unlocked?"pointer":"not-allowed",
                boxShadow:i===savedLevel?"0 2px 8px rgba(139,92,246,.4)":"none",WebkitAppearance:"none"}}>
              {unlocked ? (i+1) : "🔒"}
            </button>
          );
        })}
      </div>
      <div style={{background:"#F5F3FF",borderRadius:14,padding:"12px 14px",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:13,color:"#5B21B6",marginBottom:8}}>🐐 Keçi Türleri</div>
        {GOAT_TYPES.map(function(gt,i){return (
          <div key={gt.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,background:"#fff",borderRadius:10,padding:"8px 10px"}}>
            <span style={{fontSize:24}}>{gt.emoji}</span>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:"#111"}}>{gt.name} Keçi</div>
              <div style={{fontSize:10,color:"#9CA3AF"}}>Güç:{Math.round(gt.mass*10)} · Hız:{Math.round(gt.speed*10)} · R:{gt.radius}</div>
            </div>
          </div>
        );})}
      </div>
    </div>
  );

  /* ── Oyun Bitti Ekranı ── */
  if(screen==="gameover") return (
    <div className="anim-fade" style={{textAlign:"center",paddingTop:40}}>
      <div style={{fontSize:60,marginBottom:12}}>🏆</div>
      <div style={{fontWeight:800,fontSize:22,color:"#111827",marginBottom:8}}>Tebrikler!</div>
      <div style={{fontSize:14,color:"#6B7280",marginBottom:20}}>Tüm bölümleri tamamladın!</div>
      <button onClick={function(){saveProgress(0);setSavedLevel(0);setScreen("levelsel");}}
        style={{background:"linear-gradient(135deg,#8B5CF6,#7C3AED)",color:"#fff",border:"none",borderRadius:14,padding:"12px 28px",fontWeight:700,fontSize:15,cursor:"pointer"}}>
        🔄 Baştan Başla
      </button>
    </div>
  );

  /* ── Oyun Ekranı ── */
  return (
    <div className="anim-fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={function(){cancelAnimationFrame(animRef.current);setScreen("levelsel");}}
            style={{background:"rgba(var(--primary-rgb),.1)",color:"var(--primary,#8B5CF6)",border:"none",borderRadius:8,padding:"5px 10px",fontWeight:600,fontSize:11,cursor:"pointer"}}>← Geri</button>
          <span style={{fontWeight:700,fontSize:14,color:"#111"}}>Bölüm {curLevel+1}</span>
        </div>
        <button onClick={onRetry}
          style={{background:"rgba(239,68,68,.1)",color:"#EF4444",border:"none",borderRadius:8,padding:"5px 10px",fontWeight:600,fontSize:11,cursor:"pointer"}}>🔄 Tekrar</button>
      </div>
      <div style={{fontSize:10,color:"#9CA3AF",marginBottom:6,textAlign:"center"}}>
        🐐 Keçiye bas, geri çek, bırak! Tüm 👮 figürlerini yık
      </div>
      <div style={{position:"relative",borderRadius:16,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,.15)"}}>
        <canvas ref={canvasRef} width={W} height={H}
          style={{width:"100%",display:"block",touchAction:"none"}}
          onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp}
          onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}/>
        {ui.levelDone && (
          <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.65)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:50,marginBottom:8}}>🎉</div>
            <div style={{color:"#fff",fontWeight:800,fontSize:20,marginBottom:4}}>Bölüm Tamamlandı!</div>
            <div style={{color:"#FFD700",fontWeight:700,fontSize:16,marginBottom:18}}>🏆 {ui.score} puan</div>
            <button onClick={onLevelDone}
              style={{background:"linear-gradient(135deg,#10B981,#059669)",color:"#fff",border:"none",borderRadius:14,padding:"12px 28px",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:8}}>
              ➡️ Sonraki Bölüm
            </button>
            <button onClick={onRetry}
              style={{background:"#F0F0F5",color:"#fff",border:"none",borderRadius:12,padding:"8px 20px",fontWeight:600,fontSize:13,cursor:"pointer"}}>
              🔄 Tekrar Oyna
            </button>
          </div>
        )}
        {ui.levelFail && !ui.levelDone && (
          <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.65)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{fontSize:50,marginBottom:8}}>😅</div>
            <div style={{color:"#fff",fontWeight:800,fontSize:20,marginBottom:4}}>Keçiler Bitti!</div>
            <div style={{color:"#FCA5A5",fontSize:13,marginBottom:18}}>Hedeflerin bir kısmı kaldı</div>
            <button onClick={onRetry}
              style={{background:"linear-gradient(135deg,#EF4444,#DC2626)",color:"#fff",border:"none",borderRadius:14,padding:"12px 28px",fontWeight:700,fontSize:15,cursor:"pointer"}}>
              🔄 Tekrar Dene
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function GoatMatchGame() {
  const PAIRS = [
    {id:"a",emoji:"🐐",name:"Keçi"},{id:"b",emoji:"🐑",name:"Koyun"},
    {id:"c",emoji:"🦙",name:"Lama"},{id:"d",emoji:"🐏",name:"Koç"},
    {id:"e",emoji:"🐮",name:"İnek"},{id:"f",emoji:"🐷",name:"Domuz"},
    {id:"g",emoji:"🐔",name:"Tavuk"},{id:"h",emoji:"🦆",name:"Ördek"},
  ];
  const LIMIT = 120;
  const init = function() {
    var deck = PAIRS.concat(PAIRS).map(function(b,i){return Object.assign({},b,{uid:i,flipped:false,matched:false});});
    return deck.sort(function(){return Math.random()-.5;});
  };
  const [cards,setCards] = React.useState(init);
  const [flipped,setFlipped] = React.useState([]);
  const [moves,setMoves] = React.useState(0);
  const [won,setWon] = React.useState(false);
  const [lost,setLost] = React.useState(false);
  const [time,setTime] = React.useState(0);
  const [running,setRunning] = React.useState(false);
  const timer = React.useRef(null);

  React.useEffect(function(){
    if(running&&!won&&!lost){
      timer.current=setInterval(function(){
        setTime(function(t){
          if(t+1>=LIMIT){setRunning(false);setLost(true);return LIMIT;}
          return t+1;
        });
      },1000);
    } else { clearInterval(timer.current); }
    return function(){clearInterval(timer.current);};
  },[running,won,lost]);

  var doReset = function(){
    clearInterval(timer.current);
    setCards(init());setFlipped([]);setMoves(0);
    setWon(false);setLost(false);setTime(0);setRunning(false);
  };

  var doFlip = function(card){
    if(card.flipped||card.matched||flipped.length===2||lost||won) return;
    if(!running) setRunning(true);
    var nc=cards.map(function(x){return x.uid===card.uid?Object.assign({},x,{flipped:true}):x;});
    var nf=flipped.concat([card]);
    setCards(nc);setFlipped(nf);
    if(nf.length===2){
      setMoves(function(m){return m+1;});
      if(nf[0].id===nf[1].id){
        setTimeout(function(){
          var mc=nc.map(function(x){return x.id===nf[0].id?Object.assign({},x,{matched:true}):x;});
          setCards(mc);setFlipped([]);
          if(mc.every(function(x){return x.matched;})){setWon(true);setRunning(false);}
        },400);
      } else {
        setTimeout(function(){
          setCards(function(p){return p.map(function(x){return nf.some(function(f){return f.uid===x.uid;})?Object.assign({},x,{flipped:false}):x;});});
          setFlipped([]);
        },900);
      }
    }
  };

  var rem = LIMIT-time;
  var tc = rem<=20?"#EF4444":rem<=60?"#D97706":"#059669";
  var fmt = function(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");};
  var matched = cards.filter(function(x){return x.matched;}).length/2;

  return (
    <div className="anim-fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <h2 style={{margin:0,fontSize:17,fontWeight:800,color:"#111827"}}>🐐 Keçi Eşleştirme</h2>
        <button onClick={doReset} style={{background:"rgba(var(--primary-rgb),.1)",color:"var(--primary,#8B5CF6)",border:"none",borderRadius:10,padding:"6px 12px",fontWeight:600,fontSize:12,cursor:"pointer"}}>🔄 Yeniden</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        {[{v:moves,l:"HAMLE",col:"var(--primary,#8B5CF6)"},{v:fmt(rem),l:"SÜRE",col:tc},{v:matched+"/8",l:"EŞLEŞTİ",col:"#D97706"}].map(function(x){return (
          <div key={x.l} style={{flex:1,background:"#FFFFFF",borderRadius:12,padding:"8px 6px",textAlign:"center",border:"1.5px solid rgba(0,0,0,.05)"}}>
            <div style={{fontSize:17,fontWeight:800,color:x.col}}>{x.v}</div>
            <div style={{fontSize:9,color:"#9CA3AF",fontWeight:600}}>{x.l}</div>
          </div>
        );})}
      </div>
      <div style={{height:5,background:"#F3F4F6",borderRadius:10,marginBottom:10,overflow:"hidden"}}>
        <div style={{height:"100%",width:(rem/LIMIT*100)+"%",background:tc,borderRadius:10,transition:"width 1s linear"}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
        {cards.map(function(card){return (
          <button key={card.uid} onClick={function(){doFlip(card);}} style={{
            aspectRatio:"1",borderRadius:14,padding:0,border:card.matched?"2px solid #10B981":card.flipped?"2px solid var(--primary,#8B5CF6)":"2px solid #E5E7EB",
            background:card.matched?"#ECFDF5":card.flipped?"rgba(var(--primary-rgb),.08)":"#F9FAFB",
            cursor:card.matched||card.flipped||lost?"default":"pointer",
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",

}

  if (d>365) return `${Math.floor(d/365)}y ${Math.floor((d%365)/30)}a`;

};
const nextVaccineDate = (goatId, vaccineTypeId, vaccines) => {
  const vt = VACCINE_DEFS.find(v=>v.id===vaccineTypeId);

  if (!last||!vt) return null;
  const d = new Date(last.date); d.setDate(d.getDate()+vt.intervalDays);
  return d.toISOString().split("T")[0];
};

// ── Küpe Okuma ──
// ── Sağlık Kaydı Detay & Log ──
function HealthDetailModal({ record, goat, logs, treatmentDays, onUpdate, onClose, onFinalize, currentUser, onLogsUpdate, onTreatmentDayUpdate }) {
  const [status,    setStatus]    = useState(record.status);
  const [treatment, setTreatment] = useState(record.treatment||"");
  const [notes,     setNotes]     = useState(record.notes||"");
  const [saving,    setSaving]    = useState(false);
  const [showClose, setShowClose] = useState(false);
  const [closeReason, setCloseReason] = useState("");
  const [closeNote,   setCloseNote]   = useState("");
  const [tab, setTab] = useState("detay");
  const [treatmentChanged, setTreatmentChanged] = useState(false);
  const [markingDay, setMarkingDay] = useState(null);

  const recLogs = logs.filter(l=>l.healthRecordId===record.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const recDays = treatmentDays.filter(d=>d.healthRecordId===record.id).sort((a,b)=>a.dayNumber-b.dayNumber);
  const today = todayISO();

  const markDay = async (day) => {
    if(day.done) return;
    setMarkingDay(day.id);
    const now = new Date().toISOString();
    await sb.from("treatment_days").update({done:true, done_by:currentUser, done_at:now}).eq("id",day.id);
    onTreatmentDayUpdate({...day, done:true, doneBy:currentUser, doneAt:now});
    setMarkingDay(null);
  };

  const save = async () => {
    setSaving(true);
    const changes = [];
    if (status!==record.status) changes.push(`Durum değişti: "${record.status}" → "${status}"`);
    if (treatment!==record.treatment) changes.push(`Tedavi güncellendi`);
    if (notes!==record.notes && notes) changes.push(`Not eklendi`);
    const { error } = await sb.from("health_records").update({ status, treatment, notes }).eq("id", record.id);
    if (!error) {
      const detail = changes.length>0 ? changes.join(" · ") : "Kayıt güncellendi";
      const gId = goat?.id || record.goatId;
      const gBreed = goat?.breed || record.breed;
      await addLog(record.id, gId, gBreed, "güncelleme", detail, currentUser);
      const newLog = { id:"l"+Date.now(), healthRecordId:record.id, goatId:gId, breed:gBreed, action:"güncelleme", actionDetail:detail, userName:currentUser, createdAt:new Date().toISOString() };
      onLogsUpdate(newLog);
      onUpdate({ ...record, status, treatment, notes });
    }
    setSaving(false);
  };

  const finalize = async () => {
    if (!closeReason) return;
    setSaving(true);
    const report = {
      id:"r"+Date.now(), goatId:goat?.id||record.goatId, goatName:goat?.name||record.goatEarTag||"—", goatEarTag:goat?.earTag||record.goatEarTag||"—", breed:goat?.breed||record.breed,
      dateStarted:record.date, dateClosed:todayISO(), condition:record.condition,
      treatment, closeReason, closeNote, veterinarian:record.veterinarian, cost:"", createdByName:currentUser, notes
    };
    await sb.from("health_records").update({ closed:true, status:closeReason==="Hayvan Öldü"?"öldü":"iyileşti" }).eq("id", record.id);
    await sb.from("reports").insert(fromReport(report));
    await addLog(record.id, goat?.id||record.goatId, goat?.breed||record.breed, "sonlandırma", `Neden: ${closeReason}${closeNote?" — "+closeNote:""}`, currentUser);
    onFinalize(record.id, report);
    setSaving(false);
  };

  if (showClose) return <ModalWrap title="📋 Kaydı Sonlandır" onClose={()=>setShowClose(false)}>
    <div style={{background:"rgba(var(--primary-rgb),.08)",border:"1px solid #F0D49A",borderRadius:10,padding:10,fontSize:12,color:"#E8975A"}}>
      ⚠️ Bu kayıt sonlandırılacak ve rapor bölümüne taşınacak.
    </div>
    <FL>Sonlandırma Nedeni *</FL>
    <select value={closeReason} onChange={e=>setCloseReason(e.target.value)} style={S.select}>
      <option value="">— Seçin —</option>
      {CLOSE_REASONS.map(r=><option key={r} value={r}>{r}</option>)}
    </select>
    <FL>Ek Not</FL>
    <textarea value={closeNote} onChange={e=>setCloseNote(e.target.value)} rows={3} placeholder="Sonuç hakkında not..."/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={()=>setShowClose(false)} style={{...S.btnOutline,flex:1,padding:12}}>Geri</button>
      <button onClick={finalize} disabled={!closeReason||saving} style={{...S.btnPrimary,flex:2,padding:12,background:"#C0392B",opacity:(!closeReason||saving)?.5:1}}>{saving?"Kaydediliyor...":"✅ Sonlandır"}</button>
    </div>
  </ModalWrap>;

  return <ModalWrap title={`🩺 ${record.condition}`} onClose={onClose}>
    <div style={{background:"#F5F5F5",borderRadius:10,padding:10,fontSize:12}}>
      {goat ? <><b>{goat.name}</b> · 🏷 {goat.earTag}</> : <><b>🏷 {record.goatEarTag||"—"}</b></>} · Başlangıç: {fmt(record.date)}
    </div>
    <div style={{display:"flex",background:"#F3F4F6",borderRadius:8,overflow:"hidden",marginTop:4}}>
      {[["detay","✏️ Güncelle"],["takvim","📅 Takvim"],["gecmis","📋 Geçmiş"]].map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 0",border:"none",fontWeight:700,fontSize:12,cursor:"pointer",background:tab===k?"#4A7C3F":"transparent",color:tab===k?"#fff":"#8c8c7e"}}>{l}</button>
      ))}
    </div>

    {tab==="detay" && <>
      <FL>Durum</FL>
      <StatusPicker value={status} onChange={setStatus}/>
      <FL>Tedavi / Yapılan İşlem</FL>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"6px 10px",background:"#E8F5E9",borderRadius:8,border:"1px solid #D4E8C2"}}>
        <input type="checkbox" id="sameTreatment" checked={!treatmentChanged}
          onChange={e=>setTreatmentChanged(!e.target.checked)}
          style={{width:16,height:16,cursor:"pointer"}}/>
        <label htmlFor="sameTreatment" style={{fontSize:12,color:"#10B981",fontWeight:600,cursor:"pointer"}}>
          Aynı tedavi devam ediyor (değişiklik yok)
        </label>
      </div>
      <VoiceInput value={treatment} onChange={v=>{setTreatment(v);setTreatmentChanged(true);}} placeholder="İlaç, doz, işlem..." multiline rows={3}/>
      <FL>Notlar</FL>
      <VoiceInput value={notes} onChange={setNotes} placeholder="Not ekle..." multiline rows={2}/>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={()=>setShowClose(true)} style={{...S.btnSm,background:"rgba(239,68,68,.1)",color:"#EF4444",padding:"10px 14px",fontSize:12}}>📋 Sonlandır</button>
        <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:1,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Güncelle"}</button>
      </div>
    </>}

    {tab==="takvim" && (
      <div>
        {/* Tedavi notu özeti */}
        {record.treatment && (
          <div style={{background:"#E8F5E9",border:"1px solid #D4E8C2",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#10B981",marginBottom:2}}>💊 Tedavi</div>
            <div style={{fontSize:12,color:"#1F2937"}}>{record.treatment}</div>
          </div>
        )}
        {record.notes && (
          <div style={{background:"#F5F5F5",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#6B7280",marginBottom:2}}>📝 Not</div>
            <div style={{fontSize:12,color:"#6B7280"}}>{record.notes}</div>
          </div>
        )}
        {recDays.length===0 && (
          <div style={{textAlign:"center",padding:20,color:"#9CA3AF",fontSize:13}}>
            <div style={{fontSize:32,marginBottom:8}}>📅</div>
            Bu kayıt için tedavi takvimi oluşturulmamış.
          </div>
        )}
        {recDays.map(day=>{
          const isPast = day.plannedDate < today;
          const isToday = day.plannedDate === today;
          const isFuture = day.plannedDate > today;
          const canMark = (isToday || isPast) && !day.done;
          return (
            <div key={day.id} style={{
              borderRadius:12, padding:12, marginBottom:8,
              background: day.done ? "#E3F0DC" : isToday ? "#EEF6FC" : isFuture ? "#F9F9F6" : "#FFF0EE",
              border: `2px solid ${day.done?"#4A7C3F":isToday?"#2873A8":isPast?"#F5C0BA":"#E5E7EB"}`
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:15,color:day.done?"#3D5A25":isToday?"#2873A8":isPast?"#BE3B31":"#8c8c7e"}}>
                    {day.done?"✅":isToday?"🔵":isPast?"⚠️":"⏳"} {day.dayNumber}. Gün
                  </div>
                  <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>
                    📅 {fmt(day.plannedDate)}
                    {isToday && <span style={{color:"#0EA5E9",fontWeight:700}}> — Bugün</span>}
                  </div>
                  {day.done && day.doneBy && (
                    <div style={{fontSize:11,color:"#10B981",fontWeight:700,marginTop:4,background:"rgba(255,255,255,.7)",padding:"4px 8px",borderRadius:6,display:"inline-block"}}>
                      👤 {day.doneBy} · {fmtDT(day.doneAt)}
                    </div>
                  )}
                  {isPast && !day.done && (
                    <div style={{fontSize:11,color:"#EF4444",fontWeight:600,marginTop:2}}>❌ Henüz yapılmadı</div>
                  )}
                  {isFuture && (
                    <div style={{fontSize:11,color:"#6B7280",marginTop:2}}>⏳ {daysUntil(day.plannedDate)} gün sonra</div>
                  )}
                </div>
                {canMark && (
                  <button onClick={()=>markDay(day)} disabled={markingDay===day.id}
                    style={{...S.btnPrimary,fontSize:12,padding:"10px 16px",opacity:markingDay===day.id?.6:1,borderRadius:10,marginLeft:8,flexShrink:0}}>
                    {markingDay===day.id?"⏳":"✅ Yapıldı"}
                  </button>
                )}
              </div>
            </div>
          );
        })}
        {recDays.length>0 && (
          <div style={{background:"#F5F5F5",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#6B7280",marginTop:4}}>
            {recDays.filter(d=>d.done).length}/{recDays.length} gün tamamlandı
          </div>
        )}
      </div>
    )}
    {tab==="gecmis" && <div>
      {recLogs.length===0 && <Empty text="Henüz işlem geçmişi yok"/>}
      {recLogs.map((l,i)=>(
        <div key={l.id} style={{display:"flex",gap:8,padding:"10px 0",borderBottom:i<recLogs.length-1?"1px solid #F2F0EA":"none"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:l.action==="sonlandırma"?"#FFF0EE":l.action==="açılış"?"#E3F0DC":"#EEF6FC",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>
            {l.action==="sonlandırma"?"✅":l.action==="açılış"?"🆕":"✏️"}
          </div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1A1A2E"}}>{l.userName}</div>
              <div style={{fontSize:10,color:"#6B7280",textAlign:"right"}}>{fmtDT(l.createdAt)}</div>
            </div>
            <div style={{fontSize:11,color:"#6B7280",marginTop:2,background:"#F5F5F5",padding:"4px 8px",borderRadius:6}}>{l.actionDetail}</div>
          </div>
        </div>
      ))}

// ── Küpe No Tarayıcı ──
// ── Küpe No Formatı: TR-xx-xxxxxx ──
function EarTagInput({ value, onChange }) {
  const part1Ref = useRef(null);
  const part2Ref = useRef(null);

  const parse = (v) => {
    if(!v) return ["",""];
    const clean = v.replace(/^TR-?/i,"");
    const idx = clean.indexOf("-");
    if(idx===-1) return [clean,""];
    return [clean.slice(0,idx), clean.slice(idx+1)];
  };

  const [p1, p2] = parse(value);
  const build = (a, b) => onChange(`TR-${a}-${b}`);

  // Türkçe kelimeden rakama
  const txtToNums = (txt) => {
    const direct = txt.replace(/[^0-9]/g,"");
    if(direct) return direct;
    let s = txt.toLowerCase()
      .replace(/on\s*dokuz/g,"19").replace(/on\s*sekiz/g,"18").replace(/on\s*yedi/g,"17")
      .replace(/on\s*altı/g,"16").replace(/on\s*beş/g,"15").replace(/on\s*dört/g,"14")
      .replace(/on\s*üç/g,"13").replace(/on\s*iki/g,"12").replace(/on\s*bir/g,"11")
      .replace(/\bon\b/g,"10").replace(/yirmi\s*dokuz/g,"29").replace(/yirmi\s*sekiz/g,"28")
      .replace(/yirmi\s*yedi/g,"27").replace(/yirmi\s*altı/g,"26").replace(/yirmi\s*beş/g,"25")
      .replace(/yirmi\s*dört/g,"24").replace(/yirmi\s*üç/g,"23").replace(/yirmi\s*iki/g,"22")
      .replace(/yirmi\s*bir/g,"21").replace(/\byirmi\b/g,"20")
      .replace(/sıfır/g,"0").replace(/bir/g,"1").replace(/iki/g,"2").replace(/üç/g,"3")
      .replace(/dört/g,"4").replace(/beş/g,"5").replace(/altı/g,"6")
      .replace(/yedi/g,"7").replace(/sekiz/g,"8").replace(/dokuz/g,"9");
    return s.replace(/[^0-9]/g,"");
  };

  const handleMic = (txt) => {
    const nums = txtToNums(txt);
    if(!nums) return;
    // p1 ve p2'yi güncel value'dan al (stale closure'u önle)
    const [cur1, cur2] = parse(value);
    if(cur1.length < 2){
      const newP1 = (cur1+nums).slice(0,2);
      const rest = (cur1+nums).slice(2);
      build(newP1, rest||cur2);
      if(newP1.length===2) setTimeout(()=>part2Ref.current?.focus(),50);
    } else {
      build(cur1, cur2+nums);
    }
  };

  return (
    <div style={{display:"flex",alignItems:"center",gap:4}}>
      <div style={{background:"rgba(var(--primary-rgb),.08)",borderRadius:10,padding:"9px 10px",fontWeight:700,fontSize:14,color:"var(--primary,#8B5CF6)",border:"1px solid rgba(212,175,55,.25)",flexShrink:0,letterSpacing:1}}>TR</div>
      <div style={{color:"#6B7280",fontWeight:700,fontSize:16}}>-</div>
      <input
        ref={part1Ref}
        value={p1}
        maxLength={2}
        placeholder="xx"
        inputMode="numeric"
        onChange={e=>{
          const v=e.target.value.replace(/\D/g,"");
          build(v,p2);
          if(v.length===2) part2Ref.current?.focus();
        }}
        style={{width:46,padding:"9px 8px",borderRadius:10,border:"1px solid rgba(212,175,55,.2)",fontSize:14,textAlign:"center",fontWeight:700,outline:"none",background:"#FFFFFF",color:"#1A1A2E"}}
      />
      <div style={{color:"#6B7280",fontWeight:700,fontSize:16}}>-</div>
      <input
        ref={part2Ref}
        value={p2}
        placeholder="xxxxxx"
        inputMode="numeric"
        onChange={e=>{
          const v=e.target.value.replace(/\D/g,"");
          build(p1,v);
        }}
        style={{flex:1,padding:"9px 10px",borderRadius:10,border:"1px solid rgba(212,175,55,.2)",fontSize:14,fontWeight:700,outline:"none",letterSpacing:1,background:"#FFFFFF",color:"#1A1A2E"}}
      />
      <MicBtn onResult={handleMic} style={{height:38}}/>
    </div>
  );
}


function MicBtn({ onResult, style }) {
  const [listening, setListening] = useState(false);
  const recognitionRef = useRef(null);
  const listeningRef = useRef(false);

  const toggle = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("Tarayıcınız sesli yazma desteklemiyor. Chrome kullanın.");
      return;
    }
    if (listeningRef.current) {
      listeningRef.current = false;
      recognitionRef.current?.stop();
      setListening(false);
      return;
    }
    listeningRef.current = true;
    setListening(true);

    const startRec = () => {
      if (!listeningRef.current) return;
      const r = new SpeechRecognition();
      r.lang = "tr-TR";
      r.continuous = false;
      r.interimResults = false;
      r.onresult = (e) => {
        const text = e.results[0][0].transcript;
        onResult(text);
        // iPhone'da tek sonuç alınca bitir
        listeningRef.current = false;
        setListening(false);
      };
      r.onerror = () => {
        listeningRef.current = false;
        setListening(false);
      };
      r.onend = () => {
        listeningRef.current = false;
        setListening(false);
      };
      recognitionRef.current = r;
      try { r.start(); } catch(e) {
        listeningRef.current = false;
        setListening(false);
      }
    };
    startRec();
  };

  return (
    <button
      type="button"
      onClick={toggle}
      title={listening ? "Dinleniyor... tıkla durdur" : "Sesli yaz"}
      style={{
        background: listening ? "rgba(239,68,68,.15)" : "rgba(var(--primary-rgb),.08)",
        border: `1.5px solid ${listening ? "rgba(190,59,49,.6)" : "rgba(var(--primary-rgb),.2)"}`,
        borderRadius: 10,
        padding: "0 10px",
        cursor: "pointer",
        fontSize: 16,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        minWidth: 38,
        height: "100%",
        animation: listening ? "pulse 1s infinite" : "none",
        transition: "all .2s",
        ...style
      }}>
      {listening ? "⏹" : "🎤"}
    </button>
  );
}

      .replace(/kırk\s*bir/g,"41").replace(/\bkırk\b/g,"40")
      .replace(/elli/g,"50").replace(/altmış/g,"60").replace(/yetmiş/g,"70")
      .replace(/seksen/g,"80").replace(/doksan/g,"90")
      .replace(/sıfır/g,"0").replace(/bir/g,"1").replace(/iki/g,"2").replace(/üç/g,"3")
      .replace(/dört/g,"4").replace(/beş/g,"5").replace(/altı/g,"6")
      .replace(/yedi/g,"7").replace(/sekiz/g,"8").replace(/dokuz/g,"9");
    return s.replace(/[^0-9]/g,"");
  };

  // Gelen metni TR işaretine göre küpe bloklarına ayır
  // Örnek: "TR on 575 35 62 TR 20 265 56" → ["1057535 62","20265 56"]
  const parseSpeechToTags = (txt) => {
    // TR ve çeşitli telaffuzlarını ayraç olarak kullan
    const normalized = txt.replace(/te\s*er|tı\s*er|ti\s*ar|tire|t\.r\./gi, "TR");
    // TR'ye göre böl (baştaki boş parçayı filtrele)
    const parts = normalized.split(/\bTR\b/i).filter(p => p.trim().length > 0);
    return parts.map(p => wordsToNums(p.trim())).filter(n => n.length > 0);
  };

  // Rakamlar → {p1, p2, full}
  const buildTag = (nums) => {
    const p1 = nums.slice(0,2);
    const p2 = nums.slice(2);
    return { p1, p2, full: `TR-${p1}-${p2}` };
  };

  const listeningRef = useRef(false);

  const processResult = (txt) => {
    if(!txt) return;
    const parsed = parseSpeechToTags(txt);
    if(parsed.length > 0){
      const newTags = [...tagsRef.current, ...parsed.map(buildTag)];
      tagsRef.current = newTags;
      onTagsChange(newTags);
    } else {
      const nums = wordsToNums(txt);
      if(!nums) return;
      if(tagsRef.current.length > 0){
        const last = tagsRef.current.length - 1;
        const cur = tagsRef.current[last];
        const combined = cur.p1 + cur.p2 + nums;
        const updated = tagsRef.current.map((t,i)=> i===last ? buildTag(combined) : t);
        tagsRef.current = updated;
        onTagsChange(updated);
      } else {
        const newTags = [buildTag(nums)];
        tagsRef.current = newTags;
        onTagsChange(newTags);
      }
    }
  };

  const startVoice = () => {
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ alert("Sesli yazma desteklenmiyor. Chrome kullanın."); return; }
    if(listeningRef.current){ recRef.current?.stop(); listeningRef.current=false; setListening(false); return; }

    listeningRef.current = true;
    setListening(true);

    const startSession = () => {
      if(!listeningRef.current) return;
      const r = new SR();
      r.lang = "tr-TR";
      // iPhone Safari continuous desteklemez — her oturumda 1 sonuç alıp tekrar başlat
      r.continuous = false;
      r.interimResults = false;

      r.onresult = (e) => {
        const txt = e.results[0][0].transcript.trim();
        processResult(txt);
      };

      r.onerror = (e) => {
        if(e.error === "no-speech") {
          // Ses gelmedi, tekrar dene
          setTimeout(()=>startSession(), 200);
        } else {
          listeningRef.current = false;
          setListening(false);
        }
      };

      r.onend = () => {
        // Oturum bitti — hâlâ dinleme modundaysa yeni oturum başlat (iPhone için)
        if(listeningRef.current) {
          setTimeout(()=>startSession(), 150);
        }
      };

      recRef.current = r;
      try { r.start(); } catch(err) {
        listeningRef.current = false;
        setListening(false);
      }
    };

    startSession();
  };

  // Her satır için ayrı mikrofon: hangi satırın hangi bölümünü dolduracağını bilir
  const rowRefs = useRef({});
  const handleRowMic = (txt, idx) => {
    const nums = wordsToNums(txt);
    if(!nums) return;
    const cur = tagsRef.current[idx] || {p1:"",p2:""};
    let newP1 = cur.p1, newP2 = cur.p2;
    if(cur.p1.length < 2){
      newP1 = (cur.p1 + nums).slice(0,2);
      const rest = (cur.p1 + nums).slice(2);
      newP2 = rest || cur.p2;
      if(newP1.length===2) setTimeout(()=>rowRefs.current[`p2_${idx}`]?.focus(),50);
    } else {
      newP2 = cur.p2 + nums;
    }
    const newTags = tagsRef.current.map((t,j)=>
      j===idx ? {p1:newP1, p2:newP2, full:`TR-${newP1}-${newP2}`} : t
    );
    tagsRef.current = newTags;
    onTagsChange(newTags);
  };

  return (
    <div>
      {/* Sürekli dinleme modu (toplu sesli giriş için) */}
      <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
        <button type="button" onClick={startVoice}
          style={{padding:"8px 14px",borderRadius:10,border:`1.5px solid ${listening?"#BE3B31":"var(--primary,#4A7C3F)"}`,background:listening?"#FFF0EE":"var(--primary-light,#E3F0DC)",color:listening?"#BE3B31":"var(--primary-dark,#3D5A25)",fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          <span>{listening?"⏹":"🎤"}</span>
          {listening?"Toplu Girişi Durdur":"Toplu Sesli Giriş"}
        </button>
        {listening&&<div style={{fontSize:11,color:"#EF4444",fontWeight:600,background:"rgba(239,68,68,.1)",padding:"6px 10px",borderRadius:8,flex:1}}>
          ● Dinleniyor... <b>"TR"</b> = yeni küpe
        </div>}
      </div>

      {/* Elle ekleme butonu */}
      <button type="button" onClick={()=>onTagsChange([...tags,{p1:"",p2:"",full:"TR--"}])}
        style={{width:"100%",padding:"8px",borderRadius:8,border:"1.5px dashed #4A7C3F",background:"#E8F5E9",color:"var(--primary,#8B5CF6)",fontWeight:700,fontSize:12,cursor:"pointer",marginBottom:10}}>
        + Elle Küpe Ekle
      </button>

      {/* Liste — her satır EarTagInput ile aynı yapıda */}
      {tags.length>0&&(
        <div style={{background:"#F0F0F0",borderRadius:14,padding:10,maxHeight:320,overflowY:"auto",border:"1px solid rgba(212,175,55,.08)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#6B7280",marginBottom:8,display:"flex",justifyContent:"space-between"}}>
            <span>📋 Küpe Listesi</span>
            <span style={{color:"var(--primary,#8B5CF6)"}}>{tags.filter(t=>t.p1&&t.p2).length} geçerli</span>
          </div>
          {tags.map((t,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:4,marginBottom:6,background:"#FFFFFF",borderRadius:8,padding:"6px 8px",border:`1px solid ${t.p1&&t.p2?"#D4E8C2":"#F5C0BA"}`}}>
              {/* Sıra no */}
              <span style={{fontSize:11,color:"#6B7280",fontWeight:700,minWidth:18,flexShrink:0}}>{i+1}.</span>
              {/* TR sabit — EarTagInput ile birebir aynı */}
              <div style={{background:"rgba(var(--primary-rgb),.08)",borderRadius:8,padding:"5px 7px",fontWeight:700,fontSize:13,color:"var(--primary,#8B5CF6)",border:"1px solid rgba(212,175,55,.2)",flexShrink:0,letterSpacing:1}}>TR</div>
              <span style={{color:"#6B7280",fontWeight:700,fontSize:15}}>-</span>
              {/* İki haneli */}
              <input
                value={t.p1}
                maxLength={2}
                inputMode="numeric"
                placeholder="xx"
                onChange={e=>{
                  const v=e.target.value.replace(/\D/g,"");
                  const newTags=[...tags];
                  newTags[i]={p1:v,p2:t.p2,full:`TR-${v}-${t.p2}`};
                  onTagsChange(newTags);
                  if(v.length===2) rowRefs.current[`p2_${i}`]?.focus();
                }}
                style={{width:38,padding:"5px 4px",borderRadius:8,border:"1px solid rgba(212,175,55,.18)",fontSize:13,fontWeight:700,textAlign:"center",outline:"none",background:"#F5F5F5",color:"#1A1A2E"}}
              />
              <span style={{color:"#6B7280",fontWeight:700,fontSize:15}}>-</span>
              {/* Son haneler */}
              <input
                ref={el=>rowRefs.current[`p2_${i}`]=el}
                value={t.p2}
                inputMode="numeric"
                placeholder="xxxxxxx"
                onChange={e=>{
                  const v=e.target.value.replace(/\D/g,"");
                  const newTags=[...tags];
                  newTags[i]={p1:t.p1,p2:v,full:`TR-${t.p1}-${v}`};
                  onTagsChange(newTags);
                }}
                style={{flex:1,padding:"5px 6px",borderRadius:8,border:"1px solid rgba(212,175,55,.18)",fontSize:13,fontWeight:700,outline:"none",letterSpacing:1,minWidth:0,background:"#F5F5F5",color:"#1A1A2E"}}
              />
              {/* Satır mikrofon butonu — EarTagInput'taki MicBtn ile aynı mantık */}
              <MicBtn onResult={txt=>handleRowMic(txt,i)} style={{height:32,minWidth:32,padding:"0 6px",flexShrink:0}}/>
              {/* Sil */}
              <button type="button" onClick={()=>onTagsChange(tags.filter((_,j)=>j!==i))}
                style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(190,59,49,.2)",borderRadius:8,color:"#EF4444",fontWeight:700,fontSize:13,cursor:"pointer",padding:"4px 7px",flexShrink:0}}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


function BulkAddGoatModal({ breed, defaultCategory, onSave, onClose, currentUser }) {
  const [category, setCategory] = useState(defaultCategory||"anac");
  const [gender, setGender] = useState("dişi");
  const [tags, setTags] = useState([]); // [{p1,p2,full}]
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState("");
  const [done, setDone] = useState(0);
  const [tab, setTab] = useState("elle");
  const [fileRows, setFileRows] = useState([]);
  const fileRef = useRef(null);

  const validTags = tab==="elle"
    ? tags.filter(t=>t.p1&&t.p2)
    : fileRows.filter(r=>r.earTag&&r.earTag.startsWith("TR"));

  const validCount = validTags.length;
  const handleFile = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const ext = file.name.split(".").pop().toLowerCase();
    const reader = new FileReader();

    reader.onload = (ev) => {
      try {
        const XLSX = window.XLSX;
        if(!XLSX) { setErr("Excel kütüphanesi yüklenmedi"); return; }

        let rows = [];
        if(ext==="csv") {
          const text = ev.target.result;
          const lines = text.split(/[\n\r]+/).filter(l=>l.trim());
          // Başlık satırını atla
          const start = lines[0]?.toLowerCase().includes("küpe") ? 1 : 0;
          rows = lines.slice(start).map(l => {
            const cols = l.split(/[,;]+/).map(c=>c.trim().replace(/"/g,""));
            return { earTag: (cols[0]||"").toUpperCase(), gender: cols[1]||gender };
          }).filter(r=>r.earTag.length>=2);
        } else {
          const wb = XLSX.read(ev.target.result, {type:"binary"});
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws, {header:1});
          const start = data[0]?.[0]?.toString().toLowerCase().includes("küpe") ? 1 : 0;
          rows = data.slice(start).map(row => ({
            earTag: (row[0]||"").toString().trim().toUpperCase(),
            gender: (row[1]||gender).toString().trim().toLowerCase()||gender
          })).filter(r=>r.earTag.length>=2);
        }
        setFileRows(rows);
        setErr("");
      } catch(ex) {
        setErr("Dosya okunamadı: " + ex.message);
      }
    };

    if(ext==="csv") reader.readAsText(file, "UTF-8");
    else reader.readAsBinaryString(file);
    e.target.value = "";
  };

  // Şablon indir
  const downloadTemplate = () => {
    const XLSX = window.XLSX;
    if(!XLSX) return;
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([
      ["Küpe No", "Cinsiyet (dişi/erkek)"],
      ["TR-15-0001", "dişi"],
      ["TR-15-0002", "erkek"],
      ["TR-15-0003", "dişi"],
    ]);
    // Sütun genişlikleri
    ws["!cols"] = [{wch:20},{wch:22}];
    XLSX.utils.book_append_sheet(wb, ws, "Hayvanlar");
    XLSX.writeFile(wb, "toplu_hayvan_sablonu.xlsx");
  };

  const save = async () => {
    if(validCount===0) { setErr("Eklenecek geçerli küpe no yok"); return; }
    setSaving(true);
    setDone(0);
    setErr("");
    const savedGoats = [];
    const rows = tab==="elle" ? validTags.map(t=>({earTag:t.full, gender})) : fileRows.filter(r=>r.earTag&&r.earTag.startsWith("TR")).map(r=>({earTag:r.earTag, gender:r.gender||gender}));
    for(let i=0; i<rows.length; i++){
      const row = rows[i];
      const g = {
        id: "g"+Date.now()+i,
        name: row.earTag,
        earTag: row.earTag,
        gender: row.gender||gender,
        breed: breed.id, category,
        birthDate:"", weight:"", color:"",
        motherTag:"", fatherTag:"",
        abortHistory:"hayır", reproductionStatus:"",
        kidCount:"0", notes:"", abortDetails:"",
        archived:false, archiveReason:""
      };
      const {error} = await sb.from("goats").insert(fromGoat(g));
      if(!error) savedGoats.push(g);
      setDone(i+1);
      if(i%5===4) await new Promise(r=>setTimeout(r,200));
    }
    setSaving(false);
    if(savedGoats.length>0) onSave(savedGoats);
    else setErr("Hiç kayıt eklenemedi");
  };

  return (
    <ModalWrap title={`${breed.emoji} ${breed.name} — Toplu Hayvan Ekle`} onClose={onClose}>
      {err&&<ErrBox msg={err}/>}

      {/* Irk ve Kategori */}
      <FL>Kategori *</FL>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setCategory("anac")} style={{flex:1,padding:"9px 0",borderRadius:8,border:`1.5px solid ${category==="anac"?"#4A7C3F":"#E5E7EB"}`,background:category==="anac"?"#E3F0DC":"#fff",color:category==="anac"?"#3D5A25":"#8c8c7e",fontWeight:category==="anac"?700:400,fontSize:13,cursor:"pointer"}}>🐐 Anaç</button>
        <button onClick={()=>setCategory("oglak")} style={{flex:1,padding:"9px 0",borderRadius:8,border:`1.5px solid ${category==="oglak"?"#B8602A":"#E5E7EB"}`,background:category==="oglak"?"#FFF4E6":"#fff",color:category==="oglak"?"#8B5A1B":"#8c8c7e",fontWeight:category==="oglak"?700:400,fontSize:13,cursor:"pointer"}}>🍼 Oğlak</button>
      </div>

      <FL>Cinsiyet (varsayılan)</FL>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setGender("dişi")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${gender==="dişi"?"#2873A8":"#E5E7EB"}`,background:gender==="dişi"?"#E6F1FB":"#fff",color:gender==="dişi"?"#0C447C":"#8c8c7e",fontWeight:gender==="dişi"?700:400,fontSize:13,cursor:"pointer"}}>♀ Dişi</button>
        <button onClick={()=>setGender("erkek")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${gender==="erkek"?"#7B4A1E":"#E5E7EB"}`,background:gender==="erkek"?"#FEF5E7":"#fff",color:gender==="erkek"?"#4A2C0A":"#8c8c7e",fontWeight:gender==="erkek"?700:400,fontSize:13,cursor:"pointer"}}>♂ Erkek</button>
      </div>

      {/* Sekme */}
      <div style={{display:"flex",background:"#F3F4F6",borderRadius:8,overflow:"hidden",marginTop:4}}>
        <button onClick={()=>setTab("elle")} style={{flex:1,padding:"9px 0",border:"none",fontWeight:700,fontSize:12,cursor:"pointer",background:tab==="elle"?"#4A7C3F":"transparent",color:tab==="elle"?"#fff":"#8c8c7e"}}>✏️ Elle Giriş</button>
        <button onClick={()=>setTab("dosya")} style={{flex:1,padding:"9px 0",border:"none",fontWeight:700,fontSize:12,cursor:"pointer",background:tab==="dosya"?"#4A7C3F":"transparent",color:tab==="dosya"?"#fff":"#8c8c7e"}}>📁 Dosya Yükle</button>
      </div>

      {/* Elle giriş */}
      {tab==="elle" && <>
        <FL>Küpe Numaraları</FL>
        <div style={{fontSize:11,color:"#9CA3AF",marginBottom:4}}>💡 Sesli "TR" dediğinizde yeni küpe satırı başlar</div>
        <BulkEarTagInput tags={tags} onTagsChange={setTags}/>
      </>}

      {/* Dosya yükleme */}
      {tab==="dosya" && <>
        <button onClick={downloadTemplate} style={{...S.btnOutline,width:"100%",padding:10,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          📥 Excel Şablonu İndir
        </button>
        <div style={{fontSize:11,color:"#9CA3AF",textAlign:"center"}}>Şablonu doldurup yükleyin (Küpe No, Cinsiyet)</div>
        <label style={{display:"block",background:"#E8F5E9",border:"1.5px dashed #4A7C3F",borderRadius:10,padding:"14px",textAlign:"center",cursor:"pointer"}}>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={handleFile}/>
          <div style={{fontSize:22}}>📂</div>
          <div style={{fontSize:13,color:"var(--primary,#8B5CF6)",fontWeight:700,marginTop:4}}>Excel / CSV Seç</div>
          <div style={{fontSize:10,color:"#9CA3AF",marginTop:2}}>.xlsx, .xls, .csv desteklenir</div>
        </label>
        {fileRows.length>0 && <div style={{fontSize:11,color:"#10B981",background:"rgba(74,124,63,.2)",borderRadius:8,padding:"6px 10px"}}>
          ✅ {fileRows.length} satır okundu
        </div>}
      </>}

      {saving && <div style={{background:"rgba(40,115,168,.2)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#42A5F5",fontWeight:600}}>
        ⏳ Kaydediliyor: {done} / {validCount}
      </div>}

      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
        <button onClick={save} disabled={saving||validCount===0}
          style={{...S.btnPrimary,flex:2,padding:12,opacity:(saving||validCount===0)?.6:1}}>
          {saving?`Kaydediliyor... (${done})`:validCount>0?`💾 ${validCount} Hayvan Ekle`:"Küpe no girin"}
        </button>
      </div>
    </ModalWrap>
  );
}

function AddGoatModal({ breed, defaultCategory, onSave, onClose, currentUser }) {
  const [name,setName]=useState("");
  const [earTag,setEarTag]=useState("TR--");
  const [gender,setGender]=useState("dişi");
  const [category,setCategory]=useState(defaultCategory||"anac");
  const [birthDate,setBirthDate]=useState("");
  const [weight,setWeight]=useState("");
  const [color,setColor]=useState("");
  const [notes,setNotes]=useState("");
  const [err,setErr]=useState("");
  const [saving,setSaving]=useState(false);

  const save=async()=>{
    if(!name){setErr("İsim giriniz");return;}
    if(!earTag){setErr("Küpe no giriniz");return;}
    setSaving(true);
    const g={id:"g"+Date.now(),name,earTag,gender,breed:breed.id,category,birthDate,weight,color,motherTag:"",fatherTag:"",abortHistory:"hayır",reproductionStatus:"",kidCount:"0",notes,abortDetails:"",archived:false,archiveReason:""};
    const {error}=await sb.from("goats").insert(fromGoat(g));
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}

  };

  return <ModalWrap title={`${breed.emoji} ${breed.name} — Hayvan Ekle`} onClose={onClose}>

    <FL>İsim *</FL>
    <VoiceInput value={name} onChange={setName} placeholder="Keçi adı"/>
    <FL>Küpe No *</FL>
    <EarTagInput value={earTag} onChange={setEarTag}/>

    <FL>Kategori</FL>
    <select value={category} onChange={e=>setCategory(e.target.value)} style={S.select}><option value="anac">Anaç</option><option value="oglak">Oğlak</option></select>
    <FL>Doğum Tarihi</FL>
    <input type="date" value={birthDate} onChange={e=>setBirthDate(e.target.value)} style={S.input}/>
    <FL>Ağırlık (kg)</FL>
    <input type="number" value={weight} onChange={e=>setWeight(e.target.value)} style={S.input} placeholder="0"/>
    <FL>Renk</FL>
    <VoiceInput value={color} onChange={setColor} placeholder="Beyaz, Siyah..."/>
    <FL>Notlar</FL>
    <VoiceInput value={notes} onChange={setNotes} placeholder="Notlar..." multiline rows={2}/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
    </div>
  </ModalWrap>;
}

function ModalWrap({title,onClose,children}){
  const el = React.useMemo(()=>document.createElement('div'),[]);
  React.useEffect(()=>{
    document.body.appendChild(el);
    document.body.style.overflow='hidden';
    return ()=>{
      document.body.removeChild(el);
      document.body.style.overflow='';
    };
  },[el]);
  return ReactDOM.createPortal(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9999,overflowY:"auto",backgroundColor:"rgba(0,0,0,.65)",WebkitOverflowScrolling:"touch"}}>
      <div style={{minHeight:"100%",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"16px 12px 100px"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#FFFFFF",borderRadius:16,width:"100%",maxWidth:456,marginTop:8}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 14px",borderBottom:"1px solid rgba(212,175,55,.1)",position:"sticky",top:0,background:"#FFFFFF",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderRadius:"24px 24px 0 0",zIndex:1}}>
            <div style={{fontWeight:700,fontSize:15,color:"#111827",flex:1,paddingRight:10,letterSpacing:"-.2px"}}>{title}</div>

function timeAgo(dt){
  if(!dt) return "";
  const diff = (Date.now()-new Date(dt).getTime())/1000;
  if(diff<60) return "Az önce";
  if(diff<3600) return `${Math.floor(diff/60)} dk önce`;
  if(diff<86400) return `${Math.floor(diff/3600)} sa önce`;
  if(diff<172800) return "Dün";
  return new Date(dt).toLocaleDateString("tr-TR");
}

function DeathsPage({ deaths, currentUser, onDelete }) {

  const [deathDate, setDeathDate] = useState(todayISO());
  const [deathTime, setDeathTime] = useState("");
  const [cause, setCause] = useState("");
  const [causeCustom, setCauseCustom] = useState("");
  const [notes, setNotes] = useState("");
  const [photos, setPhotos] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [viewPhotos, setViewPhotos] = useState(null); // {deathId, urls:[]}
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);
  const [selBreed, setSelBreed] = useState("all");
  const [deathPhotos, setDeathPhotos] = useState({}); // {deathId: [url,...]}
  const isVet = currentUser==="Danışman"||currentUser==="İşletme Sahibi";

  useEffect(()=>setLocal(deaths),[deaths]);

  // Fotoğrafları yükle
  useEffect(()=>{
    const loadPhotos = async () => {
      const {data} = await sb.storage.from("death-photos").list("", {limit:1000});
      if(!data) return;
      const map = {};
      data.forEach(f=>{
        const parts = f.name.split("_");
        const deathId = parts[0];
        if(!map[deathId]) map[deathId]=[];
        const {data:{publicUrl}} = sb.storage.from("death-photos").getPublicUrl(f.name);
        map[deathId].push(publicUrl);
      });
      setDeathPhotos(map);
    };
    loadPhotos();
  },[]);

  const uploadPhotos = async (deathId, files) => {
    setUploading(true);
    const urls = [];
    for(const file of files){
      const ext = file.name.split(".").pop();
      const path = `${deathId}_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const {error} = await sb.storage.from("death-photos").upload(path, file, {contentType:file.type});
      if(!error){
        const {data:{publicUrl}} = sb.storage.from("death-photos").getPublicUrl(path);
        urls.push(publicUrl);
      }
    }
    setDeathPhotos(p=>({...p,[deathId]:[...(p[deathId]||[]),...urls]}));
    setUploading(false);
    return urls;
  };

  const openEdit = (d) => {
    setEditDeath(d);
    setBreed(d.breed);setCategory(d.category||"anac");setEarTag(d.earTag);
    setDeathDate(d.deathDate);setDeathTime(d.deathTime||"");
    setCause(DEATH_CAUSES.includes(d.cause)?d.cause:"Diğer");
    setCauseCustom(DEATH_CAUSES.includes(d.cause)?"":d.cause);
    setNotes(d.notes||"");setErr("");setPhotos([]);
    setShowForm(true);
  };

  const reset = () => { setBreed("");setCategory("anac");setEarTag("TR--");setDeathDate(todayISO());setDeathTime("");setCause("");setCauseCustom("");setNotes("");setErr("");setEditDeath(null);setPhotos([]); };

  const save = async () => {
    if(!breed){setErr("Irk seçiniz");return;}
    if(!earTag.trim()){setErr("Küpe no giriniz");return;}
    if(!cause){setErr("Ölüm sebebi seçiniz");return;}
    setSaving(true);
    const finalCause = cause==="Diğer" ? causeCustom.trim() : cause;
    if(editDeath){
      await sb.from("deaths").update({breed,category,ear_tag:earTag.trim(),death_date:deathDate,death_time:deathTime||null,cause:finalCause,notes:notes||null}).eq("id",editDeath.id);
      const updated = {...editDeath,breed,category,earTag:earTag.trim(),deathDate,deathTime,cause:finalCause,notes};
      if(photos.length>0) await uploadPhotos(editDeath.id, photos);
      setLocal(p=>p.map(x=>x.id===editDeath.id?updated:x));
      setShowForm(false);reset();setSaving(false);return;
    }
    const rec = {id:"d"+Date.now(), breed, category, ear_tag:earTag.trim(), death_date:deathDate, death_time:deathTime||null, cause:finalCause, notes:notes||null, created_by:currentUser};
    const {error} = await sb.from("deaths").insert(rec);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    if(photos.length>0) await uploadPhotos(rec.id, photos);
    const obj = {id:rec.id, breed, category, earTag:earTag.trim(), deathDate, deathTime, cause:finalCause, notes, createdBy:currentUser};
    setLocal(p=>[obj,...p]);
    onDelete && onDelete(null, obj);
    setShowForm(false);
    reset();
    setSaving(false);
  };

  const del = async (id) => {
    await sb.from("deaths").delete().eq("id",id);
    setLocal(p=>p.filter(x=>x.id!==id));
    onDelete(id);
  };

  return (

        <h2 style={S.title}>💀 Ölüm Kayıtları</h2>
        <button onClick={()=>setShowForm(!showForm)} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13}}>

          <FL>Irk *</FL>
          <div style={{display:"flex",gap:6,marginBottom:4}}>
            {BREEDS.map(b=><button key={b.id} onClick={()=>setBreed(b.id)} style={{flex:1,padding:"7px 0",borderRadius:8,border:`1.5px solid ${breed===b.id?b.color:"#6B7280"}`,background:breed===b.id?b.bg:"#fff",color:breed===b.id?b.color:"#9CA3AF",fontWeight:breed===b.id?700:400,fontSize:11,cursor:"pointer"}}>{b.emoji} {b.name}</button>)}
          </div>
          <FL>Kategori *</FL>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setCategory("anac")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${category==="anac"?"#4A7C3F":"#E5E7EB"}`,background:category==="anac"?"#E3F0DC":"#fff",color:category==="anac"?"#3D5A25":"#8c8c7e",fontWeight:category==="anac"?700:400,fontSize:13,cursor:"pointer"}}>🐐 Anaç</button>

          <EarTagInput value={earTag} onChange={setEarTag}/>
