function WeatherWidget() {
  const [weather, setWeather] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(()=>{
    fetch("https://api.open-meteo.com/v1/forecast?latitude=37.7167&longitude=30.2833&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,apparent_temperature&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Europe%2FIstanbul&forecast_days=4")
      .then(r=>r.json())
      .then(data=>{
        const cur=data.current;
        const daily=data.daily;
        const ic=(code)=>code===0?"☀️":code<=2?"🌤️":code<=3?"☁️":code<=48?"🌫️":code<=67?"🌧️":code<=77?"❄️":code<=82?"🌦️":"⛈️";
        const dc=(code)=>code===0?"Açık":code<=2?"Az bulutlu":code<=3?"Bulutlu":code<=48?"Sisli":code<=67?"Yağmurlu":code<=77?"Karlı":code<=82?"Sağanak":"Fırtınalı";
        const days=["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"];
        setWeather({
          temp:Math.round(cur.temperature_2m),
          feels:Math.round(cur.apparent_temperature),
          humidity:cur.relative_humidity_2m,
          wind:Math.round(cur.wind_speed_10m),
          icon:ic(cur.weather_code),
          desc:dc(cur.weather_code),
          forecast:daily.time.slice(1,4).map((date,i)=>({
            day:days[new Date(date).getDay()],
            max:Math.round(daily.temperature_2m_max[i+1]),
            min:Math.round(daily.temperature_2m_min[i+1]),
            icon:ic(daily.weather_code[i+1])
          }))
        });
        setLoading(false);
      })
      .catch(()=>setLoading(false));
  },[]);

  if(!weather) return null;
  return (
    <div style={{background:"linear-gradient(135deg,#EEF2FF,#FFFFFF)",borderRadius:18,padding:16,marginBottom:12,border:"1px solid rgba(99,102,241,.12)",boxShadow:"0 2px 12px rgba(0,0,0,.05)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:38,lineHeight:1}}>{weather.icon}</div>
          <div>
            <div style={{fontSize:10,color:"#9CA3AF",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px"}}>📍 Üç Kule</div>
            <div style={{fontSize:26,fontWeight:800,color:"#111827",lineHeight:1}}>{weather.temp}°<span style={{fontSize:13,color:"#6B7280"}}>C</span></div>
            <div style={{fontSize:11,color:"#6B7280"}}>{weather.desc}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:"#9CA3AF"}}>Hissedilen</div>
          <div style={{fontSize:15,fontWeight:700,color:"#374151"}}>{weather.feels}°C</div>
          <div style={{fontSize:11,color:"#9CA3AF",marginTop:3}}>💧{weather.humidity}% · 💨{weather.wind}km/s</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,borderTop:"1px solid rgba(0,0,0,.06)",paddingTop:8}}>
        {weather.forecast.map(function(f,i){return (
          <div key={i} style={{flex:1,textAlign:"center",background:"rgba(99,102,241,.06)",borderRadius:10,padding:"6px 4px"}}>
            <div style={{fontSize:10,color:"#9CA3AF",fontWeight:600}}>{f.day}</div>
            <div style={{fontSize:16,margin:"3px 0"}}>{f.icon}</div>
            <div style={{fontSize:11,fontWeight:700,color:"#374151"}}>{f.max}°</div>
            <div style={{fontSize:10,color:"#9CA3AF"}}>{f.min}°</div>
          </div>
        );})}
      </div>
    </div>
  );
}

function GoatMatchGame() {
  const PAIRS = [
    {id:"a",emoji:"🐐",name:"Keçi"},{id:"b",emoji:"🐑",name:"Koyun"},
    {id:"c",emoji:"🦙",name:"Lama"},{id:"d",emoji:"🐏",name:"Koç"},
    {id:"e",emoji:"🐮",name:"İnek"},{id:"f",emoji:"🐷",name:"Domuz"},
    {id:"g",emoji:"🐔",name:"Tavuk"},{id:"h",emoji:"🦆",name:"Ördek"},
  ];
  const LIMIT = 120;
  const init = function() {
    var deck = PAIRS.concat(PAIRS).map(function(b,i){return Object.assign({},b,{uid:i,flipped:false,matched:false});});
    return deck.sort(function(){return Math.random()-.5;});
  };
  const [cards,setCards] = React.useState(init);
  const [flipped,setFlipped] = React.useState([]);
  const [moves,setMoves] = React.useState(0);
  const [won,setWon] = React.useState(false);
  const [lost,setLost] = React.useState(false);
  const [time,setTime] = React.useState(0);
  const [running,setRunning] = React.useState(false);
  const timer = React.useRef(null);

  React.useEffect(function(){
    if(running&&!won&&!lost){
      timer.current=setInterval(function(){
        setTime(function(t){
          if(t+1>=LIMIT){setRunning(false);setLost(true);return LIMIT;}
          return t+1;
        });
      },1000);
    } else { clearInterval(timer.current); }
    return function(){clearInterval(timer.current);};
  },[running,won,lost]);

  var doReset = function(){
    clearInterval(timer.current);
    setCards(init());setFlipped([]);setMoves(0);
    setWon(false);setLost(false);setTime(0);setRunning(false);
  };

  var doFlip = function(card){
    if(card.flipped||card.matched||flipped.length===2||lost||won) return;
    if(!running) setRunning(true);
    var nc=cards.map(function(x){return x.uid===card.uid?Object.assign({},x,{flipped:true}):x;});
    var nf=flipped.concat([card]);
    setCards(nc);setFlipped(nf);
    if(nf.length===2){
      setMoves(function(m){return m+1;});
      if(nf[0].id===nf[1].id){
        setTimeout(function(){
          var mc=nc.map(function(x){return x.id===nf[0].id?Object.assign({},x,{matched:true}):x;});
          setCards(mc);setFlipped([]);
          if(mc.every(function(x){return x.matched;})){setWon(true);setRunning(false);}
        },400);
      } else {
        setTimeout(function(){
          setCards(function(p){return p.map(function(x){return nf.some(function(f){return f.uid===x.uid;})?Object.assign({},x,{flipped:false}):x;});});
          setFlipped([]);
        },900);
      }
    }
  };

  var rem = LIMIT-time;
  var tc = rem<=20?"#EF4444":rem<=60?"#D97706":"#059669";
  var fmt = function(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");};
  var matched = cards.filter(function(x){return x.matched;}).length/2;

  return (
    <div className="anim-fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <h2 style={{margin:0,fontSize:17,fontWeight:800,color:"#111827"}}>🐐 Keçi Eşleştirme</h2>
        <button onClick={doReset} style={{background:"rgba(var(--primary-rgb),.1)",color:"var(--primary,#8B5CF6)",border:"none",borderRadius:10,padding:"6px 12px",fontWeight:600,fontSize:12,cursor:"pointer"}}>🔄 Yeniden</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        {[{v:moves,l:"HAMLE",col:"var(--primary,#8B5CF6)"},{v:fmt(rem),l:"SÜRE",col:tc},{v:matched+"/8",l:"EŞLEŞTİ",col:"#D97706"}].map(function(x){return (
          <div key={x.l} style={{flex:1,background:"#FFFFFF",borderRadius:12,padding:"8px 6px",textAlign:"center",border:"1.5px solid rgba(0,0,0,.05)"}}>
            <div style={{fontSize:17,fontWeight:800,color:x.col}}>{x.v}</div>
            <div style={{fontSize:9,color:"#9CA3AF",fontWeight:600}}>{x.l}</div>
          </div>
        );})}
      </div>
      <div style={{height:5,background:"#F3F4F6",borderRadius:10,marginBottom:10,overflow:"hidden"}}>
        <div style={{height:"100%",width:(rem/LIMIT*100)+"%",background:tc,borderRadius:10,transition:"width 1s linear"}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
        {cards.map(function(card){return (
          <button key={card.uid} onClick={function(){doFlip(card);}} style={{
            aspectRatio:"1",borderRadius:14,padding:0,border:card.matched?"2px solid #10B981":card.flipped?"2px solid var(--primary,#8B5CF6)":"2px solid #E5E7EB",
            background:card.matched?"#ECFDF5":card.flipped?"rgba(var(--primary-rgb),.08)":"#F9FAFB",
            cursor:card.matched||card.flipped||lost?"default":"pointer",
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            transition:"all .2s",WebkitAppearance:"none",opacity:lost&&!card.matched?0.45:1
          }}>
            {card.flipped||card.matched ? (
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:26}}>{card.emoji}</div>
                <div style={{fontSize:8,fontWeight:700,color:card.matched?"#059669":"var(--primary,#8B5CF6)",marginTop:2}}>{card.name}</div>
              </div>
            ) : <div style={{fontSize:24,opacity:.5}}>🎴</div>}
          </button>
        );})}
      </div>
      {won&&<div style={{marginTop:14,background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)",borderRadius:16,padding:18,textAlign:"center",border:"1px solid #A7F3D0"}}>
        <div style={{fontSize:40,marginBottom:6}}>🎉</div>
        <div style={{fontWeight:800,fontSize:18,color:"#065F46",marginBottom:3}}>Tebrikler!</div>
        <div style={{fontSize:12,color:"#6B7280",marginBottom:12}}>{moves} hamle · {fmt(time)}</div>
        <button onClick={doReset} style={{background:"#10B981",color:"#fff",border:"none",borderRadius:12,padding:"10px 24px",fontWeight:700,fontSize:14,cursor:"pointer"}}>🔄 Tekrar</button>
      </div>}
      {lost&&<div style={{marginTop:14,background:"linear-gradient(135deg,#FEF2F2,#FEE2E2)",borderRadius:16,padding:18,textAlign:"center",border:"1px solid #FECACA"}}>
        <div style={{fontSize:40,marginBottom:6}}>⏰</div>
        <div style={{fontWeight:800,fontSize:18,color:"#991B1B",marginBottom:3}}>Süre Doldu!</div>
        <div style={{fontSize:12,color:"#6B7280",marginBottom:12}}>{matched}/8 · {moves} hamle</div>
        <button onClick={doReset} style={{background:"#EF4444",color:"#fff",border:"none",borderRadius:12,padding:"10px 24px",fontWeight:700,fontSize:14,cursor:"pointer"}}>🔄 Tekrar</button>
      </div>}
      {!running&&!won&&!lost&&<div style={{marginTop:10,textAlign:"center",fontSize:11,color:"#9CA3AF"}}>Kartları çevir · {LIMIT} saniye</div>}
    </div>
  );
}

function HealthDetailModal({ record, goat, logs, treatmentDays, onUpdate, onClose, onFinalize, currentUser, onLogsUpdate, onTreatmentDayUpdate }) {
  const [status,    setStatus]    = useState(record.status);
  const [treatment, setTreatment] = useState(record.treatment||"");
  const [notes,     setNotes]     = useState(record.notes||"");
  const [saving,    setSaving]    = useState(false);
  const [showClose, setShowClose] = useState(false);
  const [closeReason, setCloseReason] = useState("");
  const [closeNote,   setCloseNote]   = useState("");
  const [tab, setTab] = useState("detay");
  const [treatmentChanged, setTreatmentChanged] = useState(false);
  const [markingDay, setMarkingDay] = useState(null);

  const recLogs = logs.filter(l=>l.healthRecordId===record.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const recDays = treatmentDays.filter(d=>d.healthRecordId===record.id).sort((a,b)=>a.dayNumber-b.dayNumber);
  const today = todayISO();

  const markDay = async (day) => {
    if(day.done) return;
    setMarkingDay(day.id);
    const now = new Date().toISOString();
    await sb.from("treatment_days").update({done:true, done_by:currentUser, done_at:now}).eq("id",day.id);
    onTreatmentDayUpdate({...day, done:true, doneBy:currentUser, doneAt:now});
    setMarkingDay(null);
  };

  const save = async () => {
    setSaving(true);
    const changes = [];
    if (status!==record.status) changes.push(`Durum değişti: "${record.status}" → "${status}"`);
    if (treatment!==record.treatment) changes.push(`Tedavi güncellendi`);
    if (notes!==record.notes && notes) changes.push(`Not eklendi`);
    const { error } = await sb.from("health_records").update({ status, treatment, notes }).eq("id", record.id);
    if (!error) {
      const detail = changes.length>0 ? changes.join(" · ") : "Kayıt güncellendi";
      const gId = goat?.id || record.goatId;
      const gBreed = goat?.breed || record.breed;
      await addLog(record.id, gId, gBreed, "güncelleme", detail, currentUser);
      const newLog = { id:"l"+Date.now(), healthRecordId:record.id, goatId:gId, breed:gBreed, action:"güncelleme", actionDetail:detail, userName:currentUser, createdAt:new Date().toISOString() };
      onLogsUpdate(newLog);
      onUpdate({ ...record, status, treatment, notes });
    }
    setSaving(false);
  };

  const finalize = async () => {
    if (!closeReason) return;
    setSaving(true);
    const report = {
      id:"r"+Date.now(), goatId:goat?.id||record.goatId, goatName:goat?.name||record.goatEarTag||"—", goatEarTag:goat?.earTag||record.goatEarTag||"—", breed:goat?.breed||record.breed,
      dateStarted:record.date, dateClosed:todayISO(), condition:record.condition,
      treatment, closeReason, closeNote, veterinarian:record.veterinarian, cost:"", createdByName:currentUser, notes
    };
    await sb.from("health_records").update({ closed:true, status:closeReason==="Hayvan Öldü"?"öldü":"iyileşti" }).eq("id", record.id);
    await sb.from("reports").insert(fromReport(report));
    await addLog(record.id, goat?.id||record.goatId, goat?.breed||record.breed, "sonlandırma", `Neden: ${closeReason}${closeNote?" — "+closeNote:""}`, currentUser);
    onFinalize(record.id, report);
    setSaving(false);
  };

  if (showClose) return <ModalWrap title="📋 Kaydı Sonlandır" onClose={()=>setShowClose(false)}>
    <div style={{background:"rgba(var(--primary-rgb),.08)",border:"1px solid #F0D49A",borderRadius:10,padding:10,fontSize:12,color:"#E8975A"}}>
      ⚠️ Bu kayıt sonlandırılacak ve rapor bölümüne taşınacak.
    </div>
    <FL>Sonlandırma Nedeni *</FL>
    <select value={closeReason} onChange={e=>setCloseReason(e.target.value)} style={S.select}>
      <option value="">— Seçin —</option>
      {CLOSE_REASONS.map(r=><option key={r} value={r}>{r}</option>)}
    </select>
    <FL>Ek Not</FL>
    <textarea value={closeNote} onChange={e=>setCloseNote(e.target.value)} rows={3} placeholder="Sonuç hakkında not..."/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={()=>setShowClose(false)} style={{...S.btnOutline,flex:1,padding:12}}>Geri</button>
      <button onClick={finalize} disabled={!closeReason||saving} style={{...S.btnPrimary,flex:2,padding:12,background:"#C0392B",opacity:(!closeReason||saving)?.5:1}}>{saving?"Kaydediliyor...":"✅ Sonlandır"}</button>
    </div>
  </ModalWrap>;

  return <ModalWrap title={`🩺 ${record.condition}`} onClose={onClose}>
    <div style={{background:"#F5F5F5",borderRadius:10,padding:10,fontSize:12}}>
      {goat ? <><b>{goat.name}</b> · 🏷 {goat.earTag}</> : <><b>🏷 {record.goatEarTag||"—"}</b></>} · Başlangıç: {fmt(record.date)}
    </div>
    <div style={{display:"flex",background:"#F3F4F6",borderRadius:8,overflow:"hidden",marginTop:4}}>
      {[["detay","✏️ Güncelle"],["takvim","📅 Takvim"],["gecmis","📋 Geçmiş"]].map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 0",border:"none",fontWeight:700,fontSize:12,cursor:"pointer",background:tab===k?"#4A7C3F":"transparent",color:tab===k?"#fff":"#8c8c7e"}}>{l}</button>
      ))}
    </div>

    {tab==="detay" && <>
      <FL>Durum</FL>
      <StatusPicker value={status} onChange={setStatus}/>
      <FL>Tedavi / Yapılan İşlem</FL>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"6px 10px",background:"#E8F5E9",borderRadius:8,border:"1px solid #D4E8C2"}}>
        <input type="checkbox" id="sameTreatment" checked={!treatmentChanged}
          onChange={e=>setTreatmentChanged(!e.target.checked)}
          style={{width:16,height:16,cursor:"pointer"}}/>
        <label htmlFor="sameTreatment" style={{fontSize:12,color:"#10B981",fontWeight:600,cursor:"pointer"}}>
          Aynı tedavi devam ediyor (değişiklik yok)
        </label>
      </div>
      <textarea value={treatment} onChange={e=>{setTreatment(e.target.value);setTreatmentChanged(true);} placeholder="İlaç, doz, işlem..." rows={3} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit",resize:"none"}}/>
      <FL>Notlar</FL>
      <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Not ekle..." rows={2} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit",resize:"none"}}/>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={()=>setShowClose(true)} style={{...S.btnSm,background:"rgba(239,68,68,.1)",color:"#EF4444",padding:"10px 14px",fontSize:12}}>📋 Sonlandır</button>
        <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:1,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Güncelle"}</button>
      </div>
    </>}

    {tab==="takvim" && (
      <div>
        {/* Tedavi notu özeti */}
        {record.treatment && (
          <div style={{background:"#E8F5E9",border:"1px solid #D4E8C2",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#10B981",marginBottom:2}}>💊 Tedavi</div>
            <div style={{fontSize:12,color:"#1F2937"}}>{record.treatment}</div>
          </div>
        )}
        {record.notes && (
          <div style={{background:"#F5F5F5",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#6B7280",marginBottom:2}}>📝 Not</div>
            <div style={{fontSize:12,color:"#6B7280"}}>{record.notes}</div>
          </div>
        )}
        {recDays.length===0 && (
          <div style={{textAlign:"center",padding:20,color:"#9CA3AF",fontSize:13}}>
            <div style={{fontSize:32,marginBottom:8}}>📅</div>
            Bu kayıt için tedavi takvimi oluşturulmamış.
          </div>
        )}
        {recDays.map(day=>{
          const isPast = day.plannedDate < today;
          const isToday = day.plannedDate === today;
          const isFuture = day.plannedDate > today;
          const canMark = (isToday || isPast) && !day.done;
          return (
            <div key={day.id} style={{
              borderRadius:12, padding:12, marginBottom:8,
              background: day.done ? "#E3F0DC" : isToday ? "#EEF6FC" : isFuture ? "#F9F9F6" : "#FFF0EE",
              border: `2px solid ${day.done?"#4A7C3F":isToday?"#2873A8":isPast?"#F5C0BA":"#E5E7EB"}`
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:15,color:day.done?"#3D5A25":isToday?"#2873A8":isPast?"#BE3B31":"#8c8c7e"}}>
                    {day.done?"✅":isToday?"🔵":isPast?"⚠️":"⏳"} {day.dayNumber}. Gün
                  </div>
                  <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>
                    📅 {fmt(day.plannedDate)}
                    {isToday && <span style={{color:"#0EA5E9",fontWeight:700}}> — Bugün</span>}
                  </div>
                  {day.done && day.doneBy && (
                    <div style={{fontSize:11,color:"#10B981",fontWeight:700,marginTop:4,background:"rgba(255,255,255,.7)",padding:"4px 8px",borderRadius:6,display:"inline-block"}}>
                      👤 {day.doneBy} · {fmtDT(day.doneAt)}
                    </div>
                  )}
                  {isPast && !day.done && (
                    <div style={{fontSize:11,color:"#EF4444",fontWeight:600,marginTop:2}}>❌ Henüz yapılmadı</div>
                  )}
                  {isFuture && (
                    <div style={{fontSize:11,color:"#6B7280",marginTop:2}}>⏳ {daysUntil(day.plannedDate)} gün sonra</div>
                  )}
                </div>
                {canMark && (
                  <button onClick={()=>markDay(day)} disabled={markingDay===day.id}
                    style={{...S.btnPrimary,fontSize:12,padding:"10px 16px",opacity:markingDay===day.id?.6:1,borderRadius:10,marginLeft:8,flexShrink:0}}>
                    {markingDay===day.id?"⏳":"✅ Yapıldı"}
                  </button>
                )}
              </div>
            </div>
          );
        })}
        {recDays.length>0 && (
          <div style={{background:"#F5F5F5",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#6B7280",marginTop:4}}>
            {recDays.filter(d=>d.done).length}/{recDays.length} gün tamamlandı
          </div>
        )}
      </div>
    )}
    {tab==="gecmis" && <div>
      {recLogs.length===0 && <Empty text="Henüz işlem geçmişi yok"/>}
      {recLogs.map((l,i)=>(
        <div key={l.id} style={{display:"flex",gap:8,padding:"10px 0",borderBottom:i<recLogs.length-1?"1px solid #F2F0EA":"none"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:l.action==="sonlandırma"?"#FFF0EE":l.action==="açılış"?"#E3F0DC":"#EEF6FC",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>
            {l.action==="sonlandırma"?"✅":l.action==="açılış"?"🆕":"✏️"}
          </div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1A1A2E"}}>{l.userName}</div>
              <div style={{fontSize:10,color:"#6B7280",textAlign:"right"}}>{fmtDT(l.createdAt)}</div>
            </div>
            <div style={{fontSize:11,color:"#6B7280",marginTop:2,background:"#F5F5F5",padding:"4px 8px",borderRadius:6}}>{l.actionDetail}</div>
          </div>
        </div>
      ))}
    </div>}
  </ModalWrap>;
}

function HealthModal({ goats, breedFilter, onSave, onClose, preGoatId, currentUser }) {
  const [breed, setBreed] = useState(breedFilter||"");
  const [category, setCategory] = useState("anac");
  const [devletNo, setDevletNo] = useState("");
  const [isletmeNo, setIsletmeNo] = useState("");
  const [date,setDate]=useState(todayISO());
  const [condition,setCondition]=useState("");
  const [condCustom,setCondCustom]=useState("");
  const [treatment,setTreatment]=useState("");
  const [status,setStatus]=useState("tedavi_altında");
  const [notes,setNotes]=useState("");
  const [treatmentDays,setTreatmentDays]=useState(0);
  const [photos,setPhotos]=useState([]);
  const [uploading,setUploading]=useState(false);
  const [err,setErr]=useState("");
  const [saving,setSaving]=useState(false);
  const photoRef = useRef(null);
  const cameraRef2 = useRef(null);

  const uploadHealthPhotos = async (recId, files) => {
    setUploading(true);
    for(const file of files){
      const ext = file.name.split(".").pop();
      const path = `${recId}_${Date.now()}.${ext}`;
      await sb.storage.from("health-photos").upload(path, file, {contentType:file.type});
    }
    setUploading(false);
  };

  const save = async () => {
    if(!breed){setErr("Irk seçiniz");return;}
    const cleanTag = earTag.replace(/^TR--?$/,"").trim();
    if(!cleanTag || cleanTag==="TR-" || cleanTag==="TR--"){setErr("Küpe no giriniz");return;}
    const cond = condition==="Diğer"?condCustom.trim():condition;
    if(!cond){setErr("Hastalık/durum giriniz");return;}
    setSaving(true);
    const existingGoat = goats.find(g=>g.earTag===earTag.trim()&&!g.archived);
    const goatId = existingGoat ? existingGoat.id : "ext_"+earTag.trim().replace(/\s/g,"_");
    const rec = { id:"h"+Date.now(), goatId, goatEarTag:earTag.trim(), breed, date, condition:cond, treatment, status, veterinarian:currentUser, cost:"", createdByName:currentUser, notes, category };
    const { error } = await sb.from("health_records").insert({...fromHealth(rec), goat_ear_tag:earTag.trim()});
    if(error){setErr("Kayıt hatası: "+error.message);setSaving(false);return;}
    await addLog(rec.id, goatId, breed, "açılış", `${cond} — ${currentUser} tarafından açıldı`, currentUser);
    if(photos.length>0) await uploadHealthPhotos(rec.id, photos);
    if(treatmentDays>0){
      const days=[];
      for(let i=0;i<treatmentDays;i++){
        const d=new Date(date);
        d.setDate(d.getDate()+i);
        days.push({
          id:"td"+Date.now()+i,
          health_record_id:rec.id,
          goat_id:goatId,
          day_number:i+1,
          planned_date:d.toISOString().split("T")[0],
          done:false, done_by:null, done_at:null
        });
      }
      await sb.from("treatment_days").insert(days);
      rec.treatmentDays = days.map(d=>({...d,healthRecordId:d.health_record_id,goatId:d.goat_id,dayNumber:d.day_number,plannedDate:d.planned_date,doneBy:d.done_by,doneAt:d.done_at}));
    }
    onSave(rec);
  };

  return <ModalWrap title="🩺 Sağlık Kaydı Ekle" onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <FL>Irk *</FL>
    <div style={{display:"flex",gap:6}}>
      {BREEDS.map(b=>(
        <button key={b.id} onClick={()=>setBreed(b.id)}
          style={{flex:1,padding:"9px 0",borderRadius:8,border:`1.5px solid ${breed===b.id?b.color:"#6B7280"}`,background:breed===b.id?b.bg:"#fff",color:breed===b.id?b.color:"#9CA3AF",fontWeight:breed===b.id?700:400,fontSize:12,cursor:"pointer"}}>
          {b.emoji} {b.name}
        </button>
      ))}
    </div>
    <FL>Kategori *</FL>
    <div style={{display:"flex",gap:6}}>
      <button onClick={()=>setCategory("anac")} style={{flex:1,padding:"9px 0",borderRadius:8,border:`1.5px solid ${category==="anac"?"#059669":"#E5E7EB"}`,background:category==="anac"?"#D1FAE5":"#fff",color:category==="anac"?"#065F46":"#8c8c7e",fontWeight:category==="anac"?700:400,fontSize:13,cursor:"pointer"}}>🐑 Anaç</button>
      <button onClick={()=>setCategory("kuzu")} style={{flex:1,padding:"9px 0",borderRadius:8,border:`1.5px solid ${category==="kuzu"?"#D97706":"#E5E7EB"}`,background:category==="kuzu"?"#FEF3C7":"#fff",color:category==="kuzu"?"#92400E":"#8c8c7e",fontWeight:category==="kuzu"?700:400,fontSize:13,cursor:"pointer"}}>🐏 Kuzu</button>
    </div>
    <EarTagInput devletNo={devletNo} setDevletNo={setDevletNo} isletmeNo={isletmeNo} setIsletmeNo={setIsletmeNo}/>
    <FL>Tarih *</FL>
    <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={S.input}/>
    <FL>Hastalık / Durum *</FL>
    <select value={condition} onChange={e=>setCondition(e.target.value)} style={S.select}>
      <option value="">— Seçin —</option>
      {CONDITION_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}
    </select>
    {condition==="Diğer"&&<input value={condCustom} onChange={e=>setCondCustom(e.target.value)} placeholder="Açıklayın..." style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit"}}/>}
    <FL>Tedavi</FL>
    <textarea value={treatment} onChange={e=>setTreatment(e.target.value)} placeholder="İlaç, doz, işlem..." rows={3} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit",resize:"none"}}/>
    <FL>Tedavi Süresi (gün)</FL>
    <div style={{display:"flex",gap:6}}>
      {[0,1,2,3,4,5].map(d=>(
        <button key={d} onClick={()=>setTreatmentDays(d)}
          style={{flex:1,padding:"8px 0",borderRadius:8,border:`2px solid ${treatmentDays===d?"#4A7C3F":"#E5E7EB"}`,background:treatmentDays===d?"#E3F0DC":"#fff",color:treatmentDays===d?"#3D5A25":"#555",fontWeight:700,fontSize:13,cursor:"pointer"}}>
          {d===0?"—":d}
        </button>
      ))}
    </div>
    {treatmentDays>0&&<div style={{fontSize:11,color:"var(--primary,#8B5CF6)",background:"#E8F5E9",padding:"6px 10px",borderRadius:8}}>
      📅 {treatmentDays} günlük tedavi takvimi oluşturulacak ({date} tarihinden itibaren)
    </div>}
    <FL>Durum *</FL>
    <StatusPicker value={status} onChange={setStatus}/>
    <FL>Notlar</FL>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Notlar..." rows={2} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit",resize:"none"}}/>
    <FL>Fotoğraf Ekle</FL>
    <div style={{display:"flex",gap:6,marginBottom:4}}>
      <button type="button" onClick={()=>cameraRef2.current?.click()}
        style={{flex:1,padding:"9px 0",borderRadius:10,border:"1.5px solid #4A7C3F",background:"rgba(74,124,63,.2)",color:"#10B981",fontWeight:700,fontSize:12,cursor:"pointer"}}>
        📷 Kamera
      </button>
      <button type="button" onClick={()=>photoRef.current?.click()}
        style={{flex:1,padding:"9px 0",borderRadius:10,border:"1.5px solid #2873A8",background:"rgba(40,115,168,.2)",color:"#42A5F5",fontWeight:700,fontSize:12,cursor:"pointer"}}>
        🖼️ Galeri
      </button>
    </div>
    <input ref={cameraRef2} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>setPhotos(p=>[...p,...Array.from(e.target.files)])}/>
    <input ref={photoRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>setPhotos(p=>[...p,...Array.from(e.target.files)])}/>
    {photos.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
      {photos.map((f,i)=>(
        <div key={i} style={{position:"relative"}}>
          <img src={URL.createObjectURL(f)} style={{width:60,height:60,objectFit:"cover",borderRadius:8,border:"1px solid rgba(212,175,55,.12)"}}/>
          <button onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:-5,right:-5,background:"#C0392B",border:"none",color:"#fff",borderRadius:"50%",width:18,height:18,fontSize:11,cursor:"pointer",lineHeight:"18px",textAlign:"center",padding:0}}>×</button>
        </div>
      ))}
    </div>}
    {uploading&&<div style={{fontSize:11,color:"var(--primary,#8B5CF6)"}}>⏳ Fotoğraflar yükleniyor...</div>}
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
    </div>
  </ModalWrap>;
}

// ── Toplu Aşı ──
function VaccineModal({ breed, goats, onSave, onClose, currentUser }) {
  const breedGoats=goats.filter(g=>g.breed===breed.id&&!g.archived);
  const anacList=breedGoats.filter(g=>g.category==="anac");
  const oglakList=breedGoats.filter(g=>g.category==="kuzu");
  const [vaccineType,setVaccineType]=useState("");
  const [date,setDate]=useState(todayISO());
  const [batchNo,setBatchNo]=useState("");
  const [selected,setSelected]=useState(new Set(breedGoats.map(g=>g.id)));
  const [err,setErr]=useState("");
  const [saving,setSaving]=useState(false);
  const toggle=id=>setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});
  const toggleGroup=list=>{const allSel=list.every(g=>selected.has(g.id));setSelected(prev=>{const s=new Set(prev);list.forEach(g=>allSel?s.delete(g.id):s.add(g.id));return s;});};
  const save=async()=>{
    if(!vaccineType){setErr("Aşı türü seçiniz");return;}
    if(selected.size===0){setErr("En az bir hayvan seçin");return;}
    setSaving(true);
    const records=[...selected].map(goatId=>({id:"v"+Date.now()+goatId,goatId,breed:breed.id,date,vaccineType,batchNo,createdByName:currentUser}));
    const {error}=await sb.from("vaccines").insert(records.map(fromVaccine));
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave(records);
  };
  const GoatRow=({g})=>{const sel=selected.has(g.id);return <div onClick={()=>toggle(g.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,background:sel?breed.bg:"#F9F9F6",border:`1.5px solid ${sel?breed.color+"44":"#E5E7EB"}`,cursor:"pointer",marginBottom:4}}>
    <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sel?breed.color:"#6B7280"}`,background:sel?breed.color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sel&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}</div>
    <span style={{fontSize:13,fontWeight:sel?700:400,color:sel?breed.color:"#374151"}}>{g.name}</span>
    <span style={{fontSize:10,color:"#9CA3AF",marginLeft:"auto"}}>{g.earTag}</span>
  </div>;};
  return <ModalWrap title={`💉 Toplu Aşı — ${breed.emoji} ${breed.name}`} onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <FL>Aşı Türü *</FL>
    <select value={vaccineType} onChange={e=>setVaccineType(e.target.value)} style={S.select}><option value="">— Seçin —</option>{VACCINE_DEFS.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}</select>
    <FL>Tarih *</FL><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={S.input}/>
    <FL>Parti / Seri No</FL><input value={batchNo} onChange={e=>setBatchNo(e.target.value)} placeholder="örn. ENT-2026-A12" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit"}}/>

function timeAgo(dt){
  if(!dt) return "";
  const diff = (Date.now()-new Date(dt).getTime())/1000;
  if(diff<60) return "Az önce";
  if(diff<3600) return `${Math.floor(diff/60)} dk önce`;
  if(diff<86400) return `${Math.floor(diff/3600)} sa önce`;
  if(diff<172800) return "Dün";
  return new Date(dt).toLocaleDateString("tr-TR");
}

  const [cause, setCause] = useState("");
  const [causeCustom, setCauseCustom] = useState("");
  const [notes, setNotes] = useState("");
  const [photos, setPhotos] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [viewPhotos, setViewPhotos] = useState(null); // {deathId, urls:[]}
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);
  const [selBreed, setSelBreed] = useState("all");
  const [deathPhotos, setDeathPhotos] = useState({}); // {deathId: [url,...]}
  const isVet = currentUser==="Danışman"||currentUser==="İşletme Sahibi";

  useEffect(()=>setLocal(deaths),[deaths]);

  // Fotoğrafları yükle
  useEffect(()=>{
    const loadPhotos = async () => {
      const {data} = await sb.storage.from("death-photos").list("", {limit:1000});
      if(!data) return;
      const map = {};
      data.forEach(f=>{
        const parts = f.name.split("_");
        const deathId = parts[0];
        if(!map[deathId]) map[deathId]=[];
        const {data:{publicUrl}} = sb.storage.from("death-photos").getPublicUrl(f.name);
        map[deathId].push(publicUrl);
      });
      setDeathPhotos(map);
    };
    loadPhotos();
  },[]);

  const uploadPhotos = async (deathId, files) => {
    setUploading(true);
    const urls = [];
    for(const file of files){
      const ext = file.name.split(".").pop();
      const path = `${deathId}_${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const {error} = await sb.storage.from("death-photos").upload(path, file, {contentType:file.type});
      if(!error){
        const {data:{publicUrl}} = sb.storage.from("death-photos").getPublicUrl(path);
        urls.push(publicUrl);
      }
    }
    setDeathPhotos(p=>({...p,[deathId]:[...(p[deathId]||[]),...urls]}));
    setUploading(false);
    return urls;
  };

  const openEdit = (d) => {
    setEditDeath(d);
    setBreed(d.breed);setCategory(d.category||"anac");setDevletNo(d.earTag);
    setDeathDate(d.deathDate);setDeathTime(d.deathTime||"");
    setCause(DEATH_CAUSES.includes(d.cause)?d.cause:"Diğer");
    setCauseCustom(DEATH_CAUSES.includes(d.cause)?"":d.cause);
    setNotes(d.notes||"");setErr("");setPhotos([]);
    setShowForm(true);
  };

  const reset = () => { setBreed("");setCategory("anac");setDevletNo("TR--");setDeathDate(todayISO());setDeathTime("");setCause("");setCauseCustom("");setNotes("");setErr("");setEditDeath(null);setPhotos([]); };

  const save = async () => {
    if(!breed){setErr("Irk seçiniz");return;}
    if(false){setErr("Küpe no giriniz");return;}
    if(!cause){setErr("Ölüm sebebi seçiniz");return;}
    setSaving(true);
    const finalCause = cause==="Diğer" ? causeCustom.trim() : cause;
    if(editDeath){
      await sb.from("deaths").update({breed,category,ear_tag:earTag.trim(),death_date:deathDate,death_time:deathTime||null,cause:finalCause,notes:notes||null}).eq("id",editDeath.id);
      const updated = {...editDeath,breed,category,earTag:(devletNo||"")+(isletmeNo?"|||"+isletmeNo:""),deathDate,deathTime,cause:finalCause,notes};
      if(photos.length>0) await uploadPhotos(editDeath.id, photos);
      setLocal(p=>p.map(x=>x.id===editDeath.id?updated:x));
      setShowForm(false);reset();setSaving(false);return;
    }
    const rec = {id:"d"+Date.now(), breed, category, ear_tag:earTag.trim(), death_date:deathDate, death_time:deathTime||null, cause:finalCause, notes:notes||null, created_by:currentUser};
    const {error} = await sb.from("deaths").insert(rec);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    if(photos.length>0) await uploadPhotos(rec.id, photos);
    const obj = {id:rec.id, breed, category, earTag:(devletNo||"")+(isletmeNo?"|||"+isletmeNo:""), deathDate, deathTime, cause:finalCause, notes, createdBy:currentUser};
    setLocal(p=>[obj,...p]);
    onDelete && onDelete(null, obj);
    setShowForm(false);
    reset();
    setSaving(false);
  };

  const del = async (id) => {
    await sb.from("deaths").delete().eq("id",id);
    setLocal(p=>p.filter(x=>x.id!==id));
    onDelete(id);
  };

          <div style={{color:"#fff",fontSize:13,marginBottom:12,fontWeight:700}}>📷 Fotoğraflar ({viewPhotos.urls.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:10,overflowY:"auto",maxHeight:"80vh",width:"100%",maxWidth:400}}>
            {viewPhotos.urls.map((url,i)=>(
              <img key={i} src={url} alt={`foto-${i}`} style={{width:"100%",borderRadius:12,objectFit:"cover"}} onClick={e=>e.stopPropagation()}/>

          <button onClick={()=>setViewPhotos(null)} style={{marginTop:16,background:"#FFFFFF",border:"none",borderRadius:10,padding:"10px 28px",fontWeight:700,fontSize:14,cursor:"pointer"}}>Kapat</button>
        </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h2 style={S.title}>💀 Ölüm Kayıtları</h2>
        <button onClick={()=>setShowForm(!showForm)} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13}}>

        <div style={{...S.card,marginBottom:12,background:"#FFF8F8",border:"1.5px solid #F5C0BA"}}>

          {err&&<ErrBox msg={err}/>}
          <FL>Irk *</FL>
          <div style={{display:"flex",gap:6,marginBottom:4}}>
            {BREEDS.map(b=><button key={b.id} onClick={()=>setBreed(b.id)} style={{flex:1,padding:"7px 0",borderRadius:8,border:`1.5px solid ${breed===b.id?b.color:"#6B7280"}`,background:breed===b.id?b.bg:"#fff",color:breed===b.id?b.color:"#9CA3AF",fontWeight:breed===b.id?700:400,fontSize:11,cursor:"pointer"}}>{b.emoji} {b.name}</button>)}

          <FL>Kategori *</FL>
          <div style={{display:"flex",gap:6}}>

            <button onClick={()=>setCategory("kuzu")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${category==="kuzu"?"#D97706":"#E5E7EB"}`,background:category==="kuzu"?"#FEF3C7":"#fff",color:category==="kuzu"?"#92400E":"#8c8c7e",fontWeight:category==="kuzu"?700:400,fontSize:13,cursor:"pointer"}}>🐏 Kuzu</button>
            <button onClick={()=>setCategory("koc")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${category==="koc"?"#7C3AED":"#E5E7EB"}`,background:category==="koc"?"#EDE9FE":"#fff",color:category==="koc"?"#5B21B6":"#8c8c7e",fontWeight:category==="koc"?700:400,fontSize:13,cursor:"pointer"}}>🐑 Koç</button>
          </div>
          <EarTagInput devletNo={devletNo} setDevletNo={setDevletNo} isletmeNo={isletmeNo} setIsletmeNo={setIsletmeNo}/>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}>
              <FL>Tarih *</FL>
              <input type="date" value={deathDate} onChange={e=>setDeathDate(e.target.value)} style={S.input}/>
            </div>
            <div style={{flex:1}}>
              <FL>Saat</FL>
              <input type="time" value={deathTime} onChange={e=>setDeathTime(e.target.value)} style={S.input}/>
            </div>
          </div>
          <FL>Ölüm Sebebi *</FL>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {DEATH_CAUSES.map(c=><button key={c} onClick={()=>setCause(c)} style={{padding:"6px 10px",borderRadius:8,border:`1.5px solid ${cause===c?"#BE3B31":"#E5E7EB"}`,background:cause===c?"#FFF0EE":"#fff",color:cause===c?"#BE3B31":"#8c8c7e",fontWeight:cause===c?700:400,fontSize:11,cursor:"pointer"}}>{c}</button>)}
          </div>
          {cause==="Diğer"&&<input value={causeCustom} onChange={e=>setCauseCustom(e.target.value)} placeholder="Sebebi yazın..." style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit"}}/>}
          <FL>Notlar</FL>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical"}}/>
          <FL>Fotoğraf Ekle</FL>
          <label style={{display:"block",background:"#FFF8F8",border:"1.5px dashed #BE3B31",borderRadius:10,padding:"12px",textAlign:"center",cursor:"pointer"}}>
            <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>setPhotos(p=>[...p,...Array.from(e.target.files)])}/>
            <div style={{fontSize:22}}>📷</div>
            <div style={{fontSize:12,color:"#EF4444",fontWeight:600,marginTop:2}}>Galeriden Seç</div>
            <div style={{fontSize:10,color:"#9CA3AF"}}>Birden fazla seçilebilir</div>
          </label>
          {photos.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
            {photos.map((f,i)=>(
              <div key={i} style={{position:"relative"}}>
                <img src={URL.createObjectURL(f)} style={{width:64,height:64,objectFit:"cover",borderRadius:8,border:"1px solid rgba(212,175,55,.12)"}}/>
                <button onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:-5,right:-5,background:"#C0392B",border:"none",color:"#fff",borderRadius:"50%",width:18,height:18,fontSize:11,cursor:"pointer",lineHeight:"18px",textAlign:"center",padding:0}}>×</button>
              </div>
            ))}
          </div>}
          {uploading&&<div style={{fontSize:11,color:"var(--primary,#8B5CF6)",marginTop:4}}>⏳ Fotoğraflar yükleniyor...</div>}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={()=>{setShowForm(false);reset();}} style={{...S.btnOutline,flex:1,padding:11}}>İptal</button>
            <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:11,background:"#C0392B",opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setSelBreed("all")} style={{...S.btnSm,background:selBreed==="all"?"#4A7C3F":"#F2F0EA",color:selBreed==="all"?"#fff":"#555",whiteSpace:"nowrap",padding:"6px 14px"}}>Tümü ({local.length})</button>
        {BREEDS.map(b=><button key={b.id} onClick={()=>setSelBreed(b.id)} style={{...S.btnSm,background:selBreed===b.id?b.color:b.bg,color:selBreed===b.id?"#fff":b.color,whiteSpace:"nowrap",padding:"6px 14px"}}>{b.emoji} {b.name}</button>)}
      </div>

      {filtered.length===0 && <Empty text="Ölüm kaydı yok"/>}
      {[...filtered].sort((a,b)=>new Date(b.deathDate)-new Date(a.deathDate)).map(d=>{
        const b=BREEDS.find(x=>x.id===d.breed);
        return (
          <div key={d.id} style={{...S.card,padding:12,marginBottom:8,border:"1.5px solid #F5C0BA"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:700,color:b?.color,marginBottom:2}}>{b?.emoji} {b?.name} · {d.category==="kuzu"?"🐏 Kuzu":"🐐 Anaç"} · 📅 {fmt(d.deathDate)}{d.deathTime?` · ⏰ ${d.deathTime}`:""}</div>
                <div style={{fontWeight:700,fontSize:14,color:"#1A1A2E"}}>Küpe: {d.earTag}</div>
                <div style={{fontSize:12,color:"#EF4444",marginTop:2,fontWeight:600}}>☠️ {d.cause}</div>
                {d.notes&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:2}}>📝 {d.notes}</div>}
                <div style={{fontSize:10,color:"#6B7280",marginTop:4}}>Ekleyen: {d.createdBy}</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>
                  {deathPhotos[d.id]?.length>0&&(
                    <button onClick={function(){setViewPhotos({deathId:d.id,urls:deathPhotos[d.id]});}}
                      style={{...S.btnSm,background:"rgba(14,165,233,.1)",color:"#0EA5E9",fontSize:10,padding:"3px 8px"}}>
                      📷 {deathPhotos[d.id].length} Fotoğraf
                    </button>
                  )}
                  {currentUser!=="Misafir"&&(
                    <label style={{...S.btnSm,background:"rgba(16,185,129,.1)",color:"#059669",fontSize:10,padding:"3px 8px",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:3}}>
                      📎 Fotoğraf Ekle
                      <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={function(e){
                        var files=Array.from(e.target.files);
                        if(!files.length) return;
                        uploadPhotos(d.id,files);
                        e.target.value="";
                      }}/>
                    </label>
                  )}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <span style={{background:"rgba(239,68,68,.1)",color:"#EF4444",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:8}}>Öldü</span>
                {currentUser!=="Misafir" && <button onClick={()=>openEdit(d)} style={{...S.btnSm,background:"rgba(40,115,168,.15)",color:"#0EA5E9",fontSize:10,padding:"3px 8px"}}>✏️ Düzenle</button>}
                {isVet&&<button onClick={()=>del(d.id)} style={{...S.btnSm,background:"rgba(239,68,68,.1)",color:"#EF4444",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Toplu Tedavi ──
function GroupTreatmentsPage({ groupTreatments, treatmentDaysData, currentUser, onAdd, onUpdate, onDelete, onTreatmentDayUpdate }) {
  const [local, setLocal] = useState(groupTreatments);
  const [showForm, setShowForm] = useState(false);
  const [breed, setBreed] = useState("");
  const [category, setCategory] = useState("anac");
  const [groupName, setGroupName] = useState("");
  const [condition, setCondition] = useState("");
  const [condCustom, setCondCustom] = useState("");
  const [treatment, setTreatment] = useState("");
  const [txDays, setTxDays] = useState(0);
  const [startDate, setStartDate] = useState(todayISO());
  const [notes, setNotes] = useState("");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);
  const [selBreed, setSelBreed] = useState("all");
  const [markingDay, setMarkingDay] = useState(null);
  const isVet = currentUser==="Danışman"||currentUser==="İşletme Sahibi";
  const today = todayISO();

  useEffect(()=>setLocal(groupTreatments),[groupTreatments]);

  const reset = ()=>{setBreed("");setCategory("anac");setGroupName("");setCondition("");setCondCustom("");setTreatment("");setTxDays(0);setStartDate(todayISO());setNotes("");setErr("");};

  const save = async () => {
    if(!breed){setErr("Irk seçiniz");return;}
    if(!groupName.trim()){setErr("Grup adı giriniz");return;}
    const cond = condition==="Diğer"?condCustom.trim():condition;
    if(!cond){setErr("Hastalık giriniz");return;}
    setSaving(true);
    const rec = {id:"gt"+Date.now(), breed, category, group_name:groupName.trim(), condition:cond, treatment:treatment||null, treatment_days:txDays, start_date:startDate, status:"tedavi_altında", notes:notes||null, created_by:currentUser};
    const {error} = await sb.from("group_treatments").insert(rec);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    // Tedavi günleri oluştur
    if(txDays>0){
      const days=[];
      for(let i=0;i<txDays;i++){
        const d=new Date(startDate);d.setDate(d.getDate()+i);
        days.push({id:"gtd"+Date.now()+i,health_record_id:rec.id,goat_id:"group",day_number:i+1,planned_date:d.toISOString().split("T")[0],done:false,done_by:null,done_at:null});
      }
      await sb.from("treatment_days").insert(days);
      days.forEach(d=>onTreatmentDayUpdate({...d,healthRecordId:d.health_record_id,goatId:d.goat_id,dayNumber:d.day_number,plannedDate:d.planned_date,doneBy:"",doneAt:""}));
    }
    const obj={id:rec.id,breed,category,groupName:groupName.trim(),condition:cond,treatment,treatmentDays:txDays,startDate,status:"tedavi_altında",notes,createdBy:currentUser};
    setLocal(p=>[obj,...p]);
    onAdd(obj);
    setShowForm(false);
    reset();
    setSaving(false);
  };

  const del = async (id) => {
    await sb.from("group_treatments").delete().eq("id",id);
    await sb.from("treatment_days").delete().eq("health_record_id",id);
    setLocal(p=>p.filter(x=>x.id!==id));
    onDelete(id);
  };

  const markDay = async (day) => {
    setMarkingDay(day.id);
    const now = new Date().toISOString();
    await sb.from("treatment_days").update({done:true,done_by:currentUser,done_at:now}).eq("id",day.id);
    onTreatmentDayUpdate({...day,done:true,doneBy:currentUser,doneAt:now});
    setMarkingDay(null);
  };

  const filtered = selBreed==="all" ? local : local.filter(g=>g.breed===selBreed);

  return (
    <div className="anim-fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h2 style={S.title}>🏥 Toplu Tedavi</h2>
        <button onClick={()=>setShowForm(!showForm)} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13}}>{showForm?"✕ Kapat":"+ Ekle"}</button>
      </div>

      {showForm && (
        <div style={{...S.card,marginBottom:12,background:"#E8F5E9",border:"1.5px solid #D4E8C2"}}>
          <div style={{fontWeight:700,fontSize:14,color:"#10B981",marginBottom:10}}>➕ Toplu Tedavi Kaydı</div>
          {err&&<ErrBox msg={err}/>}
          <FL>Irk *</FL>
          <div style={{display:"flex",gap:6}}>
            {BREEDS.map(b=><button key={b.id} onClick={()=>setBreed(b.id)} style={{flex:1,padding:"7px 0",borderRadius:8,border:`1.5px solid ${breed===b.id?b.color:"#6B7280"}`,background:breed===b.id?b.bg:"#fff",color:breed===b.id?b.color:"#9CA3AF",fontWeight:breed===b.id?700:400,fontSize:11,cursor:"pointer"}}>{b.emoji} {b.name}</button>)}
          </div>
          <FL>Kategori *</FL>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setCategory("anac")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${category==="anac"?"#059669":"#E5E7EB"}`,background:category==="anac"?"#D1FAE5":"#fff",color:category==="anac"?"#065F46":"#8c8c7e",fontWeight:category==="anac"?700:400,fontSize:13,cursor:"pointer"}}>🐑 Anaç</button>
            <button onClick={()=>setCategory("kuzu")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${category==="kuzu"?"#D97706":"#E5E7EB"}`,background:category==="kuzu"?"#FEF3C7":"#fff",color:category==="kuzu"?"#92400E":"#8c8c7e",fontWeight:category==="kuzu"?700:400,fontSize:13,cursor:"pointer"}}>🐏 Kuzu</button>
            <button onClick={()=>setCategory("koc")} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${category==="koc"?"#7C3AED":"#E5E7EB"}`,background:category==="koc"?"#EDE9FE":"#fff",color:category==="koc"?"#5B21B6":"#8c8c7e",fontWeight:category==="koc"?700:400,fontSize:13,cursor:"pointer"}}>🐑 Koç</button>
          </div>
          <FL>Grup Adı *</FL>
          <input value={groupName} onChange={e=>setGroupName(e.target.value)} placeholder="örn: Grup A, Doğu Ağıl" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit"}}/>
          <FL>Hastalık / Durum *</FL>
          <select value={condition} onChange={e=>setCondition(e.target.value)} style={S.select}>
            <option value="">— Seçin —</option>
            {CONDITION_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          {condition==="Diğer"&&<input value={condCustom} onChange={e=>setCondCustom(e.target.value)} placeholder="Açıklayın..." style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit"}}/>}
          <FL>Tedavi</FL>
          <textarea value={treatment} onChange={e=>setTreatment(e.target.value)} placeholder="İlaç, doz, işlem..." rows={2} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit",resize:"none"}}/>
          <FL>Tedavi Süresi (gün)</FL>
          <div style={{display:"flex",gap:6}}>
            {[0,1,2,3,4,5].map(d=><button key={d} onClick={()=>setTxDays(d)} style={{flex:1,padding:"8px 0",borderRadius:8,border:`2px solid ${txDays===d?"#4A7C3F":"#E5E7EB"}`,background:txDays===d?"#E3F0DC":"#fff",color:txDays===d?"#3D5A25":"#555",fontWeight:700,fontSize:13,cursor:"pointer"}}>{d===0?"—":d}</button>)}
          </div>
          <FL>Başlangıç Tarihi *</FL>
          <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={S.input}/>
          <FL>Notlar</FL>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical"}}/>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={()=>{setShowForm(false);reset();}} style={{...S.btnOutline,flex:1,padding:11}}>İptal</button>
            <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:11,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setSelBreed("all")} style={{...S.btnSm,background:selBreed==="all"?"#4A7C3F":"#F2F0EA",color:selBreed==="all"?"#fff":"#555",whiteSpace:"nowrap",padding:"6px 14px"}}>Tümü ({local.length})</button>
        {BREEDS.map(b=><button key={b.id} onClick={()=>setSelBreed(b.id)} style={{...S.btnSm,background:selBreed===b.id?b.color:b.bg,color:selBreed===b.id?"#fff":b.color,whiteSpace:"nowrap",padding:"6px 14px"}}>{b.emoji} {b.name}</button>)}
      </div>

      {filtered.length===0 && <Empty text="Toplu tedavi kaydı yok"/>}
      {[...filtered].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(gt=>{
        const b=BREEDS.find(x=>x.id===gt.breed);
        const days=treatmentDaysData.filter(d=>d.healthRecordId===gt.id).sort((a,b)=>a.dayNumber-b.dayNumber);
        const doneDays=days.filter(d=>d.done).length;
        return (
          <div key={gt.id} style={{...S.card,padding:12,marginBottom:8,border:`1.5px solid ${b?.color}22`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:6}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:700,color:b?.color,marginBottom:2}}>{b?.emoji} {b?.name} · {gt.category==="kuzu"?"🐏 Kuzu":"🐐 Anaç"} · {gt.groupName}{gt.startDate?` · 📅 ${fmt(gt.startDate)}`:""}</div>
                <div style={{fontWeight:700,fontSize:14,color:"#1A1A2E"}}>{gt.condition}</div>
                {gt.treatment&&<div style={{fontSize:12,color:"#1F2937",marginTop:2}}>💊 {gt.treatment}</div>}
                {days.length>0&&<div style={{fontSize:10,background:"rgba(74,124,63,.2)",color:"#10B981",display:"inline-block",padding:"2px 8px",borderRadius:6,marginTop:4,fontWeight:600}}>
                  📅 {doneDays}/{days.length} gün · {doneDays<days.length?`${doneDays+1}. günde`:"Tamamlandı"}
                </div>}
                {gt.notes&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:2}}>📝 {gt.notes}</div>}
                <div style={{fontSize:10,color:"#6B7280",marginTop:4}}>Ekleyen: {gt.createdBy}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
                <StatusBadge status={gt.status}/>
                {isVet&&<button onClick={()=>del(gt.id)} style={{...S.btnSm,background:"rgba(239,68,68,.1)",color:"#EF4444",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
              </div>
            </div>
            {days.length>0&&(
              <div style={{borderTop:"1px solid rgba(0,0,0,.08)",paddingTop:8}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {days.map(day=>{
                    const isPast=day.plannedDate<today;
                    const isToday=day.plannedDate===today;
                    const isFuture=day.plannedDate>today;
                    return (
                      <div key={day.id} style={{flex:1,minWidth:55,borderRadius:8,padding:"6px 8px",textAlign:"center",
                        background:day.done?"#E3F0DC":isToday?"#EEF6FC":isPast?"#FFF0EE":"#F9F9F6",
                        border:`1.5px solid ${day.done?"#4A7C3F":isToday?"#2873A8":isPast?"#F5C0BA":"#E5E7EB"}`}}>
                        <div style={{fontSize:11,fontWeight:700,color:day.done?"#3D5A25":isToday?"#2873A8":isPast?"#BE3B31":"#aaa"}}>
                          {day.done?"✅":isToday?"🔵":isPast?"⚠️":"⏳"} {day.dayNumber}.gün
                        </div>
                        {day.done&&<div style={{fontSize:9,color:"#10B981"}}>{day.doneBy}</div>}
                        {!day.done&&!isFuture&&(
                          <button onClick={()=>markDay(day)} disabled={markingDay===day.id}
                            style={{marginTop:4,padding:"3px 6px",borderRadius:6,background:"#4A7C3F",color:"#fff",border:"none",fontSize:9,cursor:"pointer",width:"100%"}}>
                            {markingDay===day.id?"...":"Yapıldı"}
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
function BirthModal({ onSave, onClose, currentUser, editData }) {
  const [breed, setBreed] = useState(editData?.breed||"");
  const [motherEarTag, setMotherEarTag] = useState(editData?.motherEarTag||"");
  const [birthType, setBirthType] = useState(editData?.birthType||"");
  const [birthDate, setBirthDate] = useState(editData?.birthDate||todayISO());
  const [kidCount, setKidCount] = useState(editData?.kidCount||0);
  const [kids, setKids] = useState(()=>{
    if(editData?.kids){
      return typeof editData.kids==="string"?JSON.parse(editData.kids||"[]"):editData.kids;
    }
    return [];
  });
  const [notes, setNotes] = useState(editData?.notes||"");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  const updateKidCount = (n) => {
    setKidCount(n);
    const newKids = Array.from({length:n}, (_,i) => kids[i] || {earTag:"", gender:"dişi"});
    setKids(newKids);
  };

  const save = async () => {
    if(!breed){setErr("Irk seçiniz");return;}
    if(!motherEarTag.trim()){setErr("Ana hayvan küpe no giriniz");return;}
    if(!birthType){setErr("Doğum türü seçiniz");return;}
    if(!birthDate){setErr("Tarih giriniz");return;}
    setSaving(true);
    const kidsJson = JSON.stringify(kids);
    if(editData){
      // Güncelleme modu
      await sb.from("births").update({
        breed, mother_ear_tag:motherEarTag.trim(),
        birth_type:birthType, birth_date:birthDate,
        kid_count:kidCount, kids:kidsJson, notes:notes||null
      }).eq("id",editData.id);
      onSave({...editData, breed, motherEarTag:motherEarTag.trim(), birthType, birthDate, kidCount, kids, notes});
      return;
    }
    const record = {
      id:"b"+Date.now(), breed, mother_ear_tag:motherEarTag.trim(),
      birth_type:birthType, birth_date:birthDate,
      kid_count:kidCount, kids:kidsJson,
      notes:notes||null, created_by:currentUser
    };
    const {error} = await sb.from("births").insert(record);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave({id:record.id, breed, motherEarTag:motherEarTag.trim(), birthType, birthDate, kidCount, kids, notes, createdBy:currentUser, createdAt:new Date().toISOString()});
  };

  const BtnGroup = ({label, options, value, onChange, colorMap}) => (
    <div>
      <FL>{label}</FL>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {options.map(([v,l])=>{
          const sel=value===v;
          const c=colorMap?.[v]||{bg:"#E3F0DC",color:"#10B981",border:"#4A7C3F"};
          return <button key={v} onClick={()=>onChange(v)} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1.5px solid ${sel?c.border:"#E5E7EB"}`,background:sel?c.bg:"#fff",color:sel?c.color:"#9CA3AF",fontWeight:sel?700:400,fontSize:12,cursor:"pointer",minWidth:60}}>{l}</button>;
        })}
      </div>
    </div>
  );

  return <ModalWrap title={editData?"✏️ Doğum Kaydı Düzenle":"🐣 Yeni Doğum Kaydı"} onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <BtnGroup label="Irk *" options={BREEDS.map(b=>[b.id,b.emoji+" "+b.name])} value={breed} onChange={setBreed}
      colorMap={{saanen:{bg:"#E3F0DC",color:"#10B981",border:"#4A7C3F"},honamli:{bg:"#F0E6F6",color:"#BA68C8",border:"#7B4B94"},halep:{bg:"#FFF0E6",color:"#E8975A",border:"#B8602A"}}}/>
    <FL>Ana Hayvan Küpe No *</FL>
    <input value={motherEarTag} onChange={e=>setMotherEarTag(e.target.value)} placeholder="TR-15-0042" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #E5E7EB",fontSize:13,boxSizing:"border-box",outline:"none",color:"#111827",display:"block",fontFamily:"inherit"}}/>
    <BtnGroup label="Doğum Türü *" options={[["normal","✅ Normal"],["gunsuz","⚠️ Günsüz"],["atik","❌ Atık"]]} value={birthType} onChange={v=>{setBirthType(v);if(v==="atik"){setKidCount(0);setKids([]);}}}
      colorMap={{normal:{bg:"#E3F0DC",color:"#10B981",border:"#4A7C3F"},gunsuz:{bg:"#FFF8EC",color:"var(--primary,#8B5CF6)",border:"#D4850A"},atik:{bg:"#FFF0EE",color:"#EF4444",border:"#BE3B31"}}}/>
    {birthType!=="atik" && <>
      <BtnGroup label="Yavru Sayısı" options={[[1,"1"],[2,"2"],[3,"3"],[4,"4"]]} value={kidCount} onChange={updateKidCount}
        colorMap={{1:{bg:"#E3F0DC",color:"#10B981",border:"#4A7C3F"},2:{bg:"#E3F0DC",color:"#10B981",border:"#4A7C3F"},3:{bg:"#E3F0DC",color:"#10B981",border:"#4A7C3F"},4:{bg:"#E3F0DC",color:"#10B981",border:"#4A7C3F"}}}/>
      {kids.map((kid,i)=>(
        <div key={i} style={{background:"#E8F5E9",borderRadius:10,padding:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#10B981",marginBottom:6}}>🍼 {i+1}. Yavru</div>
          <FL>Küpe No</FL>
          <EarTagInput value={kid.earTag||"TR--"} onChange={v=>{const k=[...kids];k[i]={...k[i],earTag:v};setKids(k);}}/>
          <FL>Cinsiyet</FL>
          <div style={{display:"flex",gap:6,marginTop:4}}>
            {[["dişi","♀ Dişi"],["erkek","♂ Erkek"]].map(([v,l])=>(
              <button key={v} onClick={()=>{const k=[...kids];k[i]={...k[i],gender:v};setKids(k);}}
                style={{flex:1,padding:"7px 0",borderRadius:8,border:`1.5px solid ${kid.gender===v?"#4A7C3F":"#E5E7EB"}`,background:kid.gender===v?"#E3F0DC":"#fff",color:kid.gender===v?"#3D5A25":"#8c8c7e",fontWeight:kid.gender===v?700:400,fontSize:12,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        </div>
      ))}
    </>}
    <FL>Tarih *</FL>
    <input type="date" value={birthDate} onChange={e=>setBirthDate(e.target.value)} style={S.input}/>
    <FL>Notlar</FL>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...S.input,resize:"vertical",lineHeight:1.6}}/>
    <div style={{display:"flex",gap:8,marginTop:4}}>
      <button onClick={onClose} style={{...S.btnOutline,flex:1,padding:12}}>İptal</button>
      <button onClick={save} disabled={saving} style={{...S.btnPrimary,flex:2,padding:12,opacity:saving?.6:1}}>{saving?"Kaydediliyor...":"💾 Kaydet"}</button>
    </div>
  </ModalWrap>;
}

function BirthsPage({ births, currentUser, onDelete, onAdd }) {
  const [selBreed, setSelBreed] = useState("all");
  const [showModal, setShowModal] = useState(false);
  const [editBirth, setEditBirth] = useState(null);
  const [localBirths, setLocalBirths] = useState(births);
  const isVet = currentUser==="Danışman"||currentUser==="İşletme Sahibi";

  useEffect(()=>setLocalBirths(births),[births]);

  const filtered = selBreed==="all" ? localBirths : localBirths.filter(b=>b.breed===selBreed);
  const sorted = [...filtered].sort((a,b)=>new Date(b.birthDate)-new Date(a.birthDate));

  const stats = {
    total: localBirths.length,
    normal: localBirths.filter(b=>b.birthType==="normal").length,
    atik: localBirths.filter(b=>b.birthType==="atik").length,
    kids: localBirths.reduce((s,b)=>s+(b.kidCount||0),0),
  };

  const deleteBirth = async (id) => {
    await sb.from("births").delete().eq("id",id);
    setLocalBirths(p=>p.filter(b=>b.id!==id));
    onDelete(id);
  };

  const typeLabel = {normal:"Normal",gunsuz:"Günsüz",atik:"Atık"};
  const typeBg = {normal:{bg:"#E3F0DC",color:"#10B981"},gunsuz:{bg:"#FFF8EC",color:"var(--primary,#8B5CF6)"},atik:{bg:"#FFF0EE",color:"#EF4444"}};

  return (
    <div className="anim-fade">
      {showModal && <BirthModal currentUser={currentUser}
        onSave={b=>{setLocalBirths(p=>[b,...p]);setShowModal(false);onAdd&&onAdd(b);}}
        onClose={()=>setShowModal(false)}/>}
      {editBirth && <BirthModal currentUser={currentUser} editData={editBirth}
        onSave={b=>{
          setLocalBirths(p=>p.map(x=>x.id===editBirth.id?{...b,id:editBirth.id}:x));
          setEditBirth(null);
        }}
        onClose={()=>setEditBirth(null)}/>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h2 style={S.title}>🐣 Doğum Kayıtları</h2>
        <button onClick={()=>setShowModal(true)} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13}}>+ Ekle</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}}>
        <Stat v={stats.total} l="Toplam" bg="rgba(0,0,0,.03)" c="#4B5563"/>
        <Stat v={stats.normal} l="Normal" bg="rgba(16,185,129,.12)" c="#10B981"/>
        <Stat v={stats.atik} l="Atık" bg="#FFF0EE" c="#BE3B31"/>
        <Stat v={stats.kids} l="Yavru" bg="#EEF6FC" c="#2873A8"/>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setSelBreed("all")} style={{...S.btnSm,background:selBreed==="all"?"#4A7C3F":"#F2F0EA",color:selBreed==="all"?"#fff":"#555",whiteSpace:"nowrap",padding:"6px 14px"}}>Tümü ({localBirths.length})</button>
        {BREEDS.map(b=><button key={b.id} onClick={()=>setSelBreed(b.id)} style={{...S.btnSm,background:selBreed===b.id?b.color:b.bg,color:selBreed===b.id?"#fff":b.color,whiteSpace:"nowrap",padding:"6px 14px"}}>{b.emoji} {b.name}</button>)}
      </div>

      {sorted.length===0 && <Empty text="Henüz doğum kaydı yok"/>}
      {sorted.map(birth=>{
        const b=BREEDS.find(x=>x.id===birth.breed);
        const tc=typeBg[birth.birthType]||{bg:"#F2F0EA",color:"#6B7280"};
        const kids = typeof birth.kids==="string" ? JSON.parse(birth.kids||"[]") : (birth.kids||[]);
        return (
          <div key={birth.id} style={{...S.card,padding:12,marginBottom:8,border:`1.5px solid ${b?.color}22`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:8}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:b?.color,marginBottom:2}}>{b?.emoji} {b?.name} · 📅 {fmt(birth.birthDate)}</div>
                <div style={{fontWeight:700,fontSize:14,color:"#1A1A2E"}}>Ana: {birth.motherEarTag}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <span style={{background:tc.bg,color:tc.color,fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:8}}>{typeLabel[birth.birthType]}</span>
                {currentUser!=="Misafir" && <button onClick={()=>setEditBirth(birth)} style={{...S.btnSm,background:"rgba(40,115,168,.15)",color:"#0EA5E9",fontSize:10,padding:"3px 8px"}}>✏️ Düzenle</button>}
                {isVet && <button onClick={()=>deleteBirth(birth.id)} style={{...S.btnSm,background:"rgba(239,68,68,.1)",color:"#EF4444",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
              </div>
            </div>
            {kids.length>0 && (
              <div style={{borderTop:"1px solid rgba(0,0,0,.08)",paddingTop:8}}>
                <div style={{fontSize:11,color:"#9CA3AF",marginBottom:6,fontWeight:600}}>{kids.length} Yavru:</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {kids.map((kid,i)=>(
                    <div key={i} style={{background:"#E8F5E9",borderRadius:8,padding:"5px 10px",minWidth:90}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#10B981"}}>🍼 {kid.earTag||"—"}</div>
                      <div style={{fontSize:10,color:"#9CA3AF"}}>{kid.gender==="dişi"?"♀ Dişi":"♂ Erkek"}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {birth.notes&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:6}}>📝 {birth.notes}</div>}
            <div style={{fontSize:10,color:"#6B7280",marginTop:4}}>Ekleyen: {birth.createdBy}</div>
          </div>
        );
      })}
    </div>
  );
}

// ── Grup Aşı Modal ──
function GroupVaccineModal({ group, goats, onSave, onClose, currentUser }) {
  const groupGoats = goats.filter(g=>group.memberIds.includes(g.id)&&!g.archived);
  const [vaccineType, setVaccineType] = useState("");
  const [date, setDate] = useState(todayISO());
  const [batchNo, setBatchNo] = useState("");
  const [notes, setNotes] = useState("");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  const save = async () => {
    if (!vaccineType){setErr("Aşı türü seçiniz");return;}
    setSaving(true);
    const report = {
      id:"vr"+Date.now(),
      group_id: group.id,
      group_name: group.name,
      breed: group.breed,
      vaccine_type: vaccineType,
      date, batch_no: batchNo||null,
      goat_ids: groupGoats.map(g=>g.id).join(","),
      goat_names: groupGoats.length>0 ? groupGoats.map(g=>g.name).join(", ") : "—",
      goat_count: groupGoats.length,
      created_by: currentUser,
      notes: notes||null,
      record_type: "uygulama",
    };
    const {error} = await sb.from("vaccine_reports").insert(report);
    if(error){setErr("Hata: "+error.message);setSaving(false);return;}
    onSave({...report, goatCount:report.goat_count, createdBy:report.created_by, batchNo:report.batch_no, vaccineType:report.vaccine_type, groupName:report.group_name, groupId:report.group_id});
  };

  return <ModalWrap title={`💉 ${group.name} — Aşı Uygula`} onClose={onClose}>
    {err&&<ErrBox msg={err}/>}
    <div style={{background:"#E8F5E9",borderRadius:10,padding:10,marginBottom:4}}>
      <div style={{fontSize:12,fontWeight:700,color:"#10B981",marginBottom:2}}>👥 {group.name}</div>
      {group.description&&<div style={{fontSize:11,color:"#9CA3AF"}}>{group.description}</div>}
      {groupGoats.length>0&&<div style={{fontSize:11,color:"#6B7280",marginTop:2}}>{groupGoats.length} hayvan: {groupGoats.map(g=>g.name).join(", ")}</div>}
    </div>
    <FL>Aşı Türü *</FL>
    <select value={vaccineType} onChange={e=>setVaccineType(e.target.value)} style={S.select}>
      <option value="">— Seçin —</option>
