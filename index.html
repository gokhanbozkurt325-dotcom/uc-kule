                        const hDays=treatmentDaysData.filter(d=>d.healthRecordId===h.id);
                        const doneDays=hDays.filter(d=>d.done).length;
                        return (
                          <div key={h.id} style={{...S.card,padding:12,marginBottom:5,cursor:"pointer",border:`1.5px solid ${breed.color}22`}}
                            onClick={()=>setSelHealthRec(h)}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                              <div style={{flex:1}}>
                                <div style={{fontSize:11,fontWeight:700,color:breed.color,marginBottom:2}}>
                                  {breed.emoji} {g?.name} <span style={{color:"#9CA3AF",fontWeight:400}}>({g?.earTag})</span>
                                </div>
                                <div style={{fontWeight:700,fontSize:14,color:"#1A1A2E"}}>{h.condition}</div>
                                <div style={{fontSize:11,color:"#9CA3AF"}}>📅 {fmt(h.date)} · {h.createdByName}</div>
                                {h.treatment&&<div style={{fontSize:12,color:"#1F2937",marginTop:4}}>💊 {h.treatment}</div>}
                                {h.notes&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:2}}>📝 {h.notes}</div>}
                                {hDays.length>0&&(
                                  <div style={{marginTop:4,display:"flex",gap:4,alignItems:"center"}}>
                                    <span style={{fontSize:10,background:"rgba(74,124,63,.2)",color:"#10B981",padding:"2px 8px",borderRadius:8,fontWeight:700}}>
                                      📅 {doneDays}/{hDays.length} gün · {doneDays<hDays.length?`${doneDays+1}. günde`:"Tamamlandı"}
                                    </span>
                                  </div>
                                )}
                              </div>
                              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                                <StatusBadge status={h.status}/>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            )}

            {breedTab==="asi" && <BreedVaccineTab breed={breed} goats={goats} vaccineGroups={vaccineGroups} vaccineReports={vaccineReports} onGroupCreated={saveVaccineGroup} onGroupUpdated={updateVaccineGroup} onGroupDeleted={deleteVaccineGroup} onVaccineApplied={saveVaccineReport} currentUser={currentUser}/>}
          </div>
        )}

        {/* GOAT DETAIL */}
        {page==="goats"&&selGoat&&goat && (
          <GoatDetail goat={goat} goats={goats} healthRecs={healthRecs} vaccines={vaccines} logs={logs}
            treatmentDays={treatmentDaysData}
            onAddHealth={()=>setHModal({breedId:goat.breed,goatId:goat.id})}
            onUpdateHealth={updateHealth} onFinalizeHealth={finalizeHealth}
            onLogsUpdate={addLogToState}
            onTreatmentDayUpdate={day=>setTreatmentDaysData(p=>p.map(d=>d.id===day.id?day:d))}
            detailTab={detailTab} setDetailTab={setDetailTab} currentUser={currentUser}/>
        )}

        {/* HEALTH PAGE */}
        {page==="health" && (
          <div className="anim-fade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={S.title}>🩺 Sağlık Kayıtları</h2>
              {!isGuest && <button onClick={()=>setHModal({})} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13}}>+ Ekle</button>}
            </div>
            {BREEDS.map(b=>{
              const breedRecs = healthRecs.filter(h=>h.breed===b.id&&!h.closed);
              if(!breedRecs.length) return null;
              return (
                <div key={b.id} style={{marginBottom:16}}>
                  {/* Irk başlığı */}
                  <div style={{fontWeight:700,fontSize:13,color:b.color,background:b.bg,padding:"6px 10px",borderRadius:8,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span>{b.emoji} {b.name}</span>
                    <button onClick={()=>{setPage("goats");setSelBreed(b.id);setBreedTab("saglik");}} style={{...S.btnSm,background:"rgba(255,255,255,.5)",color:b.color,fontSize:10}}>Detay →</button>
                  </div>
                  {/* Anaç ve Oğlak kategorileri */}
                  {[["anac","🐐 Anaç"],["oglak","🍼 Oğlak"]].map(([cat,catLabel])=>{
                    const catRecs = breedRecs.filter(h=>{
                      const g=goats.find(x=>x.id===h.goatId);
                      const hCat = h.category || g?.category || "anac";
                      return hCat===cat;
                    }).sort((a,c)=>new Date(c.date)-new Date(a.date));
                    if(!catRecs.length) return null;
                    return (
                      <div key={cat} style={{marginBottom:8}}>
                        <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",margin:"4px 0 4px 4px"}}>{catLabel}</div>
                        {catRecs.map(h=>{
                          const g=goats.find(x=>x.id===h.goatId);
                          const hDays=treatmentDaysData.filter(d=>d.healthRecordId===h.id);
                          const doneDays=hDays.filter(d=>d.done).length;
                          const lastLog=logs.filter(l=>l.healthRecordId===h.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))[0];
                          return (
                            <div key={h.id} style={{...S.card,padding:"10px 12px",marginBottom:5,cursor:"pointer"}}
                              onClick={()=>setSelHealthRec(h)}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                                <div style={{flex:1}}>
                                  <div style={{fontSize:12,fontWeight:700,color:b.color,marginBottom:2}}>
                                    {g?.name ? `${g.name} ` : ""}<span style={{fontWeight:400,color:"#9CA3AF"}}>({h.goatEarTag||g?.earTag||"—"})</span>
                                  </div>
                                  <div style={{fontWeight:700,fontSize:13,color:"#1A1A2E"}}>{h.condition}</div>
                                  {h.treatment&&<div style={{fontSize:11,color:"#1F2937",marginTop:3}}>💊 {h.treatment}</div>}
                                  {h.notes&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:2}}>📝 {h.notes}</div>}
                                  {hDays.length>0&&(
                                    <div style={{fontSize:10,background:"rgba(74,124,63,.2)",color:"#10B981",display:"inline-block",padding:"2px 8px",borderRadius:6,marginTop:4,fontWeight:600}}>
                                      📅 {doneDays}/{hDays.length} gün · {doneDays<hDays.length?`${doneDays+1}. günde`:"Tamamlandı"}
                                    </div>
                                  )}
                                  {lastLog&&<div style={{fontSize:10,color:"#9CA3AF",marginTop:3}}>
                                    🕐 Son: {lastLog.userName} · {fmtDT(lastLog.createdAt)}
                                  </div>}
                                </div>
                                <StatusBadge status={h.status}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              );
            })}
            {healthRecs.filter(h=>!h.closed).length===0 && <Empty text="Aktif sağlık kaydı yok"/>}
          </div>
        )}

        {page==="births" && <BirthsPage births={births} currentUser={currentUser}
          onAdd={b=>{ setBirths(p=>[b,...p]); addActivity("dogum_eklendi","Doğum kaydedildi",`Ana: ${b.motherEarTag} · ${b.birthType==="normal"?"Normal":b.birthType==="gunsuz"?"Günsüz":"Atık"}`,b.breed); }}
          onDelete={id=>setBirths(p=>p.filter(b=>b.id!==id))}/>}

        {page==="deaths" && <DeathsPage deaths={deaths} currentUser={currentUser}
          onDelete={(id,obj)=>{
            if(id) setDeaths(p=>p.filter(d=>d.id!==id));
            else if(obj){ setDeaths(p=>[obj,...p]); addActivity("olum_eklendi","Ölüm kaydedildi",`${obj.earTag} · ${obj.cause}`,obj.breed); }
          }}/>}

        {page==="group_tx" && <GroupTreatmentsPage
          groupTreatments={groupTreatments}
          treatmentDaysData={treatmentDaysData}
          currentUser={currentUser}
          onAdd={g=>{ setGroupTreatments(p=>[g,...p]); addActivity("toplu_tedavi","Toplu tedavi eklendi",`${g.groupName} · ${g.condition}`,g.breed); }}
          onUpdate={g=>setGroupTreatments(p=>p.map(x=>x.id===g.id?g:x))}
          onDelete={id=>setGroupTreatments(p=>p.filter(x=>x.id!==id))}
          onTreatmentDayUpdate={day=>setTreatmentDaysData(p=>p.map(d=>d.id===day.id?day:{...d,...(d.id===day.id?day:{})}))}
        />}

        {page==="vaccines" && <GlobalVaccinePage
          vaccineGroups={vaccineGroups}
          vaccineReports={vaccineReports}
          onScheduleAdded={saveVaccineReport}
          onScheduleDeleted={id=>setVaccineReports(p=>p.filter(x=>x.id!==id))}
          onVaccineApplied={r=>{
            setVaccineReports(p=>[r,...p.filter(x=>x.id!==r.id)]);
            addActivity("asi_uygulandı","Aşı uygulandı",`${r.groupName} · ${r.vaccineType||""}`,r.breed);
          }}
          currentUser={currentUser}/>}

        {page==="reports" && <ReportsPage reports={reports} goats={goats} logs={logs} vaccineReports={vaccineReports} births={births} deaths={deaths} groupTreatments={groupTreatments} treatmentDaysData={treatmentDaysData} currentUser={currentUser} onDeleteReport={deleteReport}/>}

        {/* GAME */}
        {page==="game" && (
          <div style={{padding:"0 2px"}} className="anim-fade">
            <GameHub/>
          </div>
        )}

        {/* PROFILE */}
        {page==="profile" && (
          <div className="anim-fade">
            <div style={{...S.card,textAlign:"center",padding:24,marginBottom:12,background:"linear-gradient(135deg,rgba(var(--primary-rgb),.08) 0%,#FFFFFF 100%)",border:"1.5px solid rgba(var(--primary-rgb),.15)"}}>
              <div style={{fontSize:44}}>{currentUser==="Misafir"?"👁":"👤"}</div>
              <h2 style={{margin:"4px 0 2px",fontSize:20,fontWeight:800,color:"#111827"}}>{currentUser}</h2>
              <div style={{fontSize:12,color:"#9CA3AF",marginTop:4}}>
                {currentUser==="Misafir"?"Sadece Görüntüleme":DEMO_USERS.find(u=>u.name===currentUser)?.members?.join(" · ") || (DEMO_USERS.find(u=>u.name===currentUser)?.role==="veteriner"?"Danışman":DEMO_USERS.find(u=>u.members&&u.members.includes(currentUser))?"Şef Yönetici":currentUser)}
              </div>
              <div style={{marginTop:12}}>
                <button onClick={()=>{setShowLogin(true);}} style={{...S.btnOutline,color:"#EF4444",borderColor:"#BE3B31",fontSize:13}}>🚪 Çıkış Yap</button>
              </div>
            </div>

            {/* Ses Ayarı */}
            {!isGuest && (
              <div style={{...S.card,marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:13,color:"#111827",marginBottom:8}}>🔊 Sesli Karşılama</div>
                <div style={{fontSize:12,color:"#9CA3AF",marginBottom:10}}>
                  {soundPref===true?"Her girişinizde sesli karşılama aktif ✅":soundPref===false?"Sesli karşılama kapalı 🔇":"Henüz tercih belirlenmedi"}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={async()=>{
                    setSoundPref(true);
                    await sb.from("user_preferences").upsert({id:"sp_"+currentUser.replace(/\s/g,"_"),user_name:currentUser,sound_enabled:true,theme_id:theme.id});
                    playWelcome(currentUser,healthRecs);
                  }} style={{...S.btnPrimary,flex:1,padding:10,fontSize:12,background:theme.primary,opacity:soundPref===true?.4:1}}>
                    🔊 Aç
                  </button>
                  <button onClick={async()=>{
                    setSoundPref(false);
                    window._welcomeAudio?.pause();
                    await sb.from("user_preferences").upsert({id:"sp_"+currentUser.replace(/\s/g,"_"),user_name:currentUser,sound_enabled:false,theme_id:theme.id});
                  }} style={{...S.btnOutline,flex:1,padding:10,fontSize:12,borderColor:theme.primary,color:theme.primary,opacity:soundPref===false?.4:1}}>
                    🔇 Kapat
                  </button>
                </div>
              </div>
            )}

            {/* Renk Teması */}
            {!isGuest && (
              <div style={{...S.card,marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:13,color:"#111827",marginBottom:8}}>🎨 Arayüz Rengi</div>
                <div style={{fontSize:12,color:"#9CA3AF",marginBottom:10}}>
                  Şu an: <b style={{color:theme.primary}}>{theme.emoji} {theme.name}</b>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {COLOR_THEMES.map(t=>(
                    <button key={t.id} onClick={()=>saveTheme(t,false)}
                      style={{borderRadius:10,border:`2px solid ${theme.id===t.id?t.primary:"#E5E7EB"}`,background:"#FFFFFF",padding:0,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"stretch",overflow:"hidden",boxShadow:theme.id===t.id?`0 0 0 3px ${t.primary}20`:"0 1px 3px rgba(0,0,0,.06)"}}>
                      {t.photo ? (
                        <div style={{height:40,backgroundImage:"url("+t.photo+")",backgroundSize:"cover",backgroundPosition:"center",position:"relative"}}>
                          <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:t.overlay||"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{t.emoji}</div>
                        </div>
                      ) : (
                        <div style={{height:40,background:t.header||t.primary||"#8B5CF6"||t.primary||"#8B5CF6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{t.emoji}</div>
                      )}
                      <div style={{fontSize:8,fontWeight:700,color:theme.id===t.id?theme.primary:t.primary,textAlign:"center",padding:"3px 2px",background:"#F5F5F5"}}>{t.name}</div>
                    </button>
                  ))}
                </div>
              </div>
            )}
            {(currentUser==="Danışman"||currentUser==="İşletme Sahibi") && (
              <div style={{...S.card,marginBottom:10,border:`1.5px solid ${guestAccess.isOpen?"#4A7C3F":"#E5E7EB"}`}}>
                <div style={{fontWeight:800,fontSize:14,color:"#1A1A2E",marginBottom:8}}>👁 Misafir Erişimi</div>
                {guestAccess.isOpen ? (
                  <div>
                    <div style={{background:"rgba(74,124,63,.2)",borderRadius:8,padding:"8px 10px",marginBottom:10}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#10B981"}}>✅ Misafir girişi açık</div>
                      <div style={{fontSize:11,color:"#6B7280",marginTop:2}}>Siz kapatana kadar geçerli</div>
                    </div>
                    <button onClick={closeGuestAccess} style={{...S.btnOutline,width:"100%",color:"#EF4444",borderColor:"#BE3B31",fontSize:13}}>
                      🔒 Misafir Girişini Kapat
                    </button>
                  </div>
                ) : (
                  <div>
                    <div style={{fontSize:12,color:"#9CA3AF",marginBottom:10}}>
                      Misafir girişi şu an kapalı. Açarsanız siz kapatana kadar geçerli olur.
                    </div>
                    <button onClick={openGuestAccess} style={{...S.btnPrimary,width:"100%",fontSize:13}}>
                      🔓 Misafir Girişini Aç
                    </button>
                  </div>
                )}
              </div>
            )}

            <div style={S.card}>
              <div style={{fontWeight:700,fontSize:13,color:theme.primary,marginBottom:8}}>👥 Kullanıcılar & Vardiyalar</div>
              {DEMO_USERS.filter(u=>u.id!=="u7").map(u=>(
                <div key={u.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid rgba(0,0,0,.08)"}}>
                  <span style={{fontSize:18}}>{u.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#1A1A2E"}}>{u.name=="İşletme Sahibi"||u.name=="Danışman"?u.name+" (Yönetici)":u.name}{u.name===currentUser?" (siz)":""}</div>
                    {u.members && <div style={{fontSize:11,color:"#9CA3AF"}}>{u.members}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Alt Nav - ana sayfa hariç */}
      {page!=="home" && (
        <div style={S.nav}>
          {[["home","🏠","Ana"],["health","🩺","Sağlık"],["vaccines","💉","Aşı"],["game","🐐","Oyun"]].map(([k,ic,l])=>(
            <button key={k} onClick={()=>navigate(k)} style={{...S.ghost,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 20px",color:page===k?theme.primary:"#9CA3AF",transition:"color .2s"}}>
              <span style={{fontSize:20}}>{ic}</span>
              <span style={{fontSize:9,fontWeight:page===k?700:500,letterSpacing:".3px",textTransform:"uppercase",color:page===k?theme.primary:"#9CA3AF"}}>{l}</span>
            </button>
          ))}
        </div>
      )}

    </div>
  );
}

const css=`
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{width:0;height:0}
  .anim-fade{animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both}
  .anim-slide{animation:slideIn .3s cubic-bezier(.16,1,.3,1) both}
  input:focus,select:focus,textarea:focus{
    border-color:var(--primary)!important;
    box-shadow:0 0 0 3px rgba(var(--primary-rgb),.12)!important;
    outline:none!important;
  }
  button:active{opacity:.75;transform:scale(.97)}
  select option{background:#fff;color:#1A1A2E}
  input::placeholder,textarea::placeholder{color:#9CA3AF}
`;


const root=ReactDOM.createRoot(document.getElementById("root"));
try {
  root.render(<App/>);
} catch(e) {
  document.body.innerHTML = '<div style="color:red;padding:20px;font-size:16px"><b>HATA:</b><br>' + e.message + '<br><br><pre>' + e.stack + '</pre></div>';
}
</script>
</body>
</html>
