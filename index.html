function GlobalVaccinePage({vaccineGroups, vaccineReports, onScheduleAdded, onScheduleDeleted, onVaccineApplied, currentUser}){
  const [selBreed, setSelBreed] = useState(null);
  const [showSchedule, setShowSchedule] = useState(null);
  const [editSchedule, setEditSchedule] = useState(null);
  const [localReports, setLocalReports] = useState(vaccineReports);
  const [applyingId, setApplyingId] = useState(null);
  const isVet = currentUser==="Danışman"||currentUser==="İşletme Sahibi";

  useEffect(()=>setLocalReports(vaccineReports),[vaccineReports]);

  const today = todayISO();

  const deleteReport = async (id) => {
    const {error} = await sb.from("vaccine_reports").delete().eq("id",id);
    if(!error){
      setLocalReports(p=>p.filter(x=>x.id!==id));
      if(onScheduleDeleted) onScheduleDeleted(id);
    }
  };

  const markApplied = async (r) => {
    setApplyingId(r.id);
    const now = new Date().toISOString();
    const appliedDate = now.split("T")[0];

    // Yeni uygulama kaydı oluştur (rapor için)
    const newReport = {
      id: "vr"+Date.now(),
      group_id: r.groupId,
      group_name: r.groupName,
      breed: r.breed,
      vaccine_type: r.vaccineType,
      date: appliedDate,
      batch_no: r.batchNo||null,
      goat_ids: r.goatIds||"",
      goat_names: r.goatNames||"",
      goat_count: r.goatCount||0,
      created_by: r.createdBy,
      notes: r.notes||null,
      record_type: "uygulama",
      status: "uygulandı",
      applied_by: currentUser,
      applied_at: now,
    };

    // 1. Yeni uygulama kaydını Supabase'e ekle
    await sb.from("vaccine_reports").insert(newReport);

    // 2. Eski takvim kaydını Supabase'den sil
    await sb.from("vaccine_reports").delete().eq("id", r.id);

    // 3. State güncelle — takvim kaydını kaldır, yeni raporu ekle
    const newReportObj = {
      ...newReport,
      groupId: newReport.group_id,
      groupName: newReport.group_name,
      vaccineType: newReport.vaccine_type,
      batchNo: newReport.batch_no||"",
      goatCount: newReport.goat_count,
      createdBy: newReport.created_by,
      recordType: "uygulama",
      appliedBy: currentUser,
      appliedAt: now,
    };

    setLocalReports(p=>[newReportObj, ...p.filter(x=>x.id!==r.id)]);
    if(onScheduleDeleted) onScheduleDeleted(r.id);
    if(onVaccineApplied) onVaccineApplied(newReportObj);
    setApplyingId(null);
  };

  if(selBreed) {
    const breed = BREEDS.find(b=>b.id===selBreed);
    const breedReports = [...localReports]
      .filter(r=>r.breed===selBreed && (r.recordType==="takvim" || r.recordType===undefined || r.recordType===""))
      .sort((a,b)=>new Date(a.date)-new Date(b.date));
    const upcoming = breedReports.filter(r=>r.date>=today);
    const past = breedReports.filter(r=>r.date<today).sort((a,b)=>new Date(b.date)-new Date(a.date));

    return (
      <div className="anim-slide">
        {showSchedule && <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:500,background:"#FFFFFF"}}>
          <VaccineScheduleModal breed={breed} vaccineGroups={vaccineGroups}
            onSave={r=>{onScheduleAdded(r);setLocalReports(p=>[r,...p]);setShowSchedule(false);}}
            onClose={()=>setShowSchedule(false)} currentUser={currentUser}/>
        </div>}
        {editSchedule && <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:500,background:"#FFFFFF"}}>
          <VaccineScheduleModal breed={breed} vaccineGroups={vaccineGroups} editData={editSchedule}
            onSave={r=>{setLocalReports(p=>p.map(x=>x.id===editSchedule.id?r:x));setEditSchedule(null);}}
            onClose={()=>setEditSchedule(null)} currentUser={currentUser}/>
        </div>}

        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <button onClick={()=>setSelBreed(null)} style={{...S.ghost,fontSize:22,color:"#6B7280",padding:0}}>‹</button>
          <div style={{fontSize:20}}>{breed.emoji}</div>
          <h2 style={{...S.title,margin:0}}>{breed.name} — Aşı Takvimi</h2>
        </div>

        <button onClick={()=>setShowSchedule(true)} style={{...S.btnPrimary,width:"100%",marginBottom:12,fontSize:13}}>
          + Takvime Aşı Ekle
        </button>

        <div style={{fontWeight:700,fontSize:13,color:"#0EA5E9",marginBottom:8}}>📅 Yaklaşan / Planlanan</div>
        {upcoming.length===0 && <div style={{...S.card,padding:10,marginBottom:8,textAlign:"center",color:"#6B7280",fontSize:12}}>Planlanan aşı yok</div>}
        {upcoming.map(r=>{
          const vt=VACCINE_TYPES_EXT.find(v=>v.id===r.vaccineType);
          const d=daysUntil(r.date);
          const isUrgent=d<=3;
          const isApplied=r.status==="uygulandı";
          return (
            <div key={r.id} style={{...S.card,padding:10,marginBottom:5,border:`1.5px solid ${isApplied?"#A8D5A2":isUrgent?"#F5C0BA":"#D4E8FF"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:vt?.color||"#333"}}>💉 {vt?.name}</div>
                  <div style={{fontSize:11,color:"#6B7280"}}>👥 {r.groupName}</div>
                  <div style={{fontSize:11,color:"#9CA3AF"}}>📅 {fmt(r.date)}{r.batchNo?` · Parti: ${r.batchNo}`:""}</div>
                  {isApplied && <div style={{fontSize:10,color:"#10B981",fontWeight:700,marginTop:2}}>✅ Uygulandı · {r.appliedBy} · {fmtDT(r.appliedAt)}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                  {!isApplied && <div style={{textAlign:"right"}}>
                    <div style={{fontSize:18,fontWeight:900,color:isUrgent?"#BE3B31":"#2873A8"}}>{d}</div>
                    <div style={{fontSize:9,color:isUrgent?"#BE3B31":"#2873A8",fontWeight:700}}>gün kaldı</div>
                  </div>}
                  {isApplied && <PillTag bg="#E3F0DC" color="#3D5A25" text="✅ Uygulandı"/>}
                  {!isApplied && <button onClick={()=>markApplied(r)} disabled={applyingId===r.id}
                    style={{...S.btnPrimary,fontSize:11,padding:"5px 10px",opacity:applyingId===r.id?.6:1}}>
                    {applyingId===r.id?"...":"✅ Uygulandı"}
                  </button>}
                  {!isApplied && <button onClick={()=>setEditSchedule(r)} style={{...S.btnSm,background:"rgba(40,115,168,.15)",color:"#0EA5E9",fontSize:10,padding:"3px 8px"}}>✏️ Düzenle</button>}
                  {isVet && <button onClick={()=>deleteReport(r.id)} style={{...S.btnSm,background:"rgba(239,68,68,.1)",color:"#EF4444",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
                </div>
              </div>
              {r.notes&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:4}}>📝 {r.notes}</div>}
            </div>
          );
        })}

        {past.length>0&&<>
          <div style={{fontWeight:700,fontSize:13,color:"#9CA3AF",marginBottom:8,marginTop:12}}>📋 Geçmiş</div>
          {past.map(r=>{
            const vt=VACCINE_TYPES_EXT.find(v=>v.id===r.vaccineType);
            const isApplied=r.status==="uygulandı";
            return (
              <div key={r.id} style={{...S.card,padding:10,marginBottom:5,opacity:.85}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:vt?.color||"#333"}}>💉 {vt?.name}</div>
                    <div style={{fontSize:11,color:"#6B7280"}}>👥 {r.groupName}</div>
                    <div style={{fontSize:11,color:"#9CA3AF"}}>📅 {fmt(r.date)} · {r.createdBy}</div>
                    {isApplied && <div style={{fontSize:10,color:"#10B981",fontWeight:700}}>✅ Uygulandı · {r.appliedBy}</div>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    {!isApplied && <button onClick={()=>markApplied(r)} disabled={applyingId===r.id}
                      style={{...S.btnOutline,fontSize:11,padding:"5px 10px",opacity:applyingId===r.id?.6:1}}>
                      {applyingId===r.id?"...":"✅ Uygulandı"}
                    </button>}
                    {!isApplied && <button onClick={()=>setEditSchedule(r)} style={{...S.btnSm,background:"rgba(40,115,168,.15)",color:"#0EA5E9",fontSize:10,padding:"3px 8px"}}>✏️ Düzenle</button>}
                    {isVet && <button onClick={()=>deleteReport(r.id)} style={{...S.btnSm,background:"rgba(239,68,68,.1)",color:"#EF4444",fontSize:10,padding:"3px 8px"}}>🗑 Sil</button>}
                  </div>
                </div>
              </div>
            );
          })}
        </>}
      </div>
    );
  }

  // Ana sayfa — 3 ırk kartı
  return (
    <div className="anim-fade">
      <h2 style={{...S.title,marginBottom:12}}>💉 Aşı Takvimi</h2>
      {BREEDS.map((b,i)=>{
        const breedReports=localReports.filter(r=>r.breed===b.id&&(r.recordType==="takvim"||!r.recordType));
        const upcoming=breedReports.filter(r=>r.date>=today&&r.status!=="uygulandı");
        const urgent=upcoming.filter(r=>daysUntil(r.date)<=3);
        return (
          <div key={b.id} onClick={()=>setSelBreed(b.id)} className="anim-fade"
            style={{borderRadius:20,marginBottom:10,cursor:"pointer",overflow:"hidden",background:`linear-gradient(135deg,${b.color}15 0%,#FFFFFF 100%)`,border:`1px solid ${b.color}28`,boxShadow:"0 6px 24px rgba(0,0,0,.3)",backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)",animationDelay:`${i*.07}s`}}>
            <div style={{display:"flex",alignItems:"center"}}>
              <div style={{width:68,background:`${b.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,alignSelf:"stretch",borderRight:`1px solid ${b.color}20`}}>{b.emoji}</div>
              <div style={{flex:1,padding:"14px 16px"}}>
                <div style={{fontWeight:700,fontSize:17,color:"#1A1A2E",marginBottom:4,letterSpacing:"-.2px"}}>{b.name}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <PillTag bg="rgba(14,165,233,.1)" color="#0EA5E9" text={`📅 ${upcoming.length} planlı`}/>
                  {urgent.length>0&&<PillTag bg="#FFF0EE" color="#BE3B31" text={`⚠️ ${urgent.length} acil`}/>}
                </div>
              </div>
              <div style={{padding:"0 14px",color:"#6B7280",fontSize:22}}>›</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

            const nd=new Date(v.date);nd.setDate(nd.getDate()+(vd?.intervalDays||180));
            const nextStr=nd.toISOString().split("T")[0];const d=daysUntil(nextStr);

                    <div style={{fontSize:11,color:"#9CA3AF",marginTop:1}}>👤 {v.createdByName}</div>

                <div style={{fontSize:11,marginTop:6,color:d<=15?"#BE3B31":d<=30?"#D4850A":"#4A7C3F",fontWeight:600,background:d<=15?"#FFF0EE":d<=30?"#FFF8EC":"#F5FAF0",padding:"4px 8px",borderRadius:6}}>
                  ⏭ Sonraki: {fmt(nextStr)}{d<=30&&d>=0?` — ${d} gün kaldı!`:""}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ════════════ MAIN APP ════════════
function App(){
  const [page,setPage]=useState("home");
  const [selBreed,setSelBreed]=useState(null);
  const [breedTab,setBreedTab]=useState("surü");
  const [catTab,setCatTab]=useState("anac");
  const [selGoat,setSelGoat]=useState(null);
  const [detailTab,setDetailTab]=useState("info");
  const [showLogin,setShowLogin]=useState(true);
  const [currentUser,setCurrentUser]=useState("");
  const [loading,setLoading]=useState(true);
  const [guestAccess,setGuestAccess]=useState({isOpen:false,expiresAt:null});

  const [goats,setGoats]=useState([]);
  const [healthRecs,setHealthRecs]=useState([]);
  const [vaccines,setVaccines]=useState([]);
  const [reports,setReports]=useState([]);
  const [logs,setLogs]=useState([]);
  const [vaccineGroups,setVaccineGroups]=useState([]);
  const [vaccineReports,setVaccineReports]=useState([]);
  const [treatmentDaysData,setTreatmentDaysData]=useState([]);
  const [births,setBirths]=useState([]);
  const [deaths,setDeaths]=useState([]);
  const [groupTreatments,setGroupTreatments]=useState([]);
  const [activityLogs,setActivityLogs]=useState([]);

  const [hModal,setHModal]=useState(null);
  const [vModal,setVModal]=useState(null);
  const [addGoatModal,setAddGoatModal]=useState(null);
  const [bulkAddModal,setBulkAddModal]=useState(null);
  const [archiveConfirm,setArchiveConfirm]=useState(null);
  const [selHealthRec,setSelHealthRec]=useState(null);

  useEffect(()=>{
    if(showLogin) return;
    const load=async()=>{
      setLoading(true);
      const [gRes,hRes,vRes,rRes,lRes,vgRes,vgmRes,vrRes,tdRes,bRes,dRes,gtRes]=await Promise.all([
        sb.from("goats").select("*"),
        sb.from("health_records").select("*").eq("closed",false),
        sb.from("vaccines").select("*"),
        sb.from("reports").select("*"),
        sb.from("health_logs").select("*"),
        sb.from("vaccine_groups").select("*"),
        sb.from("vaccine_group_members").select("*"),
        sb.from("vaccine_reports").select("*"),
        sb.from("treatment_days").select("*"),
        sb.from("births").select("*"),
        sb.from("deaths").select("*"),
        sb.from("group_treatments").select("*"),
      ]);
      const groupMembers = (vgmRes.data||[]);
      const groups = (vgRes.data||[]).map(gr=>({
        ...gr,
        memberIds: groupMembers.filter(m=>m.group_id===gr.id).map(m=>m.goat_id)
      }));
      const vReports = (vrRes.data||[]).map(r=>({
        id:r.id, groupId:r.group_id, groupName:r.group_name, breed:r.breed,
        vaccineType:r.vaccine_type, date:r.date, batchNo:r.batch_no||"",
        goatIds:r.goat_ids||"", goatNames:r.goat_names||"", goatCount:r.goat_count||0,
        createdBy:r.created_by||"", notes:r.notes||"", recordType:r.record_type||"uygulama",
        status:r.status||"bekliyor", appliedBy:r.applied_by||"", appliedAt:r.applied_at||""
      }));
      setGoats((gRes.data||[]).map(toGoat));
      setHealthRecs((hRes.data||[]).map(toHealth));
      setVaccines((vRes.data||[]).map(toVaccine));
      setReports((rRes.data||[]).map(toReport));
      setLogs((lRes.data||[]).map(toLog));
      setVaccineGroups(groups);
      setVaccineReports(vReports);
      setTreatmentDaysData((tdRes.data||[]).map(r=>({
        id:r.id, healthRecordId:r.health_record_id, goatId:r.goat_id,
        dayNumber:r.day_number, plannedDate:r.planned_date,
        done: r.done === true, doneBy:r.done_by||"", doneAt:r.done_at||""
      })));
      setBirths((bRes.data||[]).map(r=>({
        id:r.id, breed:r.breed, motherEarTag:r.mother_ear_tag,
        birthType:r.birth_type, birthDate:r.birth_date,
        kidCount:r.kid_count||0, kids:r.kids||[],
        notes:r.notes||"", createdBy:r.created_by||"",
        createdAt:r.created_at
      })));
      setDeaths((dRes.data||[]).map(r=>({
        id:r.id, breed:r.breed, category:r.category||"anac", earTag:r.ear_tag,
        deathDate:r.death_date, deathTime:r.death_time||"",
        cause:r.cause||"", notes:r.notes||"",
        createdBy:r.created_by||"", createdAt:r.created_at
      })));
      setGroupTreatments((gtRes.data||[]).map(r=>({
        id:r.id, breed:r.breed, category:r.category||"anac", groupName:r.group_name,
        condition:r.condition, treatment:r.treatment||"",
        treatmentDays:r.treatment_days||0, startDate:r.start_date||"",
        status:r.status||"tedavi_altında",
        notes:r.notes||"", createdBy:r.created_by||"", createdAt:r.created_at
      })));
      // Activity logs yükle
      const {data:alData} = await sb.from("activity_logs").select("*").order("created_at",{ascending:false}).limit(7);
      setActivityLogs(alData||[]);
      setLoading(false);
    };
    load();
  },[showLogin]);

  // Activity log kaydet (max 7 tutar)
  const addActivity = async (actionType, description, detail, breed) => {
    const rec = {
      id: "al"+Date.now()+Math.random().toString(36).slice(2),
      action_type: actionType,
      description,
      detail: detail||null,
      user_name: currentUser,
      breed: breed||null,
      created_at: new Date().toISOString()
    };
    await sb.from("activity_logs").insert(rec);
    setActivityLogs(prev => {
      const updated = [rec, ...prev].slice(0, 7);
      return updated;
    });
    // 7'den fazlaysa eskiyi sil

                      <div style={{fontWeight:800,fontSize:13,color:breed.color,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                        <span>{catLabel}</span>
                        <PillTag bg={breed.bg} color={breed.color} text={`${catRecs.length} kayıt`}/>
                      </div>
                      {catRecs.map(h=>{
                        const g=goats.find(x=>x.id===h.goatId);
                        const hDays=treatmentDaysData.filter(d=>d.healthRecordId===h.id);
                        const doneDays=hDays.filter(d=>d.done).length;
                        return (
                          <div key={h.id} style={{...S.card,padding:12,marginBottom:5,cursor:"pointer",border:`1.5px solid ${breed.color}22`}}
                            onClick={()=>setSelHealthRec(h)}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                              <div style={{flex:1}}>
                                <div style={{fontSize:11,fontWeight:700,color:breed.color,marginBottom:2}}>
                                  {breed.emoji} {g?.name} <span style={{color:"#9CA3AF",fontWeight:400}}>({g?.earTag})</span>
                                </div>
                                <div style={{fontWeight:700,fontSize:14,color:"#1A1A2E"}}>{h.condition}</div>
                                <div style={{fontSize:11,color:"#9CA3AF"}}>📅 {fmt(h.date)} · {h.createdByName}</div>
                                {h.treatment&&<div style={{fontSize:12,color:"#1F2937",marginTop:4}}>💊 {h.treatment}</div>}
                                {h.notes&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:2}}>📝 {h.notes}</div>}
                                {hDays.length>0&&(
                                  <div style={{marginTop:4,display:"flex",gap:4,alignItems:"center"}}>
                                    <span style={{fontSize:10,background:"rgba(74,124,63,.2)",color:"#10B981",padding:"2px 8px",borderRadius:8,fontWeight:700}}>
                                      📅 {doneDays}/{hDays.length} gün · {doneDays<hDays.length?`${doneDays+1}. günde`:"Tamamlandı"}
                                    </span>
                                  </div>
                                )}
                              </div>
                              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                                <StatusBadge status={h.status}/>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            )}

            {breedTab==="asi" && <BreedVaccineTab breed={breed} goats={goats} vaccineGroups={vaccineGroups} vaccineReports={vaccineReports} onGroupCreated={saveVaccineGroup} onGroupUpdated={updateVaccineGroup} onGroupDeleted={deleteVaccineGroup} onVaccineApplied={saveVaccineReport} currentUser={currentUser}/>}
          </div>
        )}

        {/* GOAT DETAIL */}
        {page==="goats"&&selGoat&&goat && (
          <GoatDetail goat={goat} goats={goats} healthRecs={healthRecs} vaccines={vaccines} logs={logs}
            treatmentDays={treatmentDaysData}
            onAddHealth={()=>setHModal({breedId:goat.breed,goatId:goat.id})}
            onUpdateHealth={updateHealth} onFinalizeHealth={finalizeHealth}
            onLogsUpdate={addLogToState}
            onTreatmentDayUpdate={day=>setTreatmentDaysData(p=>p.map(d=>d.id===day.id?day:d))}
            detailTab={detailTab} setDetailTab={setDetailTab} currentUser={currentUser}/>
        )}

        {/* HEALTH PAGE */}
        {page==="health" && (
          <div className="anim-fade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h2 style={S.title}>🩺 Sağlık Kayıtları</h2>
              {!isGuest && <button onClick={()=>setHModal({})} style={{...S.btnPrimary,padding:"8px 14px",fontSize:13}}>+ Ekle</button>}
            </div>
            {BREEDS.map(b=>{
              const breedRecs = healthRecs.filter(h=>h.breed===b.id&&!h.closed);
              if(!breedRecs.length) return null;
              return (
                <div key={b.id} style={{marginBottom:16}}>
                  {/* Irk başlığı */}
                  <div style={{fontWeight:700,fontSize:13,color:b.color,background:b.bg,padding:"6px 10px",borderRadius:8,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span>{b.emoji} {b.name}</span>
                    <button onClick={()=>{setPage("goats");setSelBreed(b.id);setBreedTab("saglik");}} style={{...S.btnSm,background:"rgba(255,255,255,.5)",color:b.color,fontSize:10}}>Detay →</button>
                  </div>
                  {/* Anaç ve Oğlak kategorileri */}
                  {[["anac","🐐 Anaç"],["kuzu","🐏 Kuzu"]].map(([cat,catLabel])=>{
                    const catRecs = breedRecs.filter(h=>{
                      const g=goats.find(x=>x.id===h.goatId);
                      const hCat = h.category || g?.category || "anac";
                      return hCat===cat;
                    }).sort((a,c)=>new Date(c.date)-new Date(a.date));
                    if(!catRecs.length) return null;
                    return (
                      <div key={cat} style={{marginBottom:8}}>
                        <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",margin:"4px 0 4px 4px"}}>{catLabel}</div>
                        {catRecs.map(h=>{
                          const g=goats.find(x=>x.id===h.goatId);
                          const hDays=treatmentDaysData.filter(d=>d.healthRecordId===h.id);
                          const doneDays=hDays.filter(d=>d.done).length;
                          const lastLog=logs.filter(l=>l.healthRecordId===h.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))[0];
                          return (
                            <div key={h.id} style={{...S.card,padding:"10px 12px",marginBottom:5,cursor:"pointer"}}
                              onClick={()=>setSelHealthRec(h)}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}>
                                <div style={{flex:1}}>
                                  <div style={{fontSize:12,fontWeight:700,color:b.color,marginBottom:2}}>
                                    {g?.name ? `${g.name} ` : ""}<span style={{fontWeight:400,color:"#9CA3AF"}}>({h.goatEarTag||g?.earTag||"—"})</span>
                                  </div>
                                  <div style={{fontWeight:700,fontSize:13,color:"#1A1A2E"}}>{h.condition}</div>
                                  {h.treatment&&<div style={{fontSize:11,color:"#1F2937",marginTop:3}}>💊 {h.treatment}</div>}
                                  {h.notes&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:2}}>📝 {h.notes}</div>}
                                  {hDays.length>0&&(
                                    <div style={{fontSize:10,background:"rgba(74,124,63,.2)",color:"#10B981",display:"inline-block",padding:"2px 8px",borderRadius:6,marginTop:4,fontWeight:600}}>
                                      📅 {doneDays}/{hDays.length} gün · {doneDays<hDays.length?`${doneDays+1}. günde`:"Tamamlandı"}
                                    </div>
                                  )}
                                  {lastLog&&<div style={{fontSize:10,color:"#9CA3AF",marginTop:3}}>
                                    🕐 Son: {lastLog.userName} · {fmtDT(lastLog.createdAt)}
                                  </div>}
                                </div>
                                <StatusBadge status={h.status}/>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              );
            })}
            {healthRecs.filter(h=>!h.closed).length===0 && <Empty text="Aktif sağlık kaydı yok"/>}
          </div>
        )}

        {page==="births" && <BirthsPage births={births} currentUser={currentUser}
          onAdd={b=>{ setBirths(p=>[b,...p]); addActivity("dogum_eklendi","Doğum kaydedildi",`Ana: ${b.motherEarTag} · ${b.birthType==="normal"?"Normal":b.birthType==="gunsuz"?"Günsüz":"Atık"}`,b.breed); }}
          onDelete={id=>setBirths(p=>p.filter(b=>b.id!==id))}/>}

        {page==="deaths" && <DeathsPage deaths={deaths} currentUser={currentUser}
          onDelete={(id,obj)=>{
            if(id) setDeaths(p=>p.filter(d=>d.id!==id));
            else if(obj){ setDeaths(p=>[obj,...p]); addActivity("olum_eklendi","Ölüm kaydedildi",`${obj.earTag} · ${obj.cause}`,obj.breed); }
          }}/>}

        {page==="group_tx" && <GroupTreatmentsPage
          groupTreatments={groupTreatments}
          treatmentDaysData={treatmentDaysData}
          currentUser={currentUser}
          onAdd={g=>{ setGroupTreatments(p=>[g,...p]); addActivity("toplu_tedavi","Toplu tedavi eklendi",`${g.groupName} · ${g.condition}`,g.breed); }}
          onUpdate={g=>setGroupTreatments(p=>p.map(x=>x.id===g.id?g:x))}
          onDelete={id=>setGroupTreatments(p=>p.filter(x=>x.id!==id))}
          onTreatmentDayUpdate={day=>setTreatmentDaysData(p=>p.map(d=>d.id===day.id?day:{...d,...(d.id===day.id?day:{})}))}
        />}

        {page==="vaccines" && <GlobalVaccinePage
          vaccineGroups={vaccineGroups}
          vaccineReports={vaccineReports}
          onScheduleAdded={saveVaccineReport}
          onScheduleDeleted={id=>setVaccineReports(p=>p.filter(x=>x.id!==id))}
          onVaccineApplied={r=>{
            setVaccineReports(p=>[r,...p.filter(x=>x.id!==r.id)]);
            addActivity("asi_uygulandı","Aşı uygulandı",`${r.groupName} · ${r.vaccineType||""}`,r.breed);
          }}
          currentUser={currentUser}/>}

        {page==="reports" && <ReportsPage reports={reports} goats={goats} logs={logs} vaccineReports={vaccineReports} births={births} deaths={deaths} groupTreatments={groupTreatments} treatmentDaysData={treatmentDaysData} currentUser={currentUser} onDeleteReport={deleteReport}/>}

        {/* GAME */}
        {page==="game" && (
          <div style={{padding:"0 2px"}} className="anim-fade">
            <GameHub/>
          </div>
        )}

        {/* PROFILE */}
        {page==="profile" && (
          <div className="anim-fade">
            <div style={{...S.card,textAlign:"center",padding:24,marginBottom:12,background:"linear-gradient(135deg,rgba(var(--primary-rgb),.08) 0%,#FFFFFF 100%)",border:"1.5px solid rgba(var(--primary-rgb),.15)"}}>
              <div style={{fontSize:44}}>{currentUser==="Misafir"?"👁":"👤"}</div>
              <h2 style={{margin:"4px 0 2px",fontSize:20,fontWeight:800,color:"#111827"}}>{currentUser}</h2>
              <div style={{fontSize:12,color:"#9CA3AF",marginTop:4}}>
                {currentUser==="Misafir"?"Sadece Görüntüleme":DEMO_USERS.find(u=>u.name===currentUser)?.members?.join(" · ") || (DEMO_USERS.find(u=>u.name===currentUser)?.role==="veteriner"?"Veteriner Hekim":DEMO_USERS.find(u=>u.members&&u.members.includes(currentUser))?"Şef Yönetici":currentUser)}
              </div>
              <div style={{marginTop:12}}>
                <button onClick={()=>{setShowLogin(true);}} style={{...S.btnOutline,color:"#EF4444",borderColor:"#BE3B31",fontSize:13}}>🚪 Çıkış Yap</button>
              </div>
            </div>

            {/* Ses Ayarı */}
                        )}

            {/* Renk Teması */}
            {!isGuest && (
              <div style={{...S.card,marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:13,color:"#111827",marginBottom:8}}>🎨 Arayüz Rengi</div>
                <div style={{fontSize:12,color:"#9CA3AF",marginBottom:10}}>
                  Şu an: <b style={{color:theme.primary}}>{theme.emoji} {theme.name}</b>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {COLOR_THEMES.map(t=>(
                    <button key={t.id} onClick={()=>saveTheme(t,false)}
                      style={{borderRadius:10,border:`2px solid ${theme.id===t.id?t.primary:"#E5E7EB"}`,background:"#FFFFFF",padding:0,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"stretch",overflow:"hidden",boxShadow:theme.id===t.id?`0 0 0 3px ${t.primary}20`:"0 1px 3px rgba(0,0,0,.06)"}}>
                      {t.photo ? (
                        <div style={{height:40,backgroundImage:"url("+t.photo+")",backgroundSize:"cover",backgroundPosition:"center",position:"relative"}}>
                          <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:t.overlay||"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{t.emoji}</div>
                        </div>
                      ) : (
                        <div style={{height:40,background:t.header||t.primary||"#8B5CF6"||t.primary||"#8B5CF6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{t.emoji}</div>
                      )}
                      <div style={{fontSize:8,fontWeight:700,color:theme.id===t.id?theme.primary:t.primary,textAlign:"center",padding:"3px 2px",background:"#F5F5F5"}}>{t.name}</div>
                    </button>
                  ))}
                </div>
              </div>
            )}
            {(currentUser==="Danışman"||currentUser==="İşletme Sahibi") && (
              <div style={{...S.card,marginBottom:10,border:`1.5px solid ${guestAccess.isOpen?"#4A7C3F":"#E5E7EB"}`}}>
                <div style={{fontWeight:800,fontSize:14,color:"#1A1A2E",marginBottom:8}}>👁 Misafir Erişimi</div>
                {guestAccess.isOpen ? (
                  <div>
                    <div style={{background:"rgba(74,124,63,.2)",borderRadius:8,padding:"8px 10px",marginBottom:10}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#10B981"}}>✅ Misafir girişi açık</div>
                      <div style={{fontSize:11,color:"#6B7280",marginTop:2}}>Siz kapatana kadar geçerli</div>
                    </div>
                    <button onClick={closeGuestAccess} style={{...S.btnOutline,width:"100%",color:"#EF4444",borderColor:"#BE3B31",fontSize:13}}>
                      🔒 Misafir Girişini Kapat
                    </button>
                  </div>
                ) : (
                  <div>
                    <div style={{fontSize:12,color:"#9CA3AF",marginBottom:10}}>
                      Misafir girişi şu an kapalı. Açarsanız siz kapatana kadar geçerli olur.
                    </div>
                    <button onClick={openGuestAccess} style={{...S.btnPrimary,width:"100%",fontSize:13}}>
                      🔓 Misafir Girişini Aç
                    </button>
                  </div>
                )}
              </div>
            )}

            <div style={S.card}>
              <div style={{fontWeight:700,fontSize:13,color:theme.primary,marginBottom:8}}>👥 Kullanıcılar & Vardiyalar</div>
              {DEMO_USERS.filter(u=>u.id!=="u7").map(u=>(
                <div key={u.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid rgba(0,0,0,.08)"}}>
                  <span style={{fontSize:18}}>{u.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#1A1A2E"}}>{u.name=="İşletme Sahibi"||u.name=="Danışman"?u.name+" (Şef)":u.name}{u.name===currentUser?" (siz)":""}</div>
                    {u.members && <div style={{fontSize:11,color:"#9CA3AF"}}>{u.members}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Alt Nav - ana sayfa hariç */}
      {page!=="home" && (
        <div style={S.nav}>
          {[["home","🏠","Ana"],["health","🩺","Sağlık"],["vaccines","💉","Aşı"],["game","🐐","Oyun"]].map(([k,ic,l])=>(
            <button key={k} onClick={()=>navigate(k)} style={{...S.ghost,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 20px",color:page===k?theme.primary:"#9CA3AF",transition:"color .2s"}}>
              <span style={{fontSize:20}}>{ic}</span>
              <span style={{fontSize:9,fontWeight:page===k?700:500,letterSpacing:".3px",textTransform:"uppercase",color:page===k?theme.primary:"#9CA3AF"}}>{l}</span>
            </button>
          ))}
        </div>
      )}

    </div>
  );
}

const css=`
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{width:0;height:0}
  .anim-fade{animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both}
  .anim-slide{animation:slideIn .3s cubic-bezier(.16,1,.3,1) both}
  input:focus,select:focus,textarea:focus{
    border-color:var(--primary)!important;
    box-shadow:0 0 0 3px rgba(var(--primary-rgb),.12)!important;
    outline:none!important;
  }
  button:active{opacity:.75;transform:scale(.97)}
  select option{background:#fff;color:#1A1A2E}
  input::placeholder,textarea::placeholder{color:#9CA3AF}
`;


const root=ReactDOM.createRoot(document.getElementById("root"));
try {
  root.render(<App/>);
} catch(e) {
  document.body.innerHTML = '<div style="color:red;padding:20px;font-size:16px"><b>HATA:</b><br>' + e.message + '<br><br><pre>' + e.stack + '</pre></div>';
}
</script>
</body>
</html>
